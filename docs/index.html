<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#090d13" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/forge-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/forge-icon-maskable.svg" />
  <title>TrikeShed Forge workspace</title>
  <style>
    html, body { margin: 0; height: 100%; background: #090d13; }
    #boot { display: flex; align-items: center; justify-content: center; height: 100vh; color: #7e8da0; font-family: Inter, system-ui, sans-serif; }
    #err { display: none; position: fixed; bottom: 0; left: 0; right: 0; padding: 16px; background: rgba(247,118,142,.12); border-top: 1px solid #f7768e; color: #f7768e; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 40vh; overflow: auto; }
  </style>
</head>
<body>
  <div id="boot">Loading Forge…</div>
  <div id="err"></div>
  <script>
    // Render function expected by Kotlin WASM
    function renderHtml(html) {
      document.open();
      document.write(html);
      document.close();
      hydrateGallery();
    }

    // Hydrate gallery from seed
    function hydrateGallery() {
      var root = document.getElementById('gallery-root');
      if (!root) return;
      try {
        var seedEl = document.getElementById('forge-seed');
        if (!seedEl) return;
        var seed = JSON.parse(seedEl.textContent);
        if (seed && seed.gallery && seed.gallery.widgets) {
          var widgets = seed.gallery.widgets;
          var sections = {};
          widgets.forEach(function(w) {
            var s = w.section || 'Other';
            if (!sections[s]) sections[s] = [];
            sections[s].push(w);
          });
          var html = '';
          Object.keys(sections).sort().forEach(function(section) {
            html += '<section class="gallery-section"><h3>' + section + '</h3><div class="gallery-list">';
            sections[section].forEach(function(w) {
              html += '<article class="gallery-card"><div class="name">' + w.name + '</div>' +
                '<div class="synopsis">' + (w.synopsis || '') + '</div>' +
                '<div class="id">' + w.id + '</div>' +
                '<div class="meta"><span class="targets">Targets: ' + (w.supportTargets || []).join(', ') + '</span></div>' +
                '</article>';
            });
            html += '</div></section>';
          });
          root.innerHTML = html;
        }
      } catch(e) { console.error('Gallery hydration:', e); }
    }

    window.addEventListener('error', function(e) {
      var el = document.getElementById('err');
      el.textContent = e.message + '\n' + (e.error && e.error.stack || '');
      el.style.display = 'block';
    });
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('err');
      el.textContent = 'Unhandled rejection: ' + (e.reason && e.reason.message || e.reason) + '\n' + (e.reason && e.reason.stack || '');
      el.style.display = 'block';
    });
  </script>
  <script src="./TrikeShed.js" defer></script>
</body>
</html>
