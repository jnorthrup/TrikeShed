  <title>Forge</title>
  <style>
:root {
  --bg: #ffffff;
  --sidebar-bg: #f7f6f3;
  --text: #37352f;
  --text-secondary: #787774;
  --text-faint: #9f9e9b;
  --border: #e9e9e7;
  --border-light: #f1f1ef;
  --hover: #f1f1ef;
  --hover-strong: #e9e9e7;
  --accent: #2383e2;
  --accent-soft: rgba(35, 131, 226, 0.1);
  --code-bg: #f7f6f3;
  --shadow-menu: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 3px 6px, rgba(15, 15, 15, 0.2) 0px 9px 24px;
  --radius: 6px;
  --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif, "Segoe UI Emoji", "Segoe UI Symbol";
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
* { box-sizing:border-box; }
html, body {
  margin:0;
  min-height:100%;
  background:radial-gradient(circle at top, #101a27 0%, var(--bg) 52%);
  color:var(--ink);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}
button, input, textarea, select { font:inherit; }
.app-shell {
  min-height:100vh;
  position:relative;
  background:linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0));
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
[hidden] { display: none !important; }

/* ── App shell ─────────────────────────────────────────── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ───────────────────────────────────────────── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border-light);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 8px 0;
.app-shell > * { position:absolute; }
.rail { border-right:1px solid var(--line); padding:16px; display:grid; gap:14px; background:rgba(9,13,19,.88); left:0; top:0; width:260px; height:100%; overflow:auto; }
.editor { padding:18px; overflow:auto; background:linear-gradient(180deg, rgba(9,13,19,.52), rgba(9,13,19,.16)); border-right:1px solid var(--line); left:260px; top:0; width:500px; height:100%; }
.graph-pane { padding:18px; overflow:auto; background:linear-gradient(180deg, rgba(9,13,19,.52), rgba(9,13,19,.16)); left:760px; top:0; width:600px; height:100%; }
.board-pane { border-left:1px solid var(--line); padding:18px; display:grid; gap:14px; background:rgba(9,13,19,.94); overflow:auto; left:1360px; top:0; width:500px; height:100%; }
.panel {
  background:linear-gradient(180deg, rgba(18,25,36,.97), rgba(12,18,28,.95));
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
}
.sidebar-top { padding: 8px 8px 0; }
.workspace-switcher {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--radius);
  cursor: pointer;
  user-select: none;
}
.workspace-switcher:hover { background: var(--hover); }
.workspace-icon {
  width: 22px; height: 22px;
  border-radius: 4px;
  background: var(--text);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
}
.workspace-name { font-size: 14px; font-weight: 500; }
.sidebar-actions { margin-top: 8px; display: grid; gap: 1px; }

.sidebar-item {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 5px 8px;
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--text);
  text-align: left;
  user-select: none;
}
.sidebar-item:hover { background: var(--hover); }
.sidebar-item-icon {
  width: 20px;
  text-align: center;
  color: var(--text-secondary);
  font-size: 14px;
}
.sidebar-section { margin-top: 18px; padding: 0 8px; flex: 1; }
.sidebar-section-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-faint);
  padding: 4px 8px;
  user-select: none;
}
.sidebar-add { color: var(--text-secondary); margin-top: 2px; }
.sidebar-bottom { padding: 8px 16px; }
.sidebar-seed-note { font-size: 11px; color: var(--text-faint); line-height: 1.4; }

/* ── Page tree ─────────────────────────────────────────── */
.page-tree { display: grid; gap: 1px; }
.page-tree-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  border-radius: var(--radius);
  font-size: 14px;
  cursor: pointer;
  user-select: none;
}
.page-tree-item:hover { background: var(--hover); }
.page-tree-item.active { background: var(--hover-strong); font-weight: 500; }
.page-tree-item .tree-toggle {
  width: 16px;
  color: var(--text-faint);
  font-size: 10px;
  text-align: center;
  flex-shrink: 0;
}
.page-tree-item .tree-icon { color: var(--text-secondary); flex-shrink: 0; }
.page-tree-item .tree-label {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.page-tree-item .tree-label.untitled { color: var(--text-faint); }
.page-tree-children { padding-left: 22px; display: grid; gap: 1px; }

/* ── Main area ─────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.main-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 45px;
  padding: 0 12px;
  border-bottom: 1px solid var(--border-light);
  flex-shrink: 0;
}
.breadcrumb { font-size: 14px; color: var(--text-secondary); }
.topbar-actions { display: flex; gap: 4px; }
.topbar-btn {
  font-size: 14px;
  color: var(--text-secondary);
  padding: 4px 8px;
  border-radius: var(--radius);
}
.topbar-btn:hover { background: var(--hover); color: var(--text); }
.topbar-btn.active { background: var(--hover-strong); color: var(--text); font-weight: 500; }

/* ── Document ──────────────────────────────────────────── */
.doc-scroll { flex: 1; overflow-y: auto; }
.doc-page { max-width: 900px; margin: 0 auto; padding: 0 96px 30vh; }
.doc-cover-spacer { height: 96px; }
.doc-title-row { display: flex; align-items: flex-start; gap: 8px; }
.doc-icon { font-size: 40px; line-height: 1.2; user-select: none; cursor: pointer; }
.doc-title {
  font-size: 40px;
  font-weight: 700;
  line-height: 1.2;
  margin: 4px 0 0;
  outline: none;
  width: 100%;
  caret-color: var(--text);
}
.doc-title:empty::before {
  content: attr(data-placeholder);
  color: var(--text-faint);
  pointer-events: none;
}
.doc-blocks { margin-top: 8px; }
.doc-hint {
  margin-top: 12px;
  color: var(--text-faint);
  font-size: 14px;
  user-select: none;
}
.doc-hint-key {
  background: var(--code-bg);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: var(--mono);
  font-size: 13px;
}

/* ── Blocks ────────────────────────────────────────────── */
.block {
  position: relative;
  display: flex;
  align-items: flex-start;
  padding: 3px 2px;
  border-radius: var(--radius);
}
.block-gutter {
  position: absolute;
  left: -46px;
  top: 2px;
  display: flex;
  align-items: center;
  opacity: 0;
  transition: opacity 0.1s;
  user-select: none;
}
.block:hover .block-gutter { opacity: 1; }
.gutter-btn {
  width: 22px; height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  color: var(--text-faint);
  font-size: 14px;
}
.gutter-btn:hover { background: var(--hover); color: var(--text-secondary); }
.gutter-drag { cursor: grab; }
.block-content { flex: 1; min-width: 0; outline: none; caret-color: var(--text); }
.block-content:empty::before {
  content: attr(data-placeholder);
  color: var(--text-faint);
  pointer-events: none;
}

.block-p .block-content { padding: 1px 0; }

.block-h1 .block-content { font-size: 30px; font-weight: 600; line-height: 1.3; padding: 16px 0 2px; }
.block-h2 .block-content { font-size: 24px; font-weight: 600; line-height: 1.3; padding: 12px 0 2px; }
.block-h3 .block-content { font-size: 19px; font-weight: 600; line-height: 1.3; padding: 8px 0 2px; }

.block-todo { align-items: flex-start; }
.block-todo .todo-checkbox {
  width: 16px; height: 16px;
  margin: 4px 6px 0 0;
  flex-shrink: 0;
  cursor: pointer;
  accent-color: var(--accent);
}
.block-todo.done .block-content {
  color: var(--text-faint);
  text-decoration: line-through;
}

.block-bullet, .block-numbered { align-items: flex-start; }
.block-bullet .bullet-marker {
  width: 24px;
  flex-shrink: 0;
  text-align: center;
  color: var(--text);
  line-height: inherit;
  user-select: none;
}
.block-numbered .bullet-marker { font-variant-numeric: tabular-nums; }

.block-quote .block-content {
  border-left: 3px solid var(--text);
  padding-left: 14px;
  margin: 4px 0;
}

.block-code {
  background: var(--code-bg);
  border-radius: var(--radius);
  margin: 4px 0;
  padding: 12px 16px;
}
.block-code .block-content {
  font-family: var(--mono);
  font-size: 13.5px;
  line-height: 1.6;
  white-space: pre-wrap;
  caret-color: var(--text);
}

.block-divider { padding: 8px 0; cursor: default; }
.block-divider hr { border: none; border-top: 1px solid var(--border); width: 100%; }

/* ── Slash menu ────────────────────────────────────────── */
.slash-menu {
  position: fixed;
  width: 330px;
  max-height: 400px;
  overflow-y: auto;
  background: var(--bg);
  border-radius: 10px;
  box-shadow: var(--shadow-menu);
  z-index: 100;
  padding: 6px;
}
.slash-menu-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-faint);
  padding: 6px 10px 4px;
  user-select: none;
}
.slash-item {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 6px 10px;
  border-radius: var(--radius);
  text-align: left;
}
.slash-item:hover, .slash-item.active { background: var(--hover); }
.slash-item-icon {
  width: 40px; height: 40px;
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  background: var(--bg);
  flex-shrink: 0;
  color: var(--text-secondary);
}
.slash-item-text { display: grid; }
.slash-item-name { font-size: 14px; font-weight: 500; }
.slash-item-desc { font-size: 12px; color: var(--text-faint); }

/* ── Board view ────────────────────────────────────────── */
.board-scroll { flex: 1; overflow: auto; padding: 24px; }
.board-canvas { display: flex; gap: 16px; align-items: flex-start; min-height: 100%; }
.board-column {
  width: 280px;
  flex-shrink: 0;
  background: var(--sidebar-bg);
  border-radius: 10px;
  padding: 8px;
}
.board-column-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 8px;
  font-size: 14px;
  font-weight: 500;
  user-select: none;
}
.board-column-count { color: var(--text-faint); font-size: 12px; }
.board-cards { display: grid; gap: 8px; margin-top: 4px; }
.board-card {
  background: var(--bg);
  border-radius: 8px;
  padding: 8px 10px;
  box-shadow: rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 2px 4px;
  cursor: pointer;
  font-size: 14px;
}
.board-card:hover { box-shadow: rgba(15, 15, 15, 0.1) 0px 0px 0px 1px, rgba(15, 15, 15, 0.15) 0px 3px 8px; }
.board-card.done-card .board-card-title { color: var(--text-faint); text-decoration: line-through; }
.board-card-meta { margin-top: 4px; font-size: 12px; color: var(--text-faint); display: flex; gap: 6px; }
.board-add-card {
  width: 100%;
  text-align: left;
  padding: 6px 8px;
  border-radius: var(--radius);
  color: var(--text-secondary);
  font-size: 14px;
  margin-top: 4px;
}
.board-add-card:hover { background: var(--hover); }

/* ── Scrollbars ────────────────────────────────────────── */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #d3d1cb; border-radius: 5px; border: 2px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-thumb:hover { background: #aeaca6; border: 2px solid transparent; background-clip: content-box; }
::-webkit-scrollbar-track { background: transparent; }

/* ── Selection / focus ─────────────────────────────────── */
.block-content:focus { outline: none; }
.block.focused { background: var(--accent-soft); }
::selection { background: rgba(35, 131, 226, 0.25); }

/* ── Responsive ────────────────────────────────────────── */
@media (max-width: 900px) {
  .sidebar { display: none; }
  .doc-page { padding: 0 24px 30vh; }
  .block-gutter { position: static; opacity: 1; }
}
.cascade-grid { display:grid; gap:6px; }
.cascade-grid table { width:100%; border-collapse:collapse; font-size:12px; }
.cascade-grid th { text-align:left; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-size:10px; padding:6px 8px; border-bottom:1px solid var(--line2); }
.cascade-grid td { padding:6px 8px; border-bottom:1px solid var(--line); color:var(--ink); }
.cascade-grid td.num { text-align:right; font-variant-numeric:tabular-nums; }

/* ── Blackboard MDI shell ── */
.blackboard { position:relative; width:100vw; height:100vh; overflow:hidden; background:radial-gradient(circle at 50% 30%, #101a27 0%, var(--bg) 60%); }
.blackboard-canvas { position:absolute; inset:0; transform-origin:0 0; transition:transform 0.3s cubic-bezier(.2,.8,.2,1); }
.bb-hud { position:absolute; inset:0; pointer-events:none; z-index:100; }
.bb-hud-corner { position:absolute; pointer-events:auto; }
.bb-hud-tl { top:12px; left:12px; }
.bb-hud-tr { top:12px; right:12px; }
.bb-hud-bl { bottom:12px; left:12px; }
.bb-hud-br { bottom:12px; right:12px; }
.bb-hud-btn { width:36px; height:36px; border-radius:50%; font-size:16px; display:flex; align-items:center; justify-content:center; background:rgba(9,13,19,.9); backdrop-filter:blur(8px); border:1px solid var(--line); color:var(--ink); cursor:pointer; }
.bb-hud-btn:hover { border-color:var(--blue); background:var(--line); }
.bb-hud-title { position:absolute; top:12px; left:50%; transform:translateX(-50%); display:flex; gap:12px; align-items:center; pointer-events:auto; background:rgba(9,13,19,.9); padding:6px 16px; border-radius:20px; border:1px solid var(--line); backdrop-filter:blur(8px); }
.bb-hud-title span { font-size:12px; font-weight:600; color:var(--muted); }
.bb-zoom-pill { background:var(--blue); color:#fff !important; padding:2px 8px; border-radius:10px; font-size:11px !important; }
  </style>
</head>

  <script id="forge-seed" type="application/json">{"title":"Unified Job Nexus — Production Project Plan", "pageNotes":"TARGET: Unified Job Nexus — Production Project Plan\nWorkspace: /Users/jim/work/TrikeShed Scope: root source sets under src/ and the root Gradle model only.\n\nGoal\nBuild one SupervisorJob-shaped job nexus in which:\n\nConfix JSON Schema is the product contract;\nJSON, YAML, and CBOR enter one Confix facet plan;\none bounded channel ingress feeds one reactor-owned mutation path;\nimmutable bytes, rules, facts, snapshots, attachments, and index pages live in CAS;\nCouch semantics provide names, revisions, conflicts, changes, and views over that immutable state;\nassociative indexes, LinearHashMap, paper-grounded elastic/funnel hash indexes, MultiIndexContainer, radix prefix lookup, and a copy-on-write B+tree are projections of the same committed records;\nCCEK owns scope, cancellation, draining, and failure isolation;\nRete owns derived facts, joins, activations, conflict resolution, and truth maintenance;\nForge Kanban is a projection and command surface, never a second source of truth;\nthe Linux btrfs integration is a physical storage policy/backend, never the semantic owner of jobs.\nKotlin DSL, fluent builder, Confix configuration, and factory entrypoints all lower through one validated immutable assembly specification.\nThe unification point is the committed Confix frame and its sequence number, not a god object that absorbs every mechanism.\n\n1. Review disposition\nThe prior plan in this file found several real gaps, but four proposed cuts were unsafe or incomplete. This revision keeps the useful inventory and changes the architecture as follows.\n\nKeep\nRoot-only implementation.\nConfixDoc/FacetedRow as the record substrate.\nMultiIndexContainer as an in-memory projection mechanism.\nSupervisor-owned lifecycle and channel push rather than polling.\nKanban as a projection over canonical state.\nReplace\nDo not use a 64-bit non-cryptographic hash as a content identifier. CAS uses full SHA-256 over canonical CBOR and verifies the digest on read.\nDo not make SharedFlow the mutation truth. The durable sequence log is truth. A flow is only a live tail; a lagging consumer catches up by sequence.\nDo not collapse CAS, WAL, indexes, Rete, Couch, and projections into one store class. JobSupervisorElement is the composition root; CasStore, JobLog, JobIndex, JobRepository, ReteNetwork, and projections keep narrow ownership.\nDo not treat the custom RealSupervisorJob as coroutine supervision. It is an observable helper with a colliding name. Actual ownership uses kotlinx.coroutines.SupervisorJob(parent).\nDo not leave btrfs in the production graph as a TODO contract. The safe tree codec and Linux storage adapter must be real and tested; unused unsafe signatures are removed.\nDo not omit Rete and Reactor from the nexus. They are the decision and serialization planes between durable facts and supervised work.\nDo not claim excluded tests as green. A gate counts only when the named test is compiled and executed by the live Gradle task.\nDo not erase the exact-hash tier behind a generic index label. The live LinearHashMap and the intended Elastic/Funnel open-addressing designs have distinct roles, tests, and bounds; B+tree/radix indexes do not replace them.\nDo not create parallel assembly semantics. DSL, fluent builder, decoded Confix configuration, compatibility adapters, and direct factory calls must produce the same JobNexusSpec, validation result, component graph, and lifecycle.\n2. Ground truth in the current root code\nSurface\tLive capability\tLoad-bearing gap\nsrc/commonMain/kotlin/borg/trikeshed/lib/FacetedRow.kt:10-14\tUniversal GADT-shaped row and typed dispatch boundary\tNo schema-compiled job facet family yet\nsrc/commonMain/kotlin/borg/trikeshed/parse/confix/ConfixKit.kt:39-61\tConfixDoc = Join&lt;ConfixIndex, Series&lt;Byte&gt;&gt;; JSON/YAML/CBOR entry points\tNo canonical semantic encoding, schema validation, or CID\nsrc/commonMain/kotlin/borg/trikeshed/parse/confix/ConfixIndexK.kt:24-38\tSpans, tags, depths, child and key facets\tKey lookup is not a complete parent-scoped schema index\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/MultiIndexContainer.kt:40-208\tOne store with hash/order/range/sequence projections\tLambda identity names indexes; hash is one-to-one; sorted indexes rebuild on every add; no modify/retract transaction\nsrc/commonMain/kotlin/borg/trikeshed/collections/LinearHashMap.kt:5-146\tKMP open addressing with power-of-two capacity, triangular probing, tombstones, and ≤0.5 occupancy\tUses raw hashCode() low bits; tombstone pressure always doubles; nullable values make contains ambiguous; it is not the Elastic Hashing algorithm cited by MultiIndexK\nsrc/commonMain/kotlin/borg/trikeshed/collections/associative/trie/RadixTree.kt:13-90\tCompressed prefix tree insertion and key collection\tNo exact lookup, prefix range cursor, deletion, or immutable snapshot\nsrc/commonMain/kotlin/borg/trikeshed/graph/CausalGraphNode.kt:94-147\tReal MultiIndexContainer use for causal key, node, order, clock, and board facets\tDuplicate addOrGet still pushes the node to the bound agent; index and event emission are coupled by callback\nsrc/commonMain/kotlin/borg/trikeshed/context/AsyncContextElement.kt:18-73\tParentable SupervisorJob, forward lifecycle, close cancellation\tChild launch and durable drain are not centrally coordinated\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CCEK.kt:31-32\tNamed child scope helper\tparentContext + SupervisorJob() replaces the inherited job with an unparented supervisor\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CCEK.kt:82-241\tChannel-driven document signals and projection fanout\tUnbounded ingress, several mutable owners, startup races, and projections not tied to durable sequence\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/SupervisorJob.kt:36-83\tObservable slots and forward lifecycle\tIt is not a coroutine Job; callbacks are a parallel fanout mechanism\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorElement.kt:29-422\tReactor-owned resource state, leases, ticks, and event emission\tDomain-specific mutable maps, dropped-oldest state events, synthetic leases, and no durable job command contract\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorBootstrap.kt:20-65\tPlatform bootstrap and resource loading\tProcess-global mutable scope/job fields make concurrent initialization last-writer-wins\nsrc/commonMain/kotlin/borg/trikeshed/userspace/context/AsyncContextKey.kt:20-45\tUserspace context-key family\tOne key is declared twice and overlapping legacy/canonical element families can resolve different identities\nsrc/commonMain/kotlin/borg/trikeshed/userspace/LiburingElement.kt and src/commonMain/kotlin/borg/trikeshed/userspace/reactor/FanoutDispatcherElement.kt\tCompletion and fanout elements\tParallel definitions overlap the canonical elements in borg.trikeshed.context\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteAgent.kt:30-89\tChannel push and asynchronous flat rule scan\tNot a Rete network: no modify/retract, alpha/beta memories, agenda, refraction, negative conditions, or truth maintenance; channel and default scope are unbounded/detached\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteCausalBridge.kt:29-65\tDeterministic causal node to fact identity\tOnly NodePlanning is projected and facts are not committed/retractable working memory\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixDocStore.kt:27-102\t_id/_rev-shaped writes and conflict check\tMutable maps, synthetic revisions, no CAS, no durable delete, and no changes cursor\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixPersistence.kt:23-62\tConfix-shaped byte round trip\tIn-memory map and a second JSON object path\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/ConfixWal.kt:11-50\tSequence-shaped API\tNo bytes are appended, replayed, flushed, or checksummed\nsrc/commonMain/kotlin/borg/trikeshed/graal/ConfixBlackboard.kt:16-154\tCommon shared-workspace facade\tIt claims content addressing without hashing; set reconstructs one-key JSON and remove is a no-op\nsrc/commonMain/kotlin/borg/trikeshed/kanban/ForgeBoardFSM.kt:25-224\tBoard reducer and concurrency guard\tGlobal mutable source of truth; flow events may drop while state still changes\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/KanbanFSM.kt:118-204\tReactor event reducer\tA second global board-adjacent state and a second event bus\nsrc/commonMain/kotlin/borg/trikeshed/forge/net/kanban/ForgeKanbanConduit.kt:15-57\tCCEK event-to-signal conduit\tNo canonical repository-backed sink; no durable idempotency result\nsrc/commonMain/kotlin/borg/trikeshed/userspace/btrfs/BtrfsCodecElement.kt:16-111\tReal little-endian primitive codec and context element\tA second incompatible codec element exists under userspace/context\nsrc/commonMain/kotlin/borg/trikeshed/classfile/slab/btrfs/TinyBtrfsContract.kt:128-193\tType vocabulary only\tEvery filesystem operation is TODO; this cannot be a production dependency\nsettings.gradle.kts:27-44\tProject graph declaration\tStale non-root include logic references absent projects and blocks reliable Gradle task discovery\nbuild.gradle.kts:280-290\tFocused transport switch\tBroad path exclusions hide live userspace tests in ordinary runs\nRecovered associative/hash stack\nThe remembered multi-container plus linear-hash design is present in root, split across three current packages rather than one directory:\n\nborg.trikeshed.collections.LinearHashMap is the live triangular open-addressed mutable map.\nborg.trikeshed.collections.multiindex.MultiIndexContainer imports that map and maintains one LinearHashMap&lt;K, Int&gt; for every live ByHash projection.\nborg.trikeshed.collections.multiindex.MultiIndexK.ByHash explicitly names Elastic Hashing as the intended backing, but the current implementation stops at triangular probing.\nborg.trikeshed.collections.associative.trie supplies prefix-oriented ArrayMap/trie/radix structures, not the exact hash backing.\nThe only current LinearHashMap tests are embedded at the top of MultiIndexContainerTest.kt; S2 separates and strengthens them.\nThe plan unifies this stack by contract and call site. It does not begin with a package move, compatibility alias, or replacement by the B+tree.\n\nExisting entrypoint patterns\nRoot surface\tUseful pattern\tGap to avoid in the nexus\nconfix/TypeSignatureDsl.kt\tReceiver DSL builds an immutable declaration before execution\tNo @DslMarker and no focused DSL contract test\nkeymux/KeyMux.kt:233-308\tCompanion invoke, fluent builder, and direct build() converge\tBuilder constructs the live object directly and carries little validation\nisam/IsamUtil.kt:5-26\tRequired-field validation in build() plus top-level DSL function\tbuild() also selects/opens runtime resources, mixing pure configuration with effects\ncouch/isam/ConfixIsamFactory.kt:13-85\tBuilder-shaped syntax\tClaims a complete factory while returning a mutable-map bridge whose cursor path is TODO; it is not a production exemplar\ncouch/CouchStore.kt:238-245 and couch/ConfixDocStore.kt:108-112\tNamed factory methods reveal implementation choices\tSeparate factories invent independent defaults and bypass shared lifecycle/recovery\nforge/ccek/ccek/CCEK.kt:25-37 and userspace/reactor/MuxReactorBootstrap.kt:16-66\tDirect composition entrypoints already exist\tThey synthesize scopes/state and can bypass parentage, capacity, durability, and rollback policy\nThe retained pattern is the pure-declaration half of TypeSignatureDsl plus the convergent call shapes of KeyMux. Runtime construction is moved behind one effectful factory; the incomplete ISAM builder is repaired rather than copied.\n\nResulting truth split\nToday there are separate mutable truths for document choreography, board state, reactor state, Couch records, causal nodes, and callback subscribers. The new design must unify their contract, commit order, identity, and replay without forcing every concern into one class.\n\n3. Non-negotiable invariants\nC01 — One schema contract\nsrc/commonMain/resources/confix/job-nexus.schema.json is the only field/type contract for command, event, snapshot, fact, activation, Couch head, and checkpoint frames. Runtime facet plans are compiled from that schema. No parallel hand-maintained DTO field list may become authoritative.\n\nC02 — One committed identity model\nJobId: stable logical identity.\nAttemptId: one supervised execution attempt.\nRevision: compare-and-set generation for a logical head.\nContentId: sha256:&lt;64 lowercase hex digits&gt; over canonical CBOR.\nSequence: monotonically increasing durable-log order.\nCausalKey: existing logical construction identity; never substituted for a CID.\nActivationId: SHA-256 of rule version plus ordered supporting fact CIDs.\nC03 — One mutation ingress\nAll state-changing intents enter JobSupervisorElement.commands, a bounded Channel with BufferOverflow.SUSPEND. State transitions are never sent via tryEmit, dropped-oldest flows, direct global reducer calls, or callback mutation.\n\nC04 — Durable-before-visible\nA state event becomes visible only after:\n\nschema and expected-revision validation;\ncanonical CBOR encoding;\nCAS blob write and digest verification;\nWAL append with frame CRC32C;\ndurability barrier;\nreducer application and index update.\nIf any earlier step fails, no live projection advances.\n\nC05 — Derived indexes are rebuildable\nMultiIndexContainer, radix prefix indexes, Rete memories, Kanban cursors, and Couch views are derived from the durable sequence plus checkpoint roots. None is independently authoritative.\n\nC06 — Real structured concurrency\nEvery long-lived coroutine is a descendant of one root SupervisorJob. A child attempt failure cancels its attempt subtree, emits a durable failure frame, and does not cancel sibling jobs. No API creates a default global scope.\n\nC07 — No silent event loss\nCommands, committed events, facts, and activations cannot use drop overflow. Only explicitly non-state telemetry may drop oldest. Live consumers carry a last-seen sequence and recover gaps from the log.\n\nC08 — Rete actions are mediated\nRete may derive facts and enqueue commands. It may not mutate Couch heads, CAS, job snapshots, or Kanban state directly.\n\nC09 — Kanban is a view and command adapter\nCards are projections of job snapshots, dependencies, attempts, and activations. A user move emits a versioned command. It does not directly alter canonical board state.\n\nC10 — Physical storage is policy\nThe logical repository works with the portable file/IndexedDB backend. On Linux, btrfs snapshots, reflinks, deduplication, and extent metadata implement SlabFacet policy. Job semantics do not change with the backend.\n\nC11 — No hollow production surfaces\nEvery type added to the production path must have an emission/call site and an executable test. A TODO-bodied surface is either completed in its owning job or removed.\n\nC12 — Cross-target claims require execution\nCommon behavior is executed through JVM, JS, and Wasm test tasks. Linux storage behavior is executed on Linux. Cross-compilation alone is inventory evidence, not runtime proof.\n\nC13 — Hashing claims match the implemented algorithm\nLinearHashMap remains the mutable exact-index baseline. “Elastic” and “Funnel” refer only to implementations that follow Optimal Bounds for Open Addressing Without Reordering (arXiv:2501.02305v2) and pass their own probe-distribution gates. The paper's insertion-only bounds are never claimed for a table after arbitrary deletion/retraction.\n\nC14 — One entrypoint lowering path\nThe DSL and fluent builder are pure syntax over JobNexusSpecBuilder; Confix JSON/YAML/CBOR and command-line adapters decode into the same spec facets. JobNexusSpecValidator runs exactly once before JobNexusFactory.open. No entrypoint may construct a store, channel, scope, index, Rete network, or projection directly.\n\n4. Target architecture\nEntrypoint lattice\nKotlin DSL                 fluent builder              Confix JSON/YAML/CBOR\njobNexusSpec { ... }       JobNexusSpec.builder()      JobNexusSpecDecoder\n        \\                         |                         /\n         +---------------- JobNexusSpecBuilder ----------------+\n                                   |\n                         JobNexusSpecValidator\n                                   |\n                 immutable schema-backed JobNexusSpec\n                                   |\n        JobNexusFactory.open(spec, required runtime bindings)\n                                   |\n                       JobSupervisorElement [ACTIVE]\nCompatibility functions and any command-line adapter join above JobNexusSpecValidator; none gets a private construction path.\n\nPublic entrypoints\nStyle\tEntry\tEffect\nDeclarative DSL\tjobNexusSpec { ... }\tPurely builds and validates an immutable spec\nFluent/programmatic\tJobNexusSpec.builder()...build()\tCalls the same builder mutations and validator as the DSL\nConfiguration\tJobNexusSpecDecoder.decode(Syntax, Series&lt;Byte&gt;)\tUses Confix schema/facets, then the same validator\nFactory\tJobNexusFactory.open(spec, bindings)\tThe only public side-effecting assembly boundary\nScoped convenience\townerContext.openJobNexus { ... }\tBuilds a spec, then delegates once to JobNexusFactory.open\nCompatibility\texisting store/reactor/job-kernel factory functions\tTranslate arguments to a spec and delegate; no dual-write or independent scope\nJobNexusSpec is a schema-backed FacetedRow&lt;JobNexusK&lt;*&gt;&gt; paired with canonical Confix bytes, not a second data-class field model. JobNexusK contains typed policy facets only; job/card/fact fields remain in job-nexus.schema.json.\n\nTarget DSL shape\nval spec = jobNexusSpec {\n    contract {\n        schema(\"classpath:/confix/job-nexus.schema.json\")\n        rules(\"sha256:&lt;rule-set-cid&gt;\")\n    }\n    supervision {\n        dispatcher(\"default\")\n        attemptFailure(IsolateAndCommit)\n        projectionFailure(RestartFromSequence)\n        drainTimeoutMs(30_000)\n    }\n    channels {\n        commands(256)\n        committed(256)\n        facts(512)\n        activations(256)\n        telemetry(128, DropOldest)\n    }\n    storage {\n        backend(File)\n        durability(Fsync)\n        checkpointEvery(4_096)\n    }\n    indexes {\n        fromContract()\n    }\n    rete {\n        cycleBudget(10_000)\n    }\n    projections {\n        couch()\n        forgeKanban()\n    }\n}\n\nval nexus = JobNexusFactory.open(\n    spec = spec,\n    bindings = JobNexusBindings(\n        parentContext = coroutineContext,\n        fileOps = fileOps,\n        clock = clock,\n    ),\n)\nThe numeric values above are illustrative schema defaults, not literals duplicated in Kotlin. The emitted spec records every resolved value so DSL, decoded configuration, and direct builder calls have byte-identical canonical configuration.\n\nBuilder rules\n@JobNexusDsl marks the root and every nested receiver to prevent accidental outer-receiver mutation.\nBuilders are pure and reusable only until build(); they perform no IO, scope creation, channel creation, coroutine launch, or platform detection.\nNested builders write typed JobNexusK facets through one root builder. They do not return independent partial runtimes.\nRequired policies are supplied explicitly or resolved from the Confix schema default. Kotlin-only fallback defaults are forbidden.\nState-bearing channels always resolve to finite capacity plus SUSPEND; only a telemetry facet may request a lossy overflow policy.\nindexes { fromContract() } consumes schema index annotations. The DSL cannot relabel triangular hashing as Elastic/Funnel or override an immutable/mutable workload incompatibly.\nbuild() returns JobNexusSpec; a separate open() is required for effects. The convenience DSL remains a one-line delegation, not a second implementation.\nValidation errors carry schema path, offending value, violated invariant, and source (DSL, builder, JSON, YAML, CBOR, or adapter) while retaining identical error codes.\nFactory rules\nJobNexusFactory is the public composition factory. Its component factories are narrow capability boundaries:\n\nCasStoreFactory\nJobLogFactory\nJobIndexFactory\nReteNetworkFactory\nJobProjectionFactory\nComponent factories receive a validated plan and required runtime bindings; they cannot invent policy. The default component set is replaceable only as a whole test/platform binding, preventing callers from assembling an incoherent half-default graph.\n\nFactory open order:\n\nrequire parentContext[Job] and all declared platform capabilities;\ncreate the root JobSupervisorElement in CREATED with SupervisorJob(parent);\ninstantiate unopened storage/channel children under that root;\nopen CAS/log and recover through the last durable sequence;\ncreate exact/range/prefix indexes from the schema plan and recovered checkpoint;\ncreate Rete and projections against the recovered committed tail;\nstart the single-writer reactor, then transition OPEN → ACTIVE;\nreturn only the active root element.\nAny failure closes already-opened components once in reverse order and rethrows a typed assembly error. No partially active handle escapes. The returned root owns drain/close authority; cancelling the supplied parent remains the external close authority.\n\nForge gesture / Couch request / transport frame / timer\n                         |\n                         v\n      bounded Channel&lt;Confix command frame&gt;  [SUSPEND]\n                         |\n                         v\n+-------------------------------------------------------------+\n| JobSupervisorElement : AsyncContextElement                   |\n| root SupervisorJob                                           |\n|                                                             |\n|  JobReactor (single writer)                                  |\n|    1. schema + revision validation                           |\n|    2. canonical CBOR + SHA-256                               |\n|    3. CAS put                                                |\n|    4. WAL append + durability barrier                        |\n|    5. pure JobReducer                                        |\n|    6. Linear/Elastic/Funnel + MultiIndex/radix projection    |\n|    7. committed sequence publication                         |\n|                                                             |\n|  ReteNetwork child                                           |\n|    working memory -&gt; alpha -&gt; beta -&gt; agenda -&gt; commands     |\n|                                                             |\n|  Projection child                                            |\n|    Couch heads/views + Forge Kanban cursor + observability   |\n|                                                             |\n|  Checkpoint child                                            |\n|    CAS-backed COW B+tree/ISAM root -&gt; backend checkpoint     |\n|                                                             |\n|  JobAttempt children                                         |\n|    one SupervisorJob(parent=root) per active attempt         |\n+-------------------------------------------------------------+\n             | committed live tail with sequence\n             +-----------------+--------------------+\n             v                 v                    v\n       Forge Kanban        Couch changes       diagnostics\n       pure projection     and query views     and explanations\nOwnership table\nConcern\tSole owner\tRecovery source\nAssembly policy\timmutable JobNexusSpec\tCanonical Confix configuration bytes\nRuntime construction/rollback\tJobNexusFactory\tRe-open from the same spec and bindings\nImmutable bytes and pages\tCasStore\tDigest-addressed blobs\nCommit order\tJobLog\tWAL scan to last valid CRC\nLogical job head\tJobReducer inside reactor\tSnapshot checkpoint + WAL tail\nMutable exact indexes\tLinearHashMap projections inside JobIndex\tRebuild from committed frames\nAppend-only exact indexes\tElastic/Funnel hash segments inside JobIndex\tRebuild from segment metadata plus committed frames\nOrdered/range/prefix indexes\tCOW B+tree and radix projections inside JobIndex\tRebuild from checkpoint root plus committed tail\nPersistent index root\tCAS-backed COW B+tree\tLast durable checkpoint root\nCoroutine lifetime\tJobSupervisorElement\tReconstructed from nonterminal snapshots\nRete working memory and agenda\tReteNetwork\tRebuild from committed facts/rules\nCouch _id/_rev view\tCouch projection\tJob head and revision frames\nKanban board/card view\tJob Kanban projection\tJob snapshots and activation facts\nLinux extent/snapshot policy\tbtrfs adapter\tCheckpoint metadata and filesystem scan\nAssociative and exact-hash placement\nThe exact-hash layer is first-class; it is not replaced by the persistent B+tree.\n\nWorkload\tBacking\tRequired use\nMutable job heads, leases, Rete working memory, and indexes that retract\tLinearHashMap&lt;K, V&gt; with mixed hashes and same-capacity tombstone compaction\tO(1)-amortized live exact lookup under the reactor's single writer\nAppend-only, positive-query-heavy exact facet segment\tElasticHashIndex&lt;K&gt; implementing the paper's non-greedy two-dimensional probe family\tMultiIndex unique facets over immutable committed segments\nAppend-only, negative-query-heavy frozen facet segment\tFunnelHashIndex&lt;K&gt; implementing the paper's greedy multi-level layout\tCID/rule/schema membership and dedup admission where misses are common\nNon-unique exact facet\tselected exact map from key to immutable primitive position series\tRete join buckets, board/workspace groups, and Couch view duplicates\nOrdered/range facet\tCAS-backed COW B+tree\tdurable order and O(log n + k) range scans\nPrefix facet\tradix tree\tpath, schema, and hierarchical key prefix scans\nElasticHashIndex and FunnelHashIndex are specialized key-to-position indexes, not general mutable maps. They expose no delete operation: logical updates append a new generation/tombstone, and compaction builds a new immutable segment. Persistent probe families hash canonical facet bytes with a committed per-index seed so replay is cross-target deterministic; they do not depend on platform hashCode().\n\nConfix frame families\nThe schema has a common envelope and $defs for these frame families:\n\ncommand: submit, start, progress, block, complete, fail, cancel, retry, move, acknowledge;\nevent: accepted/rejected command and lifecycle transitions;\nsnapshot: current logical job/attempt state;\nfact: asserted, modified, or retracted working-memory entry;\nactivation: rule, salience, supporting fact CIDs, state, explanation;\ncouchHead: _id, generation, head CID, deleted flag;\ncheckpoint: sequence, ordered-index root CID, hash-segment manifest/segment CIDs, schema CID, rule-set CID.\nRequired common facets:\n\nschemaVersion, frameKind, operation, workspaceId, jobId, attemptId,\nparentJobId, sequence, revision, expectedRevision, priorCid, cid,\nidempotencyKey, causalKey, lifecycle, dependencies, timestampMs,\nruleId, ruleVersion, activationId, supportCids, payload,\nlcncMode, slabFacet, indexSpecId, hashAlgorithm, hashFormatVersion,\nhashSeed, hashSegmentCid\nConfixFacetPlan compiles path, IOMemento, cardinality, requiredness, and index policy from schema annotations. Exact index policy is explicit (mutable, elastic-append, or funnel-frozen) alongside ordered, range, and prefix; it is not selected ad hoc by a caller. Consumers ask the same plan for values and index specs; they do not maintain their own field tables.\n\nLCNC placement\nLOGIC: schema validation, pure reducers, Rete predicates, lifecycle legality.\nCOMPUTATION: canonicalization, digesting, index maintenance, beta joins, reductions.\nNOTIFICATION: committed tail, Kanban/Couch projections, diagnostics.\nCOUPLING: CAS bytes, WAL, checkpoint barriers, btrfs operations.\nThe existing SlabFacet flags annotate storage intent (IMMUTABLE, WAL_ACTIVE, INDEXED, SNAPSHOT_ANCHOR, and related flags). The plan does not depend on TODO-bodied pointcut functions in FacetedCursorContract.kt.\n\n5. Supervisor tree and dependency DAG\nScope hierarchy and work dependency are deliberately different:\n\nthe SupervisorJob tree controls cancellation and failure containment;\nthe dependency DAG controls when integration work becomes ready.\nA dependency is never represented by making one work package the coroutine parent of another.\n\nSupervisorJob tree for implementation\nP0 unified-job-nexus\n|\n+-- G0 root-build-graph                         [preflight gate]\n+-- F0 contract-spine-and-vertical-proof       [depends G0]\n+-- E0 canonical-entrypoint-spec               [depends F0]\n|\n+-- S1 canonical-cbor-and-cas                  [sibling after E0]\n+-- S2 associative-optimal-hash-multi-index    [sibling after E0]\n+-- R1 ccek-supervisor-and-reactor              [sibling after E0]\n+-- P1 rete-production-network                 [sibling after E0]\n+-- V1 couch-and-kanban-projections             [sibling after E0]\n|\n+-- I1 durable-repository                       [depends E0,S1,S2,R1]\n+-- E1 canonical-runtime-factory                [depends I1,P1,V1]\n+-- I2 rules-to-supervised-work                 [depends E1]\n+-- B1 btrfs-tree-and-linux-backend             [depends S1,S2,I1]\n+-- C1 convergence-and-production-gates         [depends I2,B1]\nKanban lifecycle for the plan itself\nRuntime fact\tProject card column\nContract valid, dependencies incomplete\tCausal Blocked\nAll dependencies closed successfully\tCausal Ready\nChild scope active\tActive Work\nFailure or human decision required\tAttention\nImplementation complete, independent validator pending\tReview\nTests and runtime proof complete\tClosed\nRete rules derive readiness from dependency facts. Manual card movement cannot bypass a failed contract or missing runtime gate.\n\n6. Work packages\nEvery package follows RED → verify expected failure → GREEN → focused regression → adjacent regression. No production code is written before the failing behavior test exists.\n\nG0 — Root-only Gradle graph\nObjective\n\nMake the default Gradle graph describe the root project that actually exists, so every later RED/GREEN gate is executable and honest.\n\nModify\n\nsettings.gradle.kts\nRequired behavior\n\nDefault task discovery configures one root project and no absent subproject.\nOptional composite builds, if retained, cannot change or break the default root graph.\nNo deleted project path is recreated to satisfy settings.\nThe change touches settings only; it does not rehome source or alter dependencies.\nGate\n\n./gradlew projects\n./gradlew tasks --all\n./gradlew jvmJar --dry-run\nExit condition\n\nAll three commands exit successfully and projects reports only the root project. This gate closes before F0 begins.\n\nF0 — Contract spine and immediate vertical proof\nDepends on: G0.\n\nObjective\n\nProve one Confix command can be validated by one schema-derived facet plan, reduced to one snapshot/fact, and projected to one Kanban card without parallel field models.\n\nCreate\n\nsrc/commonMain/resources/confix/job-nexus.schema.json\nsrc/commonMain/kotlin/borg/trikeshed/confix/ConfixSchema.kt\nsrc/commonMain/kotlin/borg/trikeshed/confix/ConfixFacetPlan.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobFrame.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobReducer.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobProjection.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobFrameContractTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusVerticalCutTest.kt\nModify only if RED proves required\n\nsrc/commonMain/kotlin/borg/trikeshed/parse/confix/Confix.kt\nsrc/commonMain/kotlin/borg/trikeshed/parse/confix/ConfixKit.kt\nsrc/commonMain/kotlin/borg/trikeshed/parse/confix/ConfixIndexK.kt\nRED assertions\n\nThe schema compiles a facet plan with no hand-maintained job field table.\nEquivalent JSON, YAML, and CBOR command exemplars expose equal semantic facets.\nMissing jobId, invalid lifecycle, and wrong field type are rejected with path evidence.\nsubmit reduces to exactly one accepted event, one snapshot, and one fact.\nThe same snapshot projects to a card whose identity, dependencies, lifecycle, and causal key match the frame.\nReapplying the same idempotency key produces no second state transition.\nEvery indexed facet compiles a stable index ID, cardinality, and exact/order/range/prefix workload contract; no caller supplies a replacement lambda identity.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobFrameContractTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusVerticalCutTest'\nExit condition\n\nThe vertical test has one Confix source frame from input through reducer, fact, and card projection. No channel, persistence, or platform adapter is introduced in F0.\n\nE0 — Canonical DSL and builder specification\nDepends on: F0.\n\nObjective\n\nMake every declarative/programmatic configuration route produce one validated, immutable, schema-backed JobNexusSpec without opening any runtime resource.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusSpec.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusSpecBuilder.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusSpecDecoder.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusSpecValidator.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusDslParityTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusSpecValidationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusSpecRoundTripTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusBuilderPurityTest.kt\nModify\n\nsrc/commonMain/resources/confix/job-nexus.schema.json\nsrc/commonMain/kotlin/borg/trikeshed/confix/ConfixFacetPlan.kt\nSpec facets\n\ncontract/schema/rule-set CIDs and versions;\nsupervision dispatcher name, failure/restart policies, cycle/drain limits;\nchannel capacities, overflow class, owner, and close authority;\nstorage backend, codec, durability, paths/namespaces, and checkpoint policy;\nschema-derived exact/order/range/prefix IndexSpecs;\nRete partition/cycle/conflict policy;\nCouch and Forge Kanban projection enablement/catch-up policy;\noptional platform capability requirements.\nThe spec does not contain a CoroutineScope, dispatcher object, file handle, open store, channel, callback, or platform singleton. Runtime objects belong exclusively to JobNexusBindings and the factory.\n\nRED assertions\n\nDSL, fluent builder, equivalent JSON, YAML, and CBOR inputs produce facet-equal specs with identical fully resolved defaults.\nThe JobNexusSpec constructor is not publicly callable; only the validator can seal a draft.\nMissing parent-independent required policy, unknown facet, invalid capacity, state-channel loss policy, mutable/Elastic index mismatch, or unsupported durability combination returns the same error code/path from every input style.\nNested DSL receiver leakage fails compilation through @JobNexusDsl compile-test fixtures.\nbuild() freezes the builder; later mutation fails and cannot alter the returned spec.\nBuilding/decoding invokes no FileOperations, creates no Job, channel, scope, or coroutine, and performs no platform capability probe.\nSchema defaults are copied into the sealed spec rather than re-read by factories.\nDecode → spec → canonical Confix configuration → decode preserves every policy facet.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusDslParityTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusSpecValidationTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusSpecRoundTripTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusBuilderPurityTest'\n./gradlew jsNodeTest --tests 'borg.trikeshed.job.JobNexus*Test'\n./gradlew wasmJsNodeTest --tests 'borg.trikeshed.job.JobNexus*Test'\nExit condition\n\nOne sealed spec is the sole policy input accepted by downstream S1/S2/R1/P1/V1 work. No runtime factory exists yet in E0.\n\nS1 — Canonical CBOR and cryptographic CAS\nDepends on: E0.\n\nObjective\n\nMake content identity real, cross-syntax, collision-resistant, and verifiable.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/cas/ContentId.kt\nsrc/commonMain/kotlin/borg/trikeshed/cas/Sha256.kt\nsrc/commonMain/kotlin/borg/trikeshed/cas/ConfixCanonicalCbor.kt\nsrc/commonMain/kotlin/borg/trikeshed/cas/CasStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/cas/CasBlobIo.kt\nsrc/jvmMain/kotlin/borg/trikeshed/cas/JvmFileCasStore.kt\nsrc/posixMain/kotlin/borg/trikeshed/cas/PosixFileCasStore.kt\nsrc/jsMain/kotlin/borg/trikeshed/cas/IndexedDbCasStore.kt\nsrc/wasmJsMain/kotlin/borg/trikeshed/cas/IndexedDbCasStore.kt\nsrc/commonTest/kotlin/borg/trikeshed/cas/ContentIdTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/cas/ConfixCanonicalCborTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/cas/CasStoreContractTest.kt\nsrc/jvmTest/kotlin/borg/trikeshed/cas/JvmFileCasStoreTest.kt\nsrc/jsTest/kotlin/borg/trikeshed/cas/IndexedDbCasStoreTest.kt\nsrc/wasmJsTest/kotlin/borg/trikeshed/cas/IndexedDbCasStoreTest.kt\nsrc/jmhMain/kotlin/borg/trikeshed/cas/ConfixCasBenchmark.kt\nDesign\n\nSHA-256 output remains the full 32 bytes; display text is a reversible hex form.\nCanonical CBOR sorts map keys by canonical encoded bytes, uses deterministic numeric encodings, and distinguishes schema-significant numeric types.\nOriginal source bytes may be stored as a provenance blob, but they do not define semantic identity.\nput is idempotent; get recomputes and verifies the digest.\nJVM file reads may use a MemorySegment-backed Series&lt;Byte&gt; adapter at the materialization boundary. No manual Vector API is introduced.\nBrowser durability uses IndexedDB transactions through a CAS adapter rather than pretending a numeric file descriptor is durable.\nRED assertions\n\nEquivalent JSON/YAML/CBOR values produce one CID.\nDifferent schema-significant values produce different CIDs.\nMap insertion order cannot change a CID.\nA corrupted blob is rejected on read.\nRepeated put does not create duplicate content.\nA 1 MiB document is processed without per-byte boxed collections in the hot path.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.cas.*'\n./gradlew jsNodeTest --tests 'borg.trikeshed.cas.ContentIdTest'\n./gradlew wasmJsNodeTest --tests 'borg.trikeshed.cas.ContentIdTest'\n./gradlew jsBrowserTest wasmJsBrowserTest\n./gradlew jmh\nPerformance proof\n\nRecord throughput and allocation rate; use it as a regression baseline. The architectural gate is one canonical pass plus one digest pass, not an absolute laptop-specific latency number.\n\nS2 — Associative, optimal hashing, radix, and multi-index convergence\nDepends on: E0.\n\nObjective\n\nRestore the lost exact-hash tier, distinguish the live mutable triangular map from the paper's optimal insertion-only schemes, and make all exact/order/range/prefix projections stable and actor-confined.\n\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/collections/LinearHashMap.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/MultiIndexK.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/MultiIndexContainer.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/associative/trie/RadixTree.kt\nsrc/commonMain/kotlin/borg/trikeshed/graph/CausalGraphNode.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/MultiIndexContainerTest.kt (move the embedded LinearHashMapTest to its own test file)\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/collections/ElasticHashIndex.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/FunnelHashIndex.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/IndexSpec.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/HashIndex.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/MultiIndexSnapshot.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/LinearHashMapTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/ElasticHashIndexTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/FunnelHashIndexTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/OptimalHashIndexParityTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/MultiIndexMutationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/MultiIndexCardinalityTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/MultiIndexHashPolicyTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/associative/trie/RadixTreeLookupTest.kt\nsrc/jmhMain/kotlin/borg/trikeshed/collections/OptimalHashIndexBenchmark.kt\nRequired semantics\n\nStable index identity comes from schema facet ID, not extractor-lambda identity.\nLinearHashMap remains the mutable map: avalanche/mix raw hashCode() before masking, add an unambiguous containsKey, compact tombstones at the same capacity when live occupancy does not require growth, and bound probe loops by capacity.\nElasticHashIndex implements the paper's non-greedy two-dimensional probe sequence and batch/level occupancy rules; it is not an alias for triangular probing.\nFunnelHashIndex implements the paper's greedy geometric funnel levels and final-layer rule; it is not an alias for linear/quadratic probing.\nElastic/Funnel indexes are append-only segment builders. They have no delete/retract operation and make no deletion-era optimality claim.\nPersistent/frozen maps derive probe entropy from canonical facet bytes plus a committed seed; replay cannot depend on target-specific object identity or hash randomization.\nUnique and non-unique exact indexes are distinct contracts. Non-unique values are immutable primitive position series, not boxed lists.\nIndexSpec selects mutable exact, append-only elastic, append-only funnel, ordered, range, or prefix behavior from the schema facet contract.\nadd, modify, retract, tombstone, and immutable snapshot remain supported at MultiIndexContainer; append-only segment replacement happens through generation/tombstone compaction rather than map deletion.\nRange and order maintenance is incremental; an insert cannot sort the entire population.\nPrefix lookup returns a lazy Series&lt;Int&gt; over matching positions.\nA mutation transaction updates all indexes or none.\nContainer mutation remains single-writer under JobReactor; snapshots are safe for readers.\nCausalGraphNodeIndex.addOrGet emits only when a node was newly asserted or materially modified.\nRED assertions\n\ncustom keys with equal or low-bit-correlated hashes cannot create an infinite probe or an unreachable live key;\ndelete/reinsert churn compacts tombstones without doubling capacity when live occupancy is below the growth threshold;\ncontainsKey distinguishes an absent key from a present key mapped to null;\nElastic and Funnel layouts are deterministic for the same canonical keys, seed, capacity, and insertion order on JVM, JS, and Wasm;\nElastic positive-query probe counts and Funnel positive/negative-query probe counts are recorded at 50%, 75%, 90%, 95%, and 99% occupancy; finite measurements are regression evidence, not a substitute for the paper's assumptions/proof;\nall three exact-index implementations return identical positions on workloads supported by their contracts;\nduplicate non-unique keys return every live position;\nmodify removes stale keys from every index;\nretract removes a position from exact/range/prefix views without renumbering unrelated records;\na snapshot remains stable after later mutations;\ncomparator-count instrumentation proves insertion does not perform a full re-sort;\nduplicate causal construction does not enqueue a second assertion.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.collections.LinearHashMapTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.ElasticHashIndexTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.FunnelHashIndexTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.OptimalHashIndexParityTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.multiindex.*'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.associative.trie.*'\n./gradlew jvmTest --tests 'borg.trikeshed.graph.CausalGraphNodeIndexTest'\n./gradlew jsNodeTest --tests 'borg.trikeshed.collections.*Hash*Test'\n./gradlew wasmJsNodeTest --tests 'borg.trikeshed.collections.*Hash*Test'\n./gradlew jmh\nSelection gate\n\nThe two paper-grounded indexes both ship only because they have named consumers: Elastic backs positive-query-heavy immutable MultiIndex segments; Funnel backs negative-query-heavy frozen membership/dedup segments. If either role has no production call site after I1/P1 wiring, remove that implementation rather than retaining an unused algorithm.\n\nR1 — CCEK supervisor and single-writer Reactor\nDepends on: E0.\n\nObjective\n\nCreate the real composition root, repair detached scopes, bound state channels, and make shutdown a durable protocol.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/job/JobSupervisorElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobReactor.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobAttemptElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobChannels.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobSupervisorElementTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobReactorBackpressureTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobSupervisorDrainTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobLifecycleTransitionTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobBootstrapIsolationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/context/AsyncContextKeyUniquenessTest.kt\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/context/AsyncContextElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/context/ConcreteElements.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CCEK.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/SupervisorJob.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CcekScopeValidator.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/context/AsyncContextKey.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/LiburingElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/FanoutDispatcherElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorBootstrap.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteAgent.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/BlackboardDagCausalGraph.kt\nScope construction rule\n\nEvery child scope uses the parent job explicitly:\n\nchildJob = SupervisorJob(parentScope.coroutineContext[Job])\nchildContext = parentContext.minusKey(Job) + childJob + CoroutineName(...)\nNo production API provides CoroutineScope(SupervisorJob() + Dispatchers.Default) as a default argument.\n\nChannel rule\n\ncommand, committed-event, fact, and activation channels are bounded and suspend senders;\nchannel closure is owned by the element that created it;\nrejected sends are observable results, never ignored;\nonly telemetry may use drop overflow;\none coroutine owns reducer and mutable index application.\nDrain protocol\n\ntransition element to DRAINING;\nreject new external commands;\nprocess accepted commands to a durable result;\nrun the Rete agenda to quiescence within the configured cycle budget;\nflush WAL and checkpoint root;\nclose downstream channels;\njoin child attempts;\ncancel remaining children and transition CLOSED.\nCustom type convergence\n\nRename the observable helper so it cannot be confused with kotlinx.coroutines.Job. Migrate its consumers to StateFlow/committed-tail adapters, then remove the old callback list after zero usages remain.\n\nRED assertions\n\ncancelling the project root cancels all descendants;\nfailing one attempt leaves a sibling active and emits one failure command;\nchild scopes report the root as ancestor;\na full command buffer suspends rather than drops;\ndrain waits for accepted work and durability barrier;\nno command is accepted after draining begins;\nchannel owners close every channel exactly once;\nOPEN is observable before ACTIVE for every element lifecycle;\nconcurrent bootstraps own distinct child scopes and cannot overwrite process-global job state;\neach context capability has one key identity and one canonical element implementation.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobSupervisorElementTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobReactorBackpressureTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobSupervisorDrainTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobLifecycleTransitionTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobBootstrapIsolationTest'\n./gradlew jvmTest --tests 'borg.trikeshed.context.AsyncContextKeyUniquenessTest'\nP1 — Production-rule Rete network\nDepends on: E0.\n\nObjective\n\nReplace the flat per-node rule scan with an incremental, replayable production-rule network driven by Confix facets.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteWorkingMemory.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteAlphaMemory.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteBetaMemory.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteAgenda.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteTruthMaintenance.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteNetwork.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/JobProductions.kt\nsrc/commonMain/resources/confix/job-productions.json\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteWorkingMemoryTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteJoinTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteAgendaTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteTruthMaintenanceTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteReplayTest.kt\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteAgent.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteCausalBridge.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/BlackboardDagCausalGraph.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/BlackboardDagFabric.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CCEK.kt\nFeature matrix\n\nFeature\tRequired behavior\nWorking memory\tassert, modify, retract by stable fact ID and version CID\nAlpha network\tschema-facet predicate sharing; no repeated full rule scans\nBeta network\tindexed joins and token memories keyed by join facets\nexists / not\tactivation changes as supporting facts enter or leave\nAgenda\tdeterministic total order: salience, recency sequence, activation ID\nRefraction\tone rule/fact-version tuple fires once unless support changes\nTruth maintenance\tderived facts carry support activation/fact CIDs and retract transitively\nPartitioning\tworkspace/job partition prevents cross-board joins\nRule versioning\trules are CAS-addressed Confix records; activation records exact version\nExplanation\teach activation exposes rule, matched facets, support CIDs, and conflict rank\nReplay\tidentical committed input yields identical facts and activation order\nRete hash placement\n\nmutable working-memory identity, activation refraction, leases, and retractable beta buckets use LinearHashMap;\ncompiled immutable alpha-dispatch segments use ElasticHashIndex for positive rule/facet lookup;\nfrozen rule/version/support membership where misses dominate uses FunnelHashIndex;\nnon-unique beta join keys map to immutable primitive token-position series;\nan activation records the exact hash-segment algorithm/version/seed through its checkpoint, so replay cannot silently switch layouts.\nInitial job productions\n\nall dependencies succeeded → Ready command;\nany required dependency failed → Block command with evidence;\nready job plus available lease → Start command;\nlease expired → reclaim/fail-attempt command;\nWIP limit exceeded → block admission, not mutate the board;\ncompletion → assert terminal fact and reconsider dependents;\nhuman acknowledgement → unblock only at matching expected revision.\nAction boundary\n\nAn activation emits a Confix command to the reactor ingress. It never calls a board reducer, repository, or platform API directly.\n\nMigration\n\nReteAgent becomes a compatibility adapter over ReteNetwork while existing callers move. The old unbounded channel, callback action path, and default detached scope are removed after migration tests pass.\n\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteWorkingMemoryTest'\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteJoinTest'\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteAgendaTest'\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteTruthMaintenanceTest'\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteReplayTest'\nV1 — Couch and Forge Kanban projections\nDepends on: E0.\n\nObjective\n\nMake Couch and Kanban two views over committed job frames, with all user mutations returning through the command channel.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixRepositoryView.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/CouchHeadProjection.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/CouchChangesProjection.kt\nsrc/commonMain/kotlin/borg/trikeshed/kanban/JobKanbanProjection.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/net/kanban/ForgeKanbanJobSink.kt\nsrc/commonTest/kotlin/borg/trikeshed/couch/CouchHeadProjectionTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/couch/CouchChangesProjectionTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/kanban/JobKanbanProjectionTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/forge/net/kanban/ForgeKanbanJobSinkTest.kt\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixDocStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/CouchStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixPersistence.kt\nsrc/commonMain/kotlin/borg/trikeshed/kanban/ForgeBoardFSM.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/KanbanFSM.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/net/kanban/ForgeKanbanConduit.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ForgePersistence.kt\nsrc/commonMain/kotlin/borg/trikeshed/graal/ConfixBlackboard.kt\nCouch semantics\n\n_id points to the current head CID.\n_rev is generation-cidPrefix, derived from committed ancestry.\nupdate/delete requires expected _rev; mismatch commits a rejection event.\ndelete commits a tombstone; it does not erase history.\n_changes is the durable sequence projection and resumes after a supplied sequence.\nattachments are CAS blobs referenced from document metadata.\nview indexes are schema-declared index projections, not independent maps.\nbrowser offline state stores canonical blobs and head records, not a separate board snapshot/WAL format.\nKanban mapping\n\nJob state/fact\tColumn/view\nsubmitted, unmet dependencies\tCausal Blocked\nready activation\tCausal Ready\nactive attempt\tActive Work\nblocked, failed, acknowledgement required\tAttention\nterminal with validation pending\tReview\nsucceeded and validated\tClosed\nEach card carries jobId, revision, snapshotCid, causalKey, parent/child links, dependencies, active attempt, and current activation explanation. Rete activations may render as overlays/child rows, but they do not become a separate work source.\n\nRED assertions\n\nCouch create/update/delete round trips through commands and committed events.\nStale _rev cannot move the head.\n_changes resumes without duplicates or gaps.\nA job snapshot projects to the same card after replay.\nMoving a card emits one command with expected revision and does not mutate the projection before commit.\nRepeated idempotency key returns the prior result.\nA missed live-tail event is recovered by sequence.\nGlobal board reducers can be rebuilt from the log and own no independent mutation API.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.couch.CouchHeadProjectionTest'\n./gradlew jvmTest --tests 'borg.trikeshed.couch.CouchChangesProjectionTest'\n./gradlew jvmTest --tests 'borg.trikeshed.kanban.JobKanbanProjectionTest'\n./gradlew jvmTest --tests 'borg.trikeshed.forge.net.kanban.ForgeKanbanJobSinkTest'\nI1 — Durable repository, WAL, checkpoint, and COW B+tree\nDepends on: E0, S1, S2, R1.\n\nObjective\n\nCompose CAS, the append log, live indexes, and persistent tree roots into an atomic repository without making the repository the runtime supervisor or rule engine.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/job/JobRepository.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/CommittedJobFrame.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/DurableAppendLog.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/btree/CowBPlusTree.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/btree/CowBPlusTreeCodec.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/HashSegmentManifest.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobCheckpoint.kt\nsrc/jvmMain/kotlin/borg/trikeshed/couch/isam/JvmDurableAppendLog.kt\nsrc/posixMain/kotlin/borg/trikeshed/couch/isam/PosixDurableAppendLog.kt\nsrc/jsMain/kotlin/borg/trikeshed/couch/isam/IndexedDbDurableLog.kt\nsrc/wasmJsMain/kotlin/borg/trikeshed/couch/isam/IndexedDbDurableLog.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/btree/CowBPlusTreeTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/HashSegmentCheckpointTest.kt\nsrc/jvmTest/kotlin/borg/trikeshed/job/JobRepositoryRecoveryTest.kt\nsrc/jvmTest/kotlin/borg/trikeshed/couch/isam/DurableAppendLogTest.kt\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/ConfixWal.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/ConfixIsamFactory.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/ConfixIsamIsomorphism.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/nio/file/spi/FileOperations.kt only if a capability required by the durable-log contract cannot be expressed by the narrower platform adapter.\nWAL frame\n\nmagic | version | sequence | payloadLength | canonical Confix event bytes | crc32c\nCAS snapshot/page blobs are durable before a WAL record references them. Replay stops at the last complete valid frame, ignores an unreferenced CAS blob, and never publishes a torn record.\n\nCOW B+tree role\n\nkey: (facetId, encodedFacetValue, jobId, revision);\nvalue: record/snapshot CID plus sequence;\nimmutable pages stored in CAS;\nroot CID committed by checkpoint frame;\nordered/range/prefix queries materialize Series views;\npage split/merge is deterministic so replay creates the same root CID.\nExact lookup does not detour through the B+tree when a hash segment exists. Each checkpoint records the mutable-index rebuild sequence plus every immutable hash segment's algorithm, format version, canonical-key codec, seed, occupancy/δ, segment CID, and superseded generation. Elastic/Funnel segment bytes are CAS objects and therefore participate in the same durability and replay ordering as tree pages.\n\nThis is a Btrfs-style copy-on-write tree in an application-owned format. It never writes filesystem metadata blocks directly.\n\nCrash matrix\n\nTests interrupt at each boundary:\n\nCAS blob absent;\nCAS blob present, WAL absent;\npartial WAL header;\npartial WAL payload;\nbad CRC;\nWAL committed, live index absent;\ncheckpoint root present, head pointer stale;\ncheckpoint complete, old WAL still present;\nhash segment manifest present, segment blob absent/corrupt;\nhash segment algorithm/seed metadata differs from its committed bytes;\nreplay repeated twice.\nEach recovery must yield one deterministic head, sequence, index root, and activation input set.\n\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.collections.btree.CowBPlusTreeTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.multiindex.HashSegmentCheckpointTest'\n./gradlew jvmTest --tests 'borg.trikeshed.couch.isam.DurableAppendLogTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobRepositoryRecoveryTest'\nE1 — Canonical runtime factory and compatibility convergence\nDepends on: I1, P1, V1.\n\nObjective\n\nMake JobNexusFactory.open the one effectful composition boundary and route every whole-system convenience/compatibility entrypoint through it.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusBindings.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusComponentFactories.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusFactory.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusEntrypointParityTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusFactoryLifecycleTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusFactoryRollbackTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusCapabilityValidationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusCompatibilityEntrypointTest.kt\nModify or adapt\n\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CCEK.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorBootstrap.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/CouchStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixDocStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/ConfixIsamFactory.kt\nNarrow store constructors may remain for isolated component tests, but they are not product assembly entrypoints. Whole-system initializers become adapters that form/receive a JobNexusSpec and call the canonical factory. The incomplete ISAM “Factory DSEL” is removed or becomes a spec adapter only after I1 gives it a real repository path.\n\nFactory bindings\n\nJobNexusBindings supplies runtime-only dependencies that cannot live in canonical configuration:\n\nrequired parent CoroutineContext containing a Job;\ndispatcher registry resolving names from the sealed spec;\nFileOperations, clock, entropy/probe-seed verifier, and platform capability report;\none coherent JobNexusComponentFactories set for platform/test substitution.\nThe component set provides CAS, log, index, Rete, and projection factories. A component factory receives only its typed plan facet, the shared bindings, and its parent element; it cannot consult environment variables or select a different policy silently.\n\nRED assertions\n\nDSL, fluent builder, JSON/YAML/CBOR decoder, direct factory, scoped convenience, and migrated compatibility adapters yield the same component creation/open trace for one spec.\nMissing parent Job, dispatcher binding, file capability, browser transaction capability, Linux storage capability, or declared durability primitive fails before the first child opens.\nA failure injected at each assembly stage closes every previously opened component exactly once in reverse order and leaks no coroutine/channel/file handle.\nThe returned JobSupervisorElement is ACTIVE; commands cannot enter during recovery or partial assembly.\nParent cancellation drains/cancels all descendants; closing the returned root does not cancel an externally owned parent.\nTwo concurrent opens of the same spec under different parents create isolated roots with no process-global current instance.\nJobIndexFactory realizes mutable/Elastic/Funnel/order/range/prefix policies exactly as sealed in IndexSpec and rejects incompatible component substitutions.\nFactories consume resolved defaults from the spec and never call a builder or schema decoder internally.\nExisting component-level tests remain possible without presenting their constructors as alternate whole-system semantics.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusEntrypointParityTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusFactoryLifecycleTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusFactoryRollbackTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusCapabilityValidationTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusCompatibilityEntrypointTest'\n./gradlew jsNodeTest --tests 'borg.trikeshed.job.JobNexus*Test'\n./gradlew wasmJsNodeTest --tests 'borg.trikeshed.job.JobNexus*Test'\nExit condition\n\nThere is one observabl
