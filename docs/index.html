odeId":"V1", "opId":"kanban-work-package", "opVersion":"forge-ingest-v1", "parentNodeIds":["E0"], "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE0\u001fsha256:1ef1f0f71c9996808778505b412679f8d3c073cab6aa60d6bb39d070e7f4af12\u001fforge-jim\u001f", "topoOrdinal":7, "causalClock":7}, {"nodeId":"I1", "opId":"kanban-work-package", "opVersion":"forge-ingest-v1", "parentNodeIds":["E0", "R1", "S1", "S2"], "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE0\u001eR1\u001eS1\u001eS2\u001fsha256:0887207da4324036a2a02893409ef27e805274b957baaaad1443142f2940677d\u001fforge-jim\u001f", "topoOrdinal":8, "causalClock":8}, {"nodeId":"E1", "opId":"kanban-work-package", "opVersion":"forge-ingest-v1", "parentNodeIds":["I1", "P1", "V1"], "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fI1\u001eP1\u001eV1\u001fsha256:53fe2d571d0304f97636ab1a6b85b456d4503bffba9ec397e7f55e99d9458370\u001fforge-jim\u001f", "topoOrdinal":9, "causalClock":9}, {"nodeId":"I2", "opId":"kanban-work-package", "opVersion":"forge-ingest-v1", "parentNodeIds":["E1"], "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE1\u001fsha256:32b5dd98766b13e8a6bb037ac532419057e86dca2dbec89f67450f8d1f325048\u001fforge-jim\u001f", "topoOrdinal":10, "causalClock":10}, {"nodeId":"B1", "opId":"kanban-work-package", "opVersion":"forge-ingest-v1", "parentNodeIds":["I1", "S1", "S2"], "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fI1\u001eS1\u001eS2\u001fsha256:15f855e51ff7a4c1885e09e85ea734fc2b8b7ec13cd89efae1dbcf4c3a4bf97e\u001fforge-jim\u001f", "topoOrdinal":11, "causalClock":11}, {"nodeId":"C1", "opId":"kanban-work-package", "opVersion":"forge-ingest-v1", "parentNodeIds":["B1", "I2"], "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fB1\u001eI2\u001fsha256:81ed3551cb016aefd0eaad76b5621f6a2eb106b90a26f36ec5a2a5a72f645616\u001fforge-jim\u001f", "topoOrdinal":12, "causalClock":12}], "lcncEntities":[{"entityId":"task:G0", "lcncKind":"work-package", "lane":"ready", "facet":"ready", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001f\u001fsha256:6bef351bb3d4bcaf8ce3ed662c4f378841d1b6957e1cb1e453bb7ac9c6e3b4fc\u001fforge-jim\u001f", "title":"G0 — Root-only Gradle graph", "description":"G0 — Root-only Gradle graph\nObjective\n\nMake the default Gradle graph describe the root project that actually exists, so every later RED/GREEN gate is executable and honest.\n\nModify\n\nsettings.gradle.kts\nRequired behavior\n\nDefault task discovery configures one root project and no absent subproject.\nOptional composite builds, if retained, cannot change or break the default root graph.\nNo deleted project path is recreated to satisfy settings.\nThe change touches settings only; it does not rehome source or alter dependencies.\nGate\n\n./gradlew projects\n./gradlew tasks --all\n./gradlew jvmJar --dry-run\nExit condition\n\nAll three commands exit successfully and projects reports only the root project. This gate closes before F0 begins."}, {"entityId":"task:F0", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fG0\u001fsha256:3494392c233b3a1c25cab72c8840e7112f495fe3535e950eadb1c719b1095877\u001fforge-jim\u001f", "title":"F0 — Contract spine and immediate vertical proof", "description":"F0 — Contract spine and immediate vertical proof\nDepends on: G0.\n\nObjective\n\nProve one Confix command can be validated by one schema-derived facet plan, reduced to one snapshot/fact, and projected to one Kanban card without parallel field models.\n\nCreate\n\nsrc/commonMain/resources/confix/job-nexus.schema.json\nsrc/commonMain/kotlin/borg/trikeshed/confix/ConfixSchema.kt\nsrc/commonMain/kotlin/borg/trikeshed/confix/ConfixFacetPlan.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobFrame.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobReducer.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobProjection.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobFrameContractTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusVerticalCutTest.kt\nModify only if RED proves required\n\nsrc/commonMain/kotlin/borg/trikeshed/parse/confix/Confix.kt\nsrc/commonMain/kotlin/borg/trikeshed/parse/confix/ConfixKit.kt\nsrc/commonMain/kotlin/borg/trikeshed/parse/confix/ConfixIndexK.kt\nRED assertions\n\nThe schema compiles a facet plan with no hand-maintained job field table.\nEquivalent JSON, YAML, and CBOR command exemplars expose equal semantic facets.\nMissing jobId, invalid lifecycle, and wrong field type are rejected with path evidence.\nsubmit reduces to exactly one accepted event, one snapshot, and one fact.\nThe same snapshot projects to a card whose identity, dependencies, lifecycle, and causal key match the frame.\nReapplying the same idempotency key produces no second state transition.\nEvery indexed facet compiles a stable index ID, cardinality, and exact/order/range/prefix workload contract; no caller supplies a replacement lambda identity.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobFrameContractTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusVerticalCutTest'\nExit condition\n\nThe vertical test has one Confix source frame from input through reducer, fact, and card projection. No channel, persistence, or platform adapter is introduced in F0."}, {"entityId":"task:E0", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fF0\u001fsha256:5aff1ebb3df8b79a81b594f44dcb1d9ed1998cb19396be14533a2734a818d204\u001fforge-jim\u001f", "title":"E0 — Canonical DSL and builder specification", "description":"E0 — Canonical DSL and builder specification\nDepends on: F0.\n\nObjective\n\nMake every declarative/programmatic configuration route produce one validated, immutable, schema-backed JobNexusSpec without opening any runtime resource.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusSpec.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusSpecBuilder.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusSpecDecoder.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusSpecValidator.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusDslParityTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusSpecValidationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusSpecRoundTripTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusBuilderPurityTest.kt\nModify\n\nsrc/commonMain/resources/confix/job-nexus.schema.json\nsrc/commonMain/kotlin/borg/trikeshed/confix/ConfixFacetPlan.kt\nSpec facets\n\ncontract/schema/rule-set CIDs and versions;\nsupervision dispatcher name, failure/restart policies, cycle/drain limits;\nchannel capacities, overflow class, owner, and close authority;\nstorage backend, codec, durability, paths/namespaces, and checkpoint policy;\nschema-derived exact/order/range/prefix IndexSpecs;\nRete partition/cycle/conflict policy;\nCouch and Forge Kanban projection enablement/catch-up policy;\noptional platform capability requirements.\nThe spec does not contain a CoroutineScope, dispatcher object, file handle, open store, channel, callback, or platform singleton. Runtime objects belong exclusively to JobNexusBindings and the factory.\n\nRED assertions\n\nDSL, fluent builder, equivalent JSON, YAML, and CBOR inputs produce facet-equal specs with identical fully resolved defaults.\nThe JobNexusSpec constructor is not publicly callable; only the validator can seal a draft.\nMissing parent-independent required policy, unknown facet, invalid capacity, state-channel loss policy, mutable/Elastic index mismatch, or unsupported durability combination returns the same error code/path from every input style.\nNested DSL receiver leakage fails compilation through @JobNexusDsl compile-test fixtures.\nbuild() freezes the builder; later mutation fails and cannot alter the returned spec.\nBuilding/decoding invokes no FileOperations, creates no Job, channel, scope, or coroutine, and performs no platform capability probe.\nSchema defaults are copied into the sealed spec rather than re-read by factories.\nDecode → spec → canonical Confix configuration → decode preserves every policy facet.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusDslParityTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusSpecValidationTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusSpecRoundTripTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusBuilderPurityTest'\n./gradlew jsNodeTest --tests 'borg.trikeshed.job.JobNexus*Test'\n./gradlew wasmJsNodeTest --tests 'borg.trikeshed.job.JobNexus*Test'\nExit condition\n\nOne sealed spec is the sole policy input accepted by downstream S1/S2/R1/P1/V1 work. No runtime factory exists yet in E0."}, {"entityId":"task:S1", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE0\u001fsha256:c2ff0c95c256640347ea5ba60712b2cb4ad59ca9b782bb480f0d2958051e77e3\u001fforge-jim\u001f", "title":"S1 — Canonical CBOR and cryptographic CAS", "description":"S1 — Canonical CBOR and cryptographic CAS\nDepends on: E0.\n\nObjective\n\nMake content identity real, cross-syntax, collision-resistant, and verifiable.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/cas/ContentId.kt\nsrc/commonMain/kotlin/borg/trikeshed/cas/Sha256.kt\nsrc/commonMain/kotlin/borg/trikeshed/cas/ConfixCanonicalCbor.kt\nsrc/commonMain/kotlin/borg/trikeshed/cas/CasStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/cas/CasBlobIo.kt\nsrc/jvmMain/kotlin/borg/trikeshed/cas/JvmFileCasStore.kt\nsrc/posixMain/kotlin/borg/trikeshed/cas/PosixFileCasStore.kt\nsrc/jsMain/kotlin/borg/trikeshed/cas/IndexedDbCasStore.kt\nsrc/wasmJsMain/kotlin/borg/trikeshed/cas/IndexedDbCasStore.kt\nsrc/commonTest/kotlin/borg/trikeshed/cas/ContentIdTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/cas/ConfixCanonicalCborTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/cas/CasStoreContractTest.kt\nsrc/jvmTest/kotlin/borg/trikeshed/cas/JvmFileCasStoreTest.kt\nsrc/jsTest/kotlin/borg/trikeshed/cas/IndexedDbCasStoreTest.kt\nsrc/wasmJsTest/kotlin/borg/trikeshed/cas/IndexedDbCasStoreTest.kt\nsrc/jmhMain/kotlin/borg/trikeshed/cas/ConfixCasBenchmark.kt\nDesign\n\nSHA-256 output remains the full 32 bytes; display text is a reversible hex form.\nCanonical CBOR sorts map keys by canonical encoded bytes, uses deterministic numeric encodings, and distinguishes schema-significant numeric types.\nOriginal source bytes may be stored as a provenance blob, but they do not define semantic identity.\nput is idempotent; get recomputes and verifies the digest.\nJVM file reads may use a MemorySegment-backed Series&lt;Byte&gt; adapter at the materialization boundary. No manual Vector API is introduced.\nBrowser durability uses IndexedDB transactions through a CAS adapter rather than pretending a numeric file descriptor is durable.\nRED assertions\n\nEquivalent JSON/YAML/CBOR values produce one CID.\nDifferent schema-significant values produce different CIDs.\nMap insertion order cannot change a CID.\nA corrupted blob is rejected on read.\nRepeated put does not create duplicate content.\nA 1 MiB document is processed without per-byte boxed collections in the hot path.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.cas.*'\n./gradlew jsNodeTest --tests 'borg.trikeshed.cas.ContentIdTest'\n./gradlew wasmJsNodeTest --tests 'borg.trikeshed.cas.ContentIdTest'\n./gradlew jsBrowserTest wasmJsBrowserTest\n./gradlew jmh\nPerformance proof\n\nRecord throughput and allocation rate; use it as a regression baseline. The architectural gate is one canonical pass plus one digest pass, not an absolute laptop-specific latency number."}, {"entityId":"task:S2", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE0\u001fsha256:e3bc09e8ffadc55ef233fa28ee1b86865bf2e46e29644f380cba90063c41d087\u001fforge-jim\u001f", "title":"S2 — Associative, optimal hashing, radix, and multi-index convergence", "description":"S2 — Associative, optimal hashing, radix, and multi-index convergence\nDepends on: E0.\n\nObjective\n\nRestore the lost exact-hash tier, distinguish the live mutable triangular map from the paper's optimal insertion-only schemes, and make all exact/order/range/prefix projections stable and actor-confined.\n\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/collections/LinearHashMap.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/MultiIndexK.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/MultiIndexContainer.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/associative/trie/RadixTree.kt\nsrc/commonMain/kotlin/borg/trikeshed/graph/CausalGraphNode.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/MultiIndexContainerTest.kt (move the embedded LinearHashMapTest to its own test file)\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/collections/ElasticHashIndex.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/FunnelHashIndex.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/IndexSpec.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/HashIndex.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/MultiIndexSnapshot.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/LinearHashMapTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/ElasticHashIndexTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/FunnelHashIndexTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/OptimalHashIndexParityTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/MultiIndexMutationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/MultiIndexCardinalityTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/MultiIndexHashPolicyTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/associative/trie/RadixTreeLookupTest.kt\nsrc/jmhMain/kotlin/borg/trikeshed/collections/OptimalHashIndexBenchmark.kt\nRequired semantics\n\nStable index identity comes from schema facet ID, not extractor-lambda identity.\nLinearHashMap remains the mutable map: avalanche/mix raw hashCode() before masking, add an unambiguous containsKey, compact tombstones at the same capacity when live occupancy does not require growth, and bound probe loops by capacity.\nElasticHashIndex implements the paper's non-greedy two-dimensional probe sequence and batch/level occupancy rules; it is not an alias for triangular probing.\nFunnelHashIndex implements the paper's greedy geometric funnel levels and final-layer rule; it is not an alias for linear/quadratic probing.\nElastic/Funnel indexes are append-only segment builders. They have no delete/retract operation and make no deletion-era optimality claim.\nPersistent/frozen maps derive probe entropy from canonical facet bytes plus a committed seed; replay cannot depend on target-specific object identity or hash randomization.\nUnique and non-unique exact indexes are distinct contracts. Non-unique values are immutable primitive position series, not boxed lists.\nIndexSpec selects mutable exact, append-only elastic, append-only funnel, ordered, range, or prefix behavior from the schema facet contract.\nadd, modify, retract, tombstone, and immutable snapshot remain supported at MultiIndexContainer; append-only segment replacement happens through generation/tombstone compaction rather than map deletion.\nRange and order maintenance is incremental; an insert cannot sort the entire population.\nPrefix lookup returns a lazy Series&lt;Int&gt; over matching positions.\nA mutation transaction updates all indexes or none.\nContainer mutation remains single-writer under JobReactor; snapshots are safe for readers.\nCausalGraphNodeIndex.addOrGet emits only when a node was newly asserted or materially modified.\nRED assertions\n\ncustom keys with equal or low-bit-correlated hashes cannot create an infinite probe or an unreachable live key;\ndelete/reinsert churn compacts tombstones without doubling capacity when live occupancy is below the growth threshold;\ncontainsKey distinguishes an absent key from a present key mapped to null;\nElastic and Funnel layouts are deterministic for the same canonical keys, seed, capacity, and insertion order on JVM, JS, and Wasm;\nElastic positive-query probe counts and Funnel positive/negative-query probe counts are recorded at 50%, 75%, 90%, 95%, and 99% occupancy; finite measurements are regression evidence, not a substitute for the paper's assumptions/proof;\nall three exact-index implementations return identical positions on workloads supported by their contracts;\nduplicate non-unique keys return every live position;\nmodify removes stale keys from every index;\nretract removes a position from exact/range/prefix views without renumbering unrelated records;\na snapshot remains stable after later mutations;\ncomparator-count instrumentation proves insertion does not perform a full re-sort;\nduplicate causal construction does not enqueue a second assertion.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.collections.LinearHashMapTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.ElasticHashIndexTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.FunnelHashIndexTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.OptimalHashIndexParityTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.multiindex.*'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.associative.trie.*'\n./gradlew jvmTest --tests 'borg.trikeshed.graph.CausalGraphNodeIndexTest'\n./gradlew jsNodeTest --tests 'borg.trikeshed.collections.*Hash*Test'\n./gradlew wasmJsNodeTest --tests 'borg.trikeshed.collections.*Hash*Test'\n./gradlew jmh\nSelection gate\n\nThe two paper-grounded indexes both ship only because they have named consumers: Elastic backs positive-query-heavy immutable MultiIndex segments; Funnel backs negative-query-heavy frozen membership/dedup segments. If either role has no production call site after I1/P1 wiring, remove that implementation rather than retaining an unused algorithm."}, {"entityId":"task:R1", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE0\u001fsha256:da30a25d7c0fa83432d26af57a8c381e1aadead8699828f966c9de141615cf8b\u001fforge-jim\u001f", "title":"R1 — CCEK supervisor and single-writer Reactor", "description":"R1 — CCEK supervisor and single-writer Reactor\nDepends on: E0.\n\nObjective\n\nCreate the real composition root, repair detached scopes, bound state channels, and make shutdown a durable protocol.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/job/JobSupervisorElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobReactor.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobAttemptElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobChannels.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobSupervisorElementTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobReactorBackpressureTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobSupervisorDrainTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobLifecycleTransitionTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobBootstrapIsolationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/context/AsyncContextKeyUniquenessTest.kt\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/context/AsyncContextElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/context/ConcreteElements.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CCEK.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/SupervisorJob.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CcekScopeValidator.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/context/AsyncContextKey.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/LiburingElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/FanoutDispatcherElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorBootstrap.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteAgent.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/BlackboardDagCausalGraph.kt\nScope construction rule\n\nEvery child scope uses the parent job explicitly:\n\nchildJob = SupervisorJob(parentScope.coroutineContext[Job])\nchildContext = parentContext.minusKey(Job) + childJob + CoroutineName(...)\nNo production API provides CoroutineScope(SupervisorJob() + Dispatchers.Default) as a default argument.\n\nChannel rule\n\ncommand, committed-event, fact, and activation channels are bounded and suspend senders;\nchannel closure is owned by the element that created it;\nrejected sends are observable results, never ignored;\nonly telemetry may use drop overflow;\none coroutine owns reducer and mutable index application.\nDrain protocol\n\ntransition element to DRAINING;\nreject new external commands;\nprocess accepted commands to a durable result;\nrun the Rete agenda to quiescence within the configured cycle budget;\nflush WAL and checkpoint root;\nclose downstream channels;\njoin child attempts;\ncancel remaining children and transition CLOSED.\nCustom type convergence\n\nRename the observable helper so it cannot be confused with kotlinx.coroutines.Job. Migrate its consumers to StateFlow/committed-tail adapters, then remove the old callback list after zero usages remain.\n\nRED assertions\n\ncancelling the project root cancels all descendants;\nfailing one attempt leaves a sibling active and emits one failure command;\nchild scopes report the root as ancestor;\na full command buffer suspends rather than drops;\ndrain waits for accepted work and durability barrier;\nno command is accepted after draining begins;\nchannel owners close every channel exactly once;\nOPEN is observable before ACTIVE for every element lifecycle;\nconcurrent bootstraps own distinct child scopes and cannot overwrite process-global job state;\neach context capability has one key identity and one canonical element implementation.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobSupervisorElementTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobReactorBackpressureTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobSupervisorDrainTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobLifecycleTransitionTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobBootstrapIsolationTest'\n./gradlew jvmTest --tests 'borg.trikeshed.context.AsyncContextKeyUniquenessTest'"}, {"entityId":"task:P1", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE0\u001fsha256:cf8bea26a2c14a4a5a00d8956c8ea852886033464f65e2b229ea87daec1046a7\u001fforge-jim\u001f", "title":"P1 — Production-rule Rete network", "description":"P1 — Production-rule Rete network\nDepends on: E0.\n\nObjective\n\nReplace the flat per-node rule scan with an incremental, replayable production-rule network driven by Confix facets.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteWorkingMemory.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteAlphaMemory.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteBetaMemory.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteAgenda.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteTruthMaintenance.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteNetwork.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/JobProductions.kt\nsrc/commonMain/resources/confix/job-productions.json\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteWorkingMemoryTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteJoinTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteAgendaTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteTruthMaintenanceTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/dag/ReteReplayTest.kt\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteAgent.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/ReteCausalBridge.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/BlackboardDagCausalGraph.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/BlackboardDagFabric.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CCEK.kt\nFeature matrix\n\nFeature\tRequired behavior\nWorking memory\tassert, modify, retract by stable fact ID and version CID\nAlpha network\tschema-facet predicate sharing; no repeated full rule scans\nBeta network\tindexed joins and token memories keyed by join facets\nexists / not\tactivation changes as supporting facts enter or leave\nAgenda\tdeterministic total order: salience, recency sequence, activation ID\nRefraction\tone rule/fact-version tuple fires once unless support changes\nTruth maintenance\tderived facts carry support activation/fact CIDs and retract transitively\nPartitioning\tworkspace/job partition prevents cross-board joins\nRule versioning\trules are CAS-addressed Confix records; activation records exact version\nExplanation\teach activation exposes rule, matched facets, support CIDs, and conflict rank\nReplay\tidentical committed input yields identical facts and activation order\nRete hash placement\n\nmutable working-memory identity, activation refraction, leases, and retractable beta buckets use LinearHashMap;\ncompiled immutable alpha-dispatch segments use ElasticHashIndex for positive rule/facet lookup;\nfrozen rule/version/support membership where misses dominate uses FunnelHashIndex;\nnon-unique beta join keys map to immutable primitive token-position series;\nan activation records the exact hash-segment algorithm/version/seed through its checkpoint, so replay cannot silently switch layouts.\nInitial job productions\n\nall dependencies succeeded → Ready command;\nany required dependency failed → Block command with evidence;\nready job plus available lease → Start command;\nlease expired → reclaim/fail-attempt command;\nWIP limit exceeded → block admission, not mutate the board;\ncompletion → assert terminal fact and reconsider dependents;\nhuman acknowledgement → unblock only at matching expected revision.\nAction boundary\n\nAn activation emits a Confix command to the reactor ingress. It never calls a board reducer, repository, or platform API directly.\n\nMigration\n\nReteAgent becomes a compatibility adapter over ReteNetwork while existing callers move. The old unbounded channel, callback action path, and default detached scope are removed after migration tests pass.\n\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteWorkingMemoryTest'\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteJoinTest'\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteAgendaTest'\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteTruthMaintenanceTest'\n./gradlew jvmTest --tests 'borg.trikeshed.dag.ReteReplayTest'"}, {"entityId":"task:V1", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE0\u001fsha256:1ef1f0f71c9996808778505b412679f8d3c073cab6aa60d6bb39d070e7f4af12\u001fforge-jim\u001f", "title":"V1 — Couch and Forge Kanban projections", "description":"V1 — Couch and Forge Kanban projections\nDepends on: E0.\n\nObjective\n\nMake Couch and Kanban two views over committed job frames, with all user mutations returning through the command channel.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixRepositoryView.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/CouchHeadProjection.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/CouchChangesProjection.kt\nsrc/commonMain/kotlin/borg/trikeshed/kanban/JobKanbanProjection.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/net/kanban/ForgeKanbanJobSink.kt\nsrc/commonTest/kotlin/borg/trikeshed/couch/CouchHeadProjectionTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/couch/CouchChangesProjectionTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/kanban/JobKanbanProjectionTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/forge/net/kanban/ForgeKanbanJobSinkTest.kt\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixDocStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/CouchStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixPersistence.kt\nsrc/commonMain/kotlin/borg/trikeshed/kanban/ForgeBoardFSM.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/KanbanFSM.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/net/kanban/ForgeKanbanConduit.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ForgePersistence.kt\nsrc/commonMain/kotlin/borg/trikeshed/graal/ConfixBlackboard.kt\nCouch semantics\n\n_id points to the current head CID.\n_rev is generation-cidPrefix, derived from committed ancestry.\nupdate/delete requires expected _rev; mismatch commits a rejection event.\ndelete commits a tombstone; it does not erase history.\n_changes is the durable sequence projection and resumes after a supplied sequence.\nattachments are CAS blobs referenced from document metadata.\nview indexes are schema-declared index projections, not independent maps.\nbrowser offline state stores canonical blobs and head records, not a separate board snapshot/WAL format.\nKanban mapping\n\nJob state/fact\tColumn/view\nsubmitted, unmet dependencies\tCausal Blocked\nready activation\tCausal Ready\nactive attempt\tActive Work\nblocked, failed, acknowledgement required\tAttention\nterminal with validation pending\tReview\nsucceeded and validated\tClosed\nEach card carries jobId, revision, snapshotCid, causalKey, parent/child links, dependencies, active attempt, and current activation explanation. Rete activations may render as overlays/child rows, but they do not become a separate work source.\n\nRED assertions\n\nCouch create/update/delete round trips through commands and committed events.\nStale _rev cannot move the head.\n_changes resumes without duplicates or gaps.\nA job snapshot projects to the same card after replay.\nMoving a card emits one command with expected revision and does not mutate the projection before commit.\nRepeated idempotency key returns the prior result.\nA missed live-tail event is recovered by sequence.\nGlobal board reducers can be rebuilt from the log and own no independent mutation API.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.couch.CouchHeadProjectionTest'\n./gradlew jvmTest --tests 'borg.trikeshed.couch.CouchChangesProjectionTest'\n./gradlew jvmTest --tests 'borg.trikeshed.kanban.JobKanbanProjectionTest'\n./gradlew jvmTest --tests 'borg.trikeshed.forge.net.kanban.ForgeKanbanJobSinkTest'"}, {"entityId":"task:I1", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE0\u001eR1\u001eS1\u001eS2\u001fsha256:0887207da4324036a2a02893409ef27e805274b957baaaad1443142f2940677d\u001fforge-jim\u001f", "title":"I1 — Durable repository, WAL, checkpoint, and COW B+tree", "description":"I1 — Durable repository, WAL, checkpoint, and COW B+tree\nDepends on: E0, S1, S2, R1.\n\nObjective\n\nCompose CAS, the append log, live indexes, and persistent tree roots into an atomic repository without making the repository the runtime supervisor or rule engine.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/job/JobRepository.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/CommittedJobFrame.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/DurableAppendLog.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/btree/CowBPlusTree.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/btree/CowBPlusTreeCodec.kt\nsrc/commonMain/kotlin/borg/trikeshed/collections/multiindex/HashSegmentManifest.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobCheckpoint.kt\nsrc/jvmMain/kotlin/borg/trikeshed/couch/isam/JvmDurableAppendLog.kt\nsrc/posixMain/kotlin/borg/trikeshed/couch/isam/PosixDurableAppendLog.kt\nsrc/jsMain/kotlin/borg/trikeshed/couch/isam/IndexedDbDurableLog.kt\nsrc/wasmJsMain/kotlin/borg/trikeshed/couch/isam/IndexedDbDurableLog.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/btree/CowBPlusTreeTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/collections/multiindex/HashSegmentCheckpointTest.kt\nsrc/jvmTest/kotlin/borg/trikeshed/job/JobRepositoryRecoveryTest.kt\nsrc/jvmTest/kotlin/borg/trikeshed/couch/isam/DurableAppendLogTest.kt\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/ConfixWal.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/ConfixIsamFactory.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/ConfixIsamIsomorphism.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/nio/file/spi/FileOperations.kt only if a capability required by the durable-log contract cannot be expressed by the narrower platform adapter.\nWAL frame\n\nmagic | version | sequence | payloadLength | canonical Confix event bytes | crc32c\nCAS snapshot/page blobs are durable before a WAL record references them. Replay stops at the last complete valid frame, ignores an unreferenced CAS blob, and never publishes a torn record.\n\nCOW B+tree role\n\nkey: (facetId, encodedFacetValue, jobId, revision);\nvalue: record/snapshot CID plus sequence;\nimmutable pages stored in CAS;\nroot CID committed by checkpoint frame;\nordered/range/prefix queries materialize Series views;\npage split/merge is deterministic so replay creates the same root CID.\nExact lookup does not detour through the B+tree when a hash segment exists. Each checkpoint records the mutable-index rebuild sequence plus every immutable hash segment's algorithm, format version, canonical-key codec, seed, occupancy/δ, segment CID, and superseded generation. Elastic/Funnel segment bytes are CAS objects and therefore participate in the same durability and replay ordering as tree pages.\n\nThis is a Btrfs-style copy-on-write tree in an application-owned format. It never writes filesystem metadata blocks directly.\n\nCrash matrix\n\nTests interrupt at each boundary:\n\nCAS blob absent;\nCAS blob present, WAL absent;\npartial WAL header;\npartial WAL payload;\nbad CRC;\nWAL committed, live index absent;\ncheckpoint root present, head pointer stale;\ncheckpoint complete, old WAL still present;\nhash segment manifest present, segment blob absent/corrupt;\nhash segment algorithm/seed metadata differs from its committed bytes;\nreplay repeated twice.\nEach recovery must yield one deterministic head, sequence, index root, and activation input set.\n\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.collections.btree.CowBPlusTreeTest'\n./gradlew jvmTest --tests 'borg.trikeshed.collections.multiindex.HashSegmentCheckpointTest'\n./gradlew jvmTest --tests 'borg.trikeshed.couch.isam.DurableAppendLogTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobRepositoryRecoveryTest'"}, {"entityId":"task:E1", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fI1\u001eP1\u001eV1\u001fsha256:53fe2d571d0304f97636ab1a6b85b456d4503bffba9ec397e7f55e99d9458370\u001fforge-jim\u001f", "title":"E1 — Canonical runtime factory and compatibility convergence", "description":"E1 — Canonical runtime factory and compatibility convergence\nDepends on: I1, P1, V1.\n\nObjective\n\nMake JobNexusFactory.open the one effectful composition boundary and route every whole-system convenience/compatibility entrypoint through it.\n\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusBindings.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusComponentFactories.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobNexusFactory.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusEntrypointParityTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusFactoryLifecycleTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusFactoryRollbackTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusCapabilityValidationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusCompatibilityEntrypointTest.kt\nModify or adapt\n\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CCEK.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorBootstrap.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/reactor/MuxReactorElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/CouchStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixDocStore.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/isam/ConfixIsamFactory.kt\nNarrow store constructors may remain for isolated component tests, but they are not product assembly entrypoints. Whole-system initializers become adapters that form/receive a JobNexusSpec and call the canonical factory. The incomplete ISAM “Factory DSEL” is removed or becomes a spec adapter only after I1 gives it a real repository path.\n\nFactory bindings\n\nJobNexusBindings supplies runtime-only dependencies that cannot live in canonical configuration:\n\nrequired parent CoroutineContext containing a Job;\ndispatcher registry resolving names from the sealed spec;\nFileOperations, clock, entropy/probe-seed verifier, and platform capability report;\none coherent JobNexusComponentFactories set for platform/test substitution.\nThe component set provides CAS, log, index, Rete, and projection factories. A component factory receives only its typed plan facet, the shared bindings, and its parent element; it cannot consult environment variables or select a different policy silently.\n\nRED assertions\n\nDSL, fluent builder, JSON/YAML/CBOR decoder, direct factory, scoped convenience, and migrated compatibility adapters yield the same component creation/open trace for one spec.\nMissing parent Job, dispatcher binding, file capability, browser transaction capability, Linux storage capability, or declared durability primitive fails before the first child opens.\nA failure injected at each assembly stage closes every previously opened component exactly once in reverse order and leaks no coroutine/channel/file handle.\nThe returned JobSupervisorElement is ACTIVE; commands cannot enter during recovery or partial assembly.\nParent cancellation drains/cancels all descendants; closing the returned root does not cancel an externally owned parent.\nTwo concurrent opens of the same spec under different parents create isolated roots with no process-global current instance.\nJobIndexFactory realizes mutable/Elastic/Funnel/order/range/prefix policies exactly as sealed in IndexSpec and rejects incompatible component substitutions.\nFactories consume resolved defaults from the spec and never call a builder or schema decoder internally.\nExisting component-level tests remain possible without presenting their constructors as alternate whole-system semantics.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusEntrypointParityTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusFactoryLifecycleTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusFactoryRollbackTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusCapabilityValidationTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusCompatibilityEntrypointTest'\n./gradlew jsNodeTest --tests 'borg.trikeshed.job.JobNexus*Test'\n./gradlew wasmJsNodeTest --tests 'borg.trikeshed.job.JobNexus*Test'\nExit condition\n\nThere is one observable assembly order, one ownership tree, and one rollback protocol regardless of entry syntax. No compatibility route owns mutable global scope or storage state."}, {"entityId":"task:I2", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fE1\u001fsha256:32b5dd98766b13e8a6bb037ac532419057e86dca2dbec89f67450f8d1f325048\u001fforge-jim\u001f", "title":"I2 — Rules to supervised work to projections", "description":"I2 — Rules to supervised work to projections\nDepends on: E1.\n\nObjective\n\nClose the production vertical path from a durable command through Rete activation and a supervised attempt back to Couch and Kanban.\n\nCreate\n\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusIntegrationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusDslIntegrationTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusRestartTest.kt\nsrc/commonTest/kotlin/borg/trikeshed/job/JobNexusFailureIsolationTest.kt\nModify\n\nsrc/commonMain/kotlin/borg/trikeshed/job/JobSupervisorElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/job/JobReactor.kt\nsrc/commonMain/kotlin/borg/trikeshed/dag/JobProductions.kt\nsrc/commonMain/kotlin/borg/trikeshed/kanban/JobKanbanProjection.kt\nsrc/commonMain/kotlin/borg/trikeshed/couch/ConfixRepositoryView.kt\nsrc/commonMain/kotlin/borg/trikeshed/forge/ccek/ccek/CCEK.kt\nRequired end-to-end sequence\n\nbuild one canonical spec through the DSL and an equivalent decoded Confix configuration and prove equal resolved facets;\nopen both through JobNexusFactory under separate parents and prove equivalent component graphs;\nsubmit parent plus two independent children;\ncommit snapshots and dependency facts;\nRete promotes both children in parallel;\nsupervisor creates sibling attempt scopes;\none child succeeds and one fails;\nsuccessful sibling remains committed and active projections remain available;\nfailure commits evidence and blocks dependent integration;\nretry creates a new AttemptId, preserving prior attempt history;\nsuccessful retry retracts failure support, derives readiness, and unblocks integration;\nKanban and Couch views converge from committed sequence;\nprocess restart through the factory reconstructs the same heads, indexes, Rete agenda, and card view.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusIntegrationTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusDslIntegrationTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusRestartTest'\n./gradlew jvmTest --tests 'borg.trikeshed.job.JobNexusFailureIsolationTest'"}, {"entityId":"task:B1", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fI1\u001eS1\u001eS2\u001fsha256:15f855e51ff7a4c1885e09e85ea734fc2b8b7ec13cd89efae1dbcf4c3a4bf97e\u001fforge-jim\u001f", "title":"B1 — Btrfs tree codec and Linux physical backend", "description":"B1 — Btrfs tree codec and Linux physical backend\nDepends on: S1, S2, I1.\n\nObjective\n\nMake btrfs a real, safe coupling layer for CAS/checkpoint storage and physical facet observation while keeping logical correctness portable.\n\nConverge first\n\nretain one BtrfsCodecElement under borg.trikeshed.userspace.btrfs;\ngive it its own companion CoroutineContext.Key;\nremove the incompatible duplicate element and legacy key entry after usage migration;\nmake endian APIs use one buffer shape;\nexpose Linux storage only as a CasStoreFactory/checkpoint capability selected by the sealed storage plan and supplied through JobNexusBindings; do not add another whole-system entrypoint.\nCreate\n\nsrc/commonMain/kotlin/borg/trikeshed/userspace/btrfs/BtrfsTreeKey.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/btrfs/BtrfsTreeCodec.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/btrfs/BtrfsTreeReader.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/btrfs/BtrfsCheckpointElement.kt\nsrc/linuxX64Main/kotlin/borg/trikeshed/userspace/btrfs/LinuxBtrfsCasStore.kt\nsrc/linuxX64Main/kotlin/borg/trikeshed/userspace/btrfs/LinuxBtrfsSnapshotOps.kt\nsrc/commonTest/kotlin/borg/trikeshed/btrfs/BtrfsTreeCodecTest.kt\nsrc/linuxX64Test/kotlin/borg/trikeshed/userspace/btrfs/LinuxBtrfsCasStoreTest.kt\nModify or remove\n\nsrc/commonMain/kotlin/borg/trikeshed/userspace/btrfs/BtrfsCodecElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/context/BtrfsCodecElement.kt\nsrc/commonMain/kotlin/borg/trikeshed/userspace/context/AsyncContextKey.kt\nsrc/commonMain/kotlin/borg/trikeshed/classfile/slab/btrfs/TinyBtrfsContract.kt\nsrc/commonTest/kotlin/borg/trikeshed/userspace/btrfs/BtrfsCodecElementContractTest.kt\nEvery remaining operation from TinyBtrfsContract.kt must be either:\n\nimplemented by a Linux adapter and proven against an isolated filesystem image; or\nremoved because it has no production caller.\nNo code writes raw filesystem tree metadata. Safe operations are ordinary blob files plus verified snapshot/reflink/dedup/ioctl boundaries.\n\nFacet mapping\n\nCAS blob: IMMUTABLE;\nactive WAL: WAL_ACTIVE;\nCOW tree root: INDEXED | PERSISTENT;\ncheckpoint subvolume: SNAPSHOT_ANCHOR;\nverified duplicate extents: DEDUP_CANDIDATE plus physical evidence;\nstorage class decisions remain metadata until the backend reports success.\nRED assertions\n\nGolden leaf/internal-node bytes parse to exact keys and item bounds.\nMalformed offsets and endian errors are rejected.\nContext lookup returns the one canonical codec element.\nCAS put/get on Linux verifies CID after restart.\nSnapshot checkpoint preserves prior root while new writes advance head.\nA sibling job continues if checkpointing fails; the failure is committed and visible.\nSelecting the Linux backend through DSL, fluent builder, or decoded Confix configuration reaches the same factory binding and fails before open when the capability is absent.\nGate\n\n./gradlew jvmTest --tests 'borg.trikeshed.btrfs.BtrfsTreeCodecTest'\n# Execute on Linux, on an isolated btrfs filesystem image:\n./gradlew linuxX64Test\nNo Linux runtime claim is made from the macOS host."}, {"entityId":"task:C1", "lcncKind":"work-package", "lane":"todo", "facet":"dependency-gated", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fB1\u001eI2\u001fsha256:81ed3551cb016aefd0eaad76b5621f6a2eb106b90a26f36ec5a2a5a72f645616\u001fforge-jim\u001f", "title":"C1 — Convergence, deletion of parallel truths, and production gates", "description":"C1 — Convergence, deletion of parallel truths, and production gates\nDepends on: I2, B1.\n\nObjective\n\nMigrate all callers, remove parallel state/event paths, expose honest test tasks, and prove bounded operation, recovery, and performance.\n\nMigration order\n\nSeal JobNexusSpec construction behind the shared builder/decoder/validator.\nMake JobNexusFactory the only whole-system effectful assembly path; migrate convenience entrypoints to delegation.\nNew repository becomes the only writer.\nExisting Couch, workspace, board, and conduit APIs delegate to commands/queries without dual-write.\nExisting callers migrate to committed frames and sequence-aware tails.\nGlobal board/reactor reducer mutation entry points become pure projection functions or are removed.\nOld callback observables, duplicate codec elements, detached scope defaults, and old flat Rete action path are removed after zero usages.\nDuplicate context keys and overlapping fanout/completion element definitions are converged to one implementation per capability.\nTODO-bodied production-path types are implemented or deleted.\nTest exclusions are narrowed so live job/CCEK/btrfs codec tests execute in ordinary target tasks; native-only transport tests remain target-scoped.\nStatic checks\n\nno Channel.UNLIMITED in the job/Rete/Forge mutation path;\nno DROP_OLDEST for commands, committed events, facts, or activations;\nno detached default CoroutineScope in job/Rete APIs;\nno direct Kanban mutation outside projection/command adapters;\nno custom type named SupervisorJob outside kotlinx.coroutines imports;\nno duplicate context-key object or parallel element implementation for one capability;\nno CAS identifier narrower than 256 bits;\nno persistent Elastic/Funnel segment derives probes from platform hashCode() or exposes delete/retract;\nno source/comment labels triangular LinearHashMap as the paper's Elastic/Funnel implementation;\nevery active ByHash facet has an explicit stable IndexSpec and unique/non-unique cardinality;\nno public JobNexusSpec constructor or policy default outside the schema/builder/validator path;\nno builder/DSL/decoder performs IO, launches a coroutine, creates a scope/channel, or probes platform state;\nno product call site assembles repository/reactor/Rete/projections except JobNexusFactory;\nno compatibility initializer retains global current-scope/current-instance state or bypasses factory rollback;\nno production call site reaches a TODO body;\nno second hand-maintained job schema field list.\nLoad and determinism gates\n\n100,000 committed frames with bounded heap and zero sequence gaps.\n10,000 concurrent submit attempts resolve through one actor without lost updates.\nLinear/Elastic/Funnel probe histograms are captured at the declared occupancy points for random, sequential, low-bit-correlated, and equal-hash keys; regressions are compared by role, not by one blended average.\nDSL, fluent builder, JSON, YAML, and CBOR produce byte-equal canonical specs and the same factory graph across JVM, JS, and Wasm.\nFactory failure injection at every open stage leaves zero live children/resources and preserves reverse-close order.\nMulti-index comparator counts follow incremental bounds rather than population-wide re-sort per insert.\nReplay yields byte-equal snapshot CIDs, hash-segment CIDs/layouts, B+tree root CID, and activation order.\nSlow projection consumer catches up by sequence without blocking commit indefinitely.\nChild failure storms do not cancel the root and do not create duplicate retries.\nCheckpoint plus restart does not rescan pre-checkpoint frames except for verification.\nTarget gates\n\n./gradlew jvmTest\n./gradlew jsNodeTest\n./gradlew wasmJsNodeTest\n./gradlew compileKotlinLinuxX64\n./gradlew jmh\n# On Linux:\n./gradlew linuxX64Test\nBefore claiming completion, inspect the live task graph and confirm each named suite actually ran; a source-set declaration or compile-only result is insufficient."}], "blackboardId":"forge-jim", "surfaceRows":[{"cardId":"task:G0", "lane":"col-causal-ready", "phase":"pre-agent", "facet":"ready", "provenance":"confix", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001f\u001fsha256:6bef351bb3d4bcaf8ce3ed662c4f378841d1b6957e1cb1e453bb7ac9c6e3b4fc\u001fforge-jim\u001f", "lcncKind":"work-package"}, {"cardId":"task:B1", "lane":"col-causal-blocked", "phase":"pre-agent", "facet":"dependency-gated", "provenance":"confix", "causalKey":"kanban-work-package\u001fforge-ingest-v1\u001fI1\u001eS1\u001eS2\u001fsha256:15f855e51ff7a4c1885e09e85ea734fc2b8b7ec13cd89efae1dbcf4c3a4bf97e\u001fforge-ji /* Forge workspace — block editor shell.
 * Consumes the baked seed (forge-seed JSON) for initial content,
 * persists workspace state to localStorage, renders a block-based
 * document editor with sidebar navigation, slash commands, and a
 * board view over the same items.
 */
(function () {
  'use strict';
(() => {
  const STORAGE_KEY = 'forge.workspace.v4';
  const CACHE_NAME = 'forge-webcache-v1';
  const SNAPSHOT_CACHE_URL = './forge-workspace.snapshot.json';
  const DB_NAME = 'forge-local-first-v1';

  const SNAPSHOT_STORE = 'workspaceSnapshots';
  const EVENT_STORE = 'reactorEvents';
  const REACTOR_LOG_LIMIT = 24;
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const seed = JSON.parse(document.getElementById('forge-seed').textContent);
  let state = loadState();
  let camera = normalizeCamera(state.spatial.camera);
  let dragCamera = null;
  let cameraAnimationFrame = null;
  let cameraFrameTimestamp = 0;
  let cameraSavePending = false;
  let persistenceDbPromise = null;
  let persistenceWritePromise = Promise.resolve();
  let persistenceRotationSnapshot = null;

  // ── Blackboard MDI: pan/zoom camera + section drag ──
  const blackboard = document.getElementById('blackboard');
  const blackboardCanvas = document.getElementById('blackboard-canvas');
  let bbCamera = { x: 0, y: 0, zoom: 1 };
  let bbDragState = null;
  let bbSectionDrag = null;
  const bbSectionPositions = {};

  function applyBlackboardCamera() {
    if (!blackboardCanvas) return;
    blackboardCanvas.style.transform = 'translate(' + (-bbCamera.x * bbCamera.zoom) + 'px, ' + (-bbCamera.y * bbCamera.zoom) + 'px) scale(' + bbCamera.zoom + ')';
    const zoomPill = document.getElementById('hud-zoom-pill');
    if (zoomPill) zoomPill.textContent = bbCamera.zoom.toFixed(1) + '×';
  }

  function resetBlackboard() {
    bbCamera = { x: 0, y: 0, zoom: 1 };
    applyBlackboardCamera();
  }

  function bindBlackboardGestures() {
    if (!blackboard) return;
    // Pan on empty canvas
    blackboard.addEventListener('mousedown', (e) => {
      if (e.target.closest('.bb-hud') || e.target.closest('button') || e.target.closest('input')) return;
      if (e.target.closest('.panel')) return; // Don't pan when clicking inside sections
      bbDragState = { startX: e.clientX, startY: e.clientY, camX: bbCamera.x, camY: bbCamera.y };
      blackboard.style.cursor = 'grabbing';
    });
    // Section drag via header
    document.querySelectorAll('.panel').forEach(panel => {
      const header = panel.querySelector('.section-head');
      if (!header) return;
      header.style.cursor = 'grab';
      header.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        const rect = panel.getBoundingClientRect();
        const canvasRect = blackboardCanvas.getBoundingClientRect();
        const panelId = panel.id || panel.className.split(' ')[0];
        bbSectionDrag = {
          panel,
          startX: e.clientX,
          startY: e.clientY,
          origX: rect.left - canvasRect.left,
          origY: rect.top - canvasRect.top,
          panelId
        };
        header.style.cursor = 'grabbing';
        panel.style.zIndex = '20';
      });
    });
    window.addEventListener('mousemove', (e) => {
      if (bbSectionDrag) {
        const dx = (e.clientX - bbSectionDrag.startX) / bbCamera.zoom;
        const dy = (e.clientY - bbSectionDrag.startY) / bbCamera.zoom;
        const newX = bbSectionDrag.origX + dx;
        const newY = bbSectionDrag.origY + dy;
        bbSectionDrag.panel.style.position = 'absolute';
        bbSectionDrag.panel.style.left = newX + 'px';
        bbSectionDrag.panel.style.top = newY + 'px';
        bbSectionPositions[bbSectionDrag.panelId] = { x: newX, y: newY };
        return;
      }
      if (!bbDragState) return;
      const dx = (e.clientX - bbDragState.startX) / bbCamera.zoom;
      const dy = (e.clientY - bbDragState.startY) / bbCamera.zoom;
      bbCamera.x = bbDragState.camX - dx;
      bbCamera.y = bbDragState.camY - dy;
      applyBlackboardCamera();
    });
    window.addEventListener('mouseup', () => {
      if (bbSectionDrag) {
        const header = bbSectionDrag.panel.querySelector('.section-head');
        if (header) header.style.cursor = 'grab';
        bbSectionDrag.panel.style.zIndex = '';
        bbSectionDrag = null;
      }
      bbDragState = null;
      blackboard.style.cursor = '';
    });
    blackboard.addEventListener('wheel', (e) => {
      if (e.target.closest('.bb-hud')) return;
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      bbCamera.zoom = clamp(bbCamera.zoom * delta, 0.2, 4.0);
      applyBlackboardCamera();
    }, { passive: false });
  }

  function bindBlackboardHud() {
    document.getElementById('hud-reset')?.addEventListener('click', resetBlackboard);
    document.getElementById('hud-fit')?.addEventListener('click', () => {
      const content = document.querySelector('.app-shell');
      if (!content) return;
      const rect = content.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      bbCamera.zoom = Math.min(vw / rect.width, vh / rect.height) * 0.9;
      bbCamera.x = rect.left + rect.width / 2 - vw / (2 * bbCamera.zoom);
      bbCamera.y = rect.top + rect.height / 2 - vh / (2 * bbCamera.zoom);
      applyBlackboardCamera();
    });
    document.getElementById('hud-center')?.addEventListener('click', () => {
      bbCamera.x = 0;
      bbCamera.y = 0;
      applyBlackboardCamera();
    });
    document.getElementById('hud-depth')?.addEventListener('click', () => {
      // Cycle zoom levels for depth effect
      bbCamera.zoom = bbCamera.zoom === 1 ? 1.5 : bbCamera.zoom === 1.5 ? 0.7 : 1;
      applyBlackboardCamera();
    });
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.matches('input, textarea, select')) return;
    if (e.key === '0') resetBlackboard();
    else if (e.key === 'f') document.getElementById('hud-fit')?.click();
    else if (e.key === 'c') document.getElementById('hud-center')?.click();
    else if (e.key === 'd') document.getElementById('hud-depth')?.click();
  });

  // Init blackboard
  bindBlackboardGestures();
  bindBlackboardHud();
  applyBlackboardCamera();

  // ── Existing code below ──

  // ── Seed + persistence ──────────────────────────────────────────────
  const seedEl = document.getElementById('forge-seed');
  let seed = {};
  try { seed = JSON.parse(seedEl ? seedEl.textContent : '{}'); } catch (e) { seed = {}; }

  const LS_KEY = 'forge.workspace.v2';

  function uid() {
    return 'b' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
  }

  function defaultBlocks() {
    return [
      { id: uid(), type: 'h1', text: 'Welcome to Forge' },
      { id: uid(), type: 'p', text: 'This is your workspace. Documents, boards, and graphs are the same underlying content shown from different angles.' },
      { id: uid(), type: 'h2', text: 'Getting started' },
      { id: uid(), type: 'todo', text: 'Click a checkbox to mark it done', checked: false },
      { id: uid(), type: 'todo', text: 'Press / at the start of a line for block types', checked: false },
      { id: uid(), type: 'bullet', text: 'Everything persists locally — no server required' },
      { id: uid(), type: 'quote', text: 'The blackboard is the database. The projection is the page.' },
      { id: uid(), type: 'divider', text: '' },
      { id: uid(), type: 'code', text: '// blocks are typed\n// the graph is causal\n// the board is a projection' },
    ];
  }

  function blocksFromSeed() {
    const entities = Array.isArray(seed.lcncEntities) ? seed.lcncEntities : [];
    if (!entities.length) return null;
    const blocks = [{ id: uid(), type: 'h1', text: 'Ingested corpus' }];
    entities.slice(0, 40).forEach((e) => {
      const title = (e && (e.title || e.name || e.path)) || 'Untitled';
      const kind = (e && (e.lcncKind || e.kind)) || 'entity';
      blocks.push({ id: uid(), type: 'bullet', text: title + '  ·  ' + kind });
    });
    return blocks;
  }

  function defaultState() {
    const homeId = uid();
    return {
      pages: [
        { id: homeId, icon: '▤', title: '', blocks: blocksFromSeed() || defaultBlocks(), children: [] },
      ],
      activePageId: homeId,
      view: 'doc',
      board: {
        columns: [
          { id: 'todo', name: 'To do' },
          { id: 'doing', name: 'Doing' },
          { id: 'done', name: 'Done' },
        ],
        cards: seedCards(),
      },
    };
  }

  function seedCards() {
    const entities = Array.isArray(seed.lcncEntities) ? seed.lcncEntities : [];
    return entities.slice(0, 12).map((e, i) => ({
      id: uid(),
      title: (e && (e.title || e.name || e.path)) || ('Card ' + (i + 1)),
      column: i % 3 === 0 ? 'doing' : 'todo',
      meta: (e && (e.lcncKind || e.kind)) || '',
    }));
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (parsed && Array.isArray(parsed.pages) && parsed.pages.length) return parsed;
      }
    } catch (e) { /* fall through to default */ }
    return defaultState();
  }

  let state = loadState();

  function saveState() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) { /* quota */ }
  }

  // ── Element refs ────────────────────────────────────────────────────
  const pageTreeEl = document.getElementById('page-tree');
  const breadcrumbEl = document.getElementById('breadcrumb');
  const titleEl = document.getElementById('doc-title');
  const iconEl = document.getElementById('doc-icon');
  const blocksEl = document.getElementById('doc-blocks');
  const docScrollEl = document.getElementById('doc-scroll');
  const boardScrollEl = document.getElementById('board-scroll');
  const boardCanvasEl = document.getElementById('board-canvas');
  const slashMenuEl = document.getElementById('slash-menu');
  const seedNoteEl = document.getElementById('seed-note');

  // ── Block type definitions ──────────────────────────────────────────
  const BLOCK_TYPES = [
    { type: 'p',       name: 'Text',             desc: 'Plain paragraph',            icon: '¶',  placeholder: "Type '/' for commands" },
    { type: 'h1',      name: 'Heading 1',        desc: 'Big section heading',        icon: 'H1', placeholder: 'Heading 1' },
    { type: 'h2',      name: 'Heading 2',        desc: 'Medium section heading',     icon: 'H2', placeholder: 'Heading 2' },
    { type: 'h3',      name: 'Heading 3',        desc: 'Small section heading',      icon: 'H3', placeholder: 'Heading 3' },
    { type: 'todo',    name: 'To-do list',       desc: 'Track tasks with checkboxes', icon: '☑', placeholder: 'To-do' },
    { type: 'bullet',  name: 'Bulleted list',    desc: 'Simple bulleted list',       icon: '•',  placeholder: 'List item' },
    { type: 'numbered',name: 'Numbered list',    desc: 'Numbered list',              icon: '1.', placeholder: 'List item' },
    { type: 'quote',   name: 'Quote',            desc: 'Capture a quotation',        icon: '❝', placeholder: 'Quote' },
    { type: 'code',    name: 'Code',             desc: 'Code block with mono font',  icon: '</>',placeholder: 'Code' },
    { type: 'divider', name: 'Divider',          desc: 'Horizontal rule',            icon: '—', placeholder: '' },
  ];
  const typeDef = (t) => BLOCK_TYPES.find((d) => d.type === t) || BLOCK_TYPES[0];

  // ── Page helpers ────────────────────────────────────────────────────
  function activePage() {
    return state.pages.find((p) => p.id === state.activePageId) || state.pages[0];
  }

  function newPage(title) {
    const page = { id: uid(), icon: '▤', title: title || '', blocks: [], children: [] };
    state.pages.push(page);
    state.activePageId = page.id;
    saveState();
    return page;
  }

  // ── Render: sidebar ─────────────────────────────────────────────────
  function renderSidebar() {
    pageTreeEl.innerHTML = '';
    state.pages.forEach((page) => {
      const item = document.createElement('div');
      item.className = 'page-tree-item' + (page.id === state.activePageId ? ' active' : '');
      const toggle = document.createElement('span');
      toggle.className = 'tree-toggle';
      toggle.textContent = page.children && page.children.length ? '▾' : '▸';
      const icon = document.createElement('span');
      icon.className = 'tree-icon';
      icon.textContent = page.icon || '▤';
      const label = document.createElement('span');
      label.className = 'tree-label' + (page.title ? '' : ' untitled');
      label.textContent = page.title || 'Untitled';
      item.append(toggle, icon, label);
      item.addEventListener('click', () => {
        state.activePageId = page.id;
        saveState();
        renderAll();
      });
      pageTreeEl.appendChild(item);
    });
  }

  // ── Render: document ────────────────────────────────────────────────
  function renderTitle() {
    const page = activePage();
    if (titleEl.textContent !== page.title) titleEl.textContent = page.title;
    iconEl.textContent = page.icon || '▤';
    breadcrumbEl.textContent = 'Private  /  ' + (page.title || 'Untitled');
  }

  titleEl.addEventListener('input', () => {
    activePage().title = titleEl.textContent;
    saveState();
    renderSidebar();
    breadcrumbEl.textContent = 'Private  /  ' + (activePage().title || 'Untitled');
  });
  titleEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const page = activePage();
      if (page.blocks.length === 0) {
        page.blocks.push({ id: uid(), type: 'p', text: '' });
        saveState();
        renderBlocks();
        focusBlock(page.blocks[0].id, true);
      } else {
        focusBlock(page.blocks[0].id, false);
      }
    }
  });

  function renderBlocks() {
    const page = activePage();
    blocksEl.innerHTML = '';
    page.blocks.forEach((block, idx) => {
      blocksEl.appendChild(blockEl(block, idx));
    });
  }

  function blockEl(block, idx) {
    const def = typeDef(block.type);
    const el = document.createElement('div');
    el.className = 'block block-' + (block.type === 'p' ? 'p' : block.type);
    if (block.type === 'todo' && block.checked) el.classList.add('done');
    el.dataset.blockId = block.id;

    // gutter: + and drag handle
    const gutter = document.createElement('div');
    gutter.className = 'block-gutter';
    const addBtn = document.createElement('button');
    addBtn.className = 'gutter-btn';
    addBtn.textContent = '+';
    addBtn.title = 'Add block below';
    addBtn.addEventListener('click', () => {
      insertBlock(idx + 1, { id: uid(), type: 'p', text: '' });
      focusBlock(activePage().blocks[idx + 1].id, true);
    });
    const dragBtn = document.createElement('button');
    dragBtn.className = 'gutter-btn gutter-drag';
    dragBtn.textContent = '⋮⋮';
    dragBtn.title = 'Drag to reorder';
    gutter.append(addBtn, dragBtn);
    el.appendChild(gutter);

    if (block.type === 'divider') {
      el.appendChild(document.createElement('hr'));
      return el;
    }

    if (block.type === 'todo') {
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'todo-checkbox';
      cb.checked = !!block.checked;
      cb.addEventListener('change', () => {
        block.checked = cb.checked;
        saveState();
        el.classList.toggle('done', cb.checked);
      });
      el.appendChild(cb);
    }

    if (block.type === 'bullet' || block.type === 'numbered') {
      const marker = document.createElement('span');
      marker.className = 'bullet-marker';
      marker.textContent = block.type === 'bullet' ? '•' : (numberedIndex(idx) + '.');
      el.appendChild(marker);
    }

    const content = document.createElement('div');
    content.className = 'block-content';
    content.contentEditable = 'true';
    content.spellcheck = false;
    content.dataset.placeholder = def.placeholder;
    content.textContent = block.text || '';
    el.appendChild(content);

    content.addEventListener('input', () => {
      block.text = content.textContent;
      saveState();
      if (content.textContent === '/') openSlashMenu(block, el);
    });
    content.addEventListener('keydown', (e) => blockKeydown(e, block, idx, content));

    return el;
  }

  function numberedIndex(idx) {
    const blocks = activePage().blocks;
    let n = 1;
    for (let i = idx - 1; i >= 0; i--) {
      if (blocks[i].type === 'numbered') n++;
      else if (blocks[i].type !== 'numbered') break;
    }
    return n;
  }

  function blockKeydown(e, block, idx, content) {
    const page = activePage();
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      closeSlashMenu();
      // headings/quotes exit to paragraph on Enter
      const nextType = (block.type === 'h1' || block.type === 'h2' || block.type === 'h3' || block.type === 'quote') ? 'p' : block.type;
      const tail = content.textContent.slice(getCaretOffset(content));
      content.textContent = content.textContent.slice(0, getCaretOffset(content));
      block.text = content.textContent;
      const next = { id: uid(), type: nextType, text: tail, checked: false };
      insertBlock(idx + 1, next);
      focusBlock(next.id, true);
    } else if (e.key === 'Backspace' && content.textContent === '') {
      e.preventDefault();
      closeSlashMenu();
      const focusTarget = idx > 0 ? page.blocks[idx - 1].id : null;
      page.blocks.splice(idx, 1);
      if (page.blocks.length === 0) page.blocks.push({ id: uid(), type: 'p', text: '' });
      saveState();
      renderBlocks();
      if (focusTarget) focusBlock(focusTarget, false, true);
    } else if (e.key === 'Escape') {
      closeSlashMenu();
    } else if (slashMenuEl.hidden === false && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
      e.preventDefault();
      slashNav(e.key === 'ArrowDown' ? 1 : -1);
    } else if (slashMenuEl.hidden === false && e.key === 'Tab') {
      e.preventDefault();
      slashPick(activeSlashIndex);
    }
  }

  function getCaretOffset(el) {
    const sel = window.getSelection();
    if (!sel.rangeCount) return 0;
    const range = sel.getRangeAt(0).cloneRange();
    range.selectNodeContents(el);
    range.setEnd(sel.getRangeAt(0).endContainer, sel.getRangeAt(0).endOffset);
    return range.toString().length;
  }

  function focusBlock(blockId, atStart, atEnd) {
    const el = blocksEl.querySelector('[data-block-id="' + blockId + '"] .block-content');
    if (!el) return;
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(!!atStart);
    if (atEnd) range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function insertBlock(idx, block) {
    activePage().blocks.splice(idx, 0, block);
    saveState();
    renderBlocks();
  }

  // ── Slash menu ──────────────────────────────────────────────────────
  let slashBlock = null;
  let slashAnchor = null;
  let activeSlashIndex = 0;
  let slashFilter = '';

  function openSlashMenu(block, anchorEl) {
    slashBlock = block;
    slashAnchor = anchorEl;
    slashFilter = '';
    activeSlashIndex = 0;
    const rect = anchorEl.getBoundingClientRect();
    slashMenuEl.style.left = Math.max(8, rect.left) + 'px';
    slashMenuEl.style.top = (rect.bottom + 6) + 'px';
    renderSlashMenu();
    slashMenuEl.hidden = false;
  }

  function closeSlashMenu() {
    slashMenuEl.hidden = true;
    if (slashBlock) {
      const el = blocksEl.querySelector('[data-block-id="' + slashBlock.id + '"] .block-content');
      if (el && el.textContent === '/') { el.textContent = ''; slashBlock.text = ''; saveState(); }
    }
    slashBlock = null;
    slashAnchor = null;
  }

  function renderSlashMenu() {
    slashMenuEl.innerHTML = '<div class="slash-menu-label">Basic blocks</div>';
    const items = BLOCK_TYPES.filter((d) =>
      !slashFilter || d.name.toLowerCase().includes(slashFilter.toLowerCase())
    );
    items.forEach((d, i) => {
      const item = document.createElement('button');
      item.className = 'slash-item' + (i === activeSlashIndex ? ' active' : '');
      const icon = document.createElement('span');
      icon.className = 'slash-item-icon';
      icon.textContent = d.icon;
      const text = document.createElement('span');
      text.className = 'slash-item-text';
      const name = document.createElement('span');
      name.className = 'slash-item-name';
      name.textContent = d.name;
      const desc = document.createElement('span');
      desc.className = 'slash-item-desc';
      desc.textContent = d.desc;
      text.append(name, desc);
      item.append(icon, text);
      item.addEventListener('click', () => slashApply(d.type));
      slashMenuEl.appendChild(item);
    });
  }

  function slashNav(delta) {
    const count = slashMenuEl.querySelectorAll('.slash-item').length;
    if (!count) return;
    activeSlashIndex = (activeSlashIndex + delta + count) % count;
    renderSlashMenu();
  }

  function slashPick(i) {
    const items = BLOCK_TYPES.filter((d) =>
      !slashFilter || d.name.toLowerCase().includes(slashFilter.toLowerCase())
    );
    if (items[i]) slashApply(items[i].type);
  }

  function slashApply(type) {
    if (!slashBlock) { closeSlashMenu(); return; }
    slashBlock.type = type;
    slashBlock.text = '';
    if (type === 'todo') slashBlock.checked = false;
    saveState();
    closeSlashMenuSilent();
    renderBlocks();
    focusBlock(slashBlock.id, true);
  }

  function closeSlashMenuSilent() {
    slashMenuEl.hidden = true;
    slashBlock = null;
    slashAnchor = null;
  }

  document.addEventListener('mousedown', (e) => {
    if (!slashMenuEl.hidden && !slashMenuEl.contains(e.target)) closeSlashMenu();
  });

  // ── Render: board ───────────────────────────────────────────────────
  function renderBoard() {
    boardCanvasEl.innerHTML = '';
    state.board.columns.forEach((col) => {
      const colEl = document.createElement('div');
      colEl.className = 'board-column';
      const head = document.createElement('div');
      head.className = 'board-column-head';
      const name = document.createElement('span');
      name.textContent = col.name;
      const count = document.createElement('span');
      count.className = 'board-column-count';
      const cards = state.board.cards.filter((c) => c.column === col.id);
      count.textContent = cards.length;
      head.append(name, count);
      colEl.appendChild(head);

      const cardsEl = document.createElement('div');
      cardsEl.className = 'board-cards';
      cards.forEach((card) => {
        const cardEl = document.createElement('div');
        cardEl.className = 'board-card' + (col.id === 'done' ? ' done-card' : '');
        const title = document.createElement('div');
        title.className = 'board-card-title';
        title.textContent = card.title;
        cardEl.appendChild(title);
        if (card.meta) {
          const meta = document.createElement('div');
          meta.className = 'board-card-meta';
          meta.textContent = card.meta;
          cardEl.appendChild(meta);
        }
        cardEl.addEventListener('click', () => {
          // cycle columns on click for a lightweight gesture
          const order = state.board.columns.map((c) => c.id);
          const next = order[(order.indexOf(card.column) + 1) % order.length];
          card.column = next;
          saveState();
          renderBoard();
        });
        cardsEl.appendChild(cardEl);
      });
      colEl.appendChild(cardsEl);

      const addBtn = document.createElement('button');
      addBtn.className = 'board-add-card';
      addBtn.textContent = '+ New';
      addBtn.addEventListener('click', () => {
        state.board.cards.push({ id: uid(), title: '', column: col.id, meta: '' });
        saveState();
        renderBoard();
      });
      colEl.appendChild(addBtn);
      boardCanvasEl.appendChild(colEl);
    });
  }

  // ── View switching ──────────────────────────────────────────────────
  const viewDocBtn = document.getElementById('btn-view-doc');
  const viewBoardBtn = document.getElementById('btn-view-board');

  function setView(view) {
    state.view = view;
    saveState();
    docScrollEl.hidden = view !== 'doc';
    boardScrollEl.hidden = view !== 'board';
    viewDocBtn.classList.toggle('active', view === 'doc');
    viewBoardBtn.classList.toggle('active', view === 'board');
    if (view === 'board') renderBoard();
  }

  viewDocBtn.addEventListener('click', () => setView('doc'));
  viewBoardBtn.addEventListener('click', () => setView('board'));
  document.getElementById('btn-board').addEventListener('click', () => setView('board'));
  document.getElementById('btn-home').addEventListener('click', () => setView('doc'));
  document.getElementById('btn-new-page').addEventListener('click', () => {
    newPage();
    renderAll();
  });

  // ── Seed note ───────────────────────────────────────────────────────
  (function renderSeedNote() {
    const parts = [];
    if (Array.isArray(seed.lcncEntities) && seed.lcncEntities.length) {
      parts.push(seed.lcncEntities.length + ' entities');
    }
    if (Array.isArray(seed.causalNodes) && seed.causalNodes.length) {
      parts.push(seed.causalNodes.length + ' causal nodes');
    }
    if (seed.gallery) parts.push('gallery');
    seedNoteEl.textContent = parts.length ? 'Seed: ' + parts.join(' · ') : 'Local-first workspace';
  })();

  // ── Render all ──────────────────────────────────────────────────────
  function renderAll() {
    renderSidebar();
    renderTitle();
    renderBlocks();
    setView(state.view || 'doc');
  }

  renderAll();
})();

  </script>
</body>
</html>
