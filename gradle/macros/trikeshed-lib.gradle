buildscript {
    repositories {
        gradlePluginPortal()
        mavenCentral()
        google()
        maven { url = uri("https://oss.sonatype.org/content/repositories/snapshots/") }
        maven { url = uri("https://www.jitpack.io") }
    }
    dependencies {
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:2.4.0"
        classpath "org.jetbrains.compose:compose-gradle-plugin:1.7.3"
    }
}
 
def trikeshedVersion = "1.0"
def libVersion = "0.1.0-SNAPSHOT"
def kotlinVersion = "2.4.0"

def prop = { String name ->
    def value = rootProject.providers.gradleProperty(name).orNull
    if (value != null) return value
    if (rootProject.ext.has(name)) return rootProject.ext.get(name).toString()
    throw new GradleException("Missing Gradle property: ${name}")
}

def rootPeer = {
    rootProject.name == "TrikeShed" && project.path != ":"
        ? project(":")
        : "org.bereft:TrikeShed:${trikeshedVersion}"
}

def libPeer = { String name ->
    rootProject.findProject(":libs:${name}") ?: "borg.trikeshed:${name}:${libVersion}"
}

def nestedLibPeer = { String path, String artifact ->
    rootProject.findProject(path) ?: "borg.trikeshed:${artifact}:${libVersion}"
}

repositories {
    mavenCentral()
    mavenLocal()
    google()
    gradlePluginPortal()
    maven { url = uri("https://oss.sonatype.org/content/repositories/snapshots/") }
    maven { url = uri("https://www.jitpack.io") }
}

def configureCompiler = { kotlinExt, boolean expectActual ->
    def args = [
        "-opt-in=kotlin.RequiresOptIn",
        "-Xsuppress-version-warnings",
    ]
    if (expectActual) args.add("-Xexpect-actual-classes")
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompilationTask.class).configureEach {
        compilerOptions {
            apiVersion.set(org.jetbrains.kotlin.gradle.dsl.KotlinVersion.KOTLIN_2_4)
            languageVersion.set(org.jetbrains.kotlin.gradle.dsl.KotlinVersion.KOTLIN_2_4)
            freeCompilerArgs.addAll(args)
        }
    }
}

def standardKmpHostTargets = { kotlinExt, boolean executables ->
    kotlinExt.jvmToolchain(25)
    kotlinExt.jvm()
    kotlinExt.js {
        nodejs()
        if (executables) binaries.executable()
    }
    kotlinExt.wasmJs {
        nodejs()
        if (executables) binaries.executable()
    }
    def hostOs = System.getProperty("os.name")
    def hostArch = System.getProperty("os.arch")
    if (hostOs == "Mac OS X" && hostArch == "aarch64") {
        kotlinExt.macosArm64("macos")
    } else if (hostOs == "Linux") {
        kotlinExt.linuxX64("linux")
    }
}

def jvmOnlyTarget = { kotlinExt ->
    kotlinExt.jvmToolchain(25)
    kotlinExt.jvm()
}

def standardSourceSets = { kotlinExt, String rootMode, boolean coroutinesMain, boolean datetimeMain ->
    def ss = kotlinExt.sourceSets
    ss.getByName("commonMain").dependencies {
        if (rootMode == "implementation") {
            implementation rootPeer()
        } else if (rootMode != "none") {
            api rootPeer()
        }
        if (coroutinesMain) {
            implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:${prop("versions.kotlinx-coroutines-core")}"
        }
        if (datetimeMain) {
            implementation "org.jetbrains.kotlinx:kotlinx-datetime:${prop("versions.kotlinx-datetime")}"
        }
    }
    ss.getByName("commonTest").dependencies {
        // Only depend on root project if rootMode is not "none"
        if (rootMode != "none") {
            implementation rootPeer()
        }
        implementation "org.jetbrains.kotlin:kotlin-test:${kotlinVersion}"
        implementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:${prop("versions.kotlinx-coroutines-test")}"
    }
    ss.findByName("jvmTest")?.dependencies {
        implementation "org.jetbrains.kotlin:kotlin-test-junit:${kotlinVersion}"
    }
    if (ss.findByName("jsTest") != null) ss.getByName("jsTest").dependsOn(ss.getByName("commonTest"))
    if (ss.findByName("wasmJsTest") != null) ss.getByName("wasmJsTest").dependsOn(ss.getByName("commonTest"))
}

def kmpHost = { Map options = [:] ->
    def rootMode = options.get("rootMode", "api")
    def coroutinesMain = options.get("coroutinesMain", true)
    def datetimeMain = options.get("datetimeMain", false)
    pluginManager.apply("org.jetbrains.kotlin.multiplatform")
    pluginManager.apply("maven-publish")
    group = "borg.trikeshed"
    version = libVersion
    def kotlinExt = extensions.getByName("kotlin")
    configureCompiler(kotlinExt, true)
    standardKmpHostTargets(kotlinExt, true)
    standardSourceSets(kotlinExt, rootMode, coroutinesMain, datetimeMain)
}

def kmpJvm = { Map options = [:] ->
    def rootMode = options.get("rootMode", "api")
    def coroutinesMain = options.get("coroutinesMain", false)
    pluginManager.apply("org.jetbrains.kotlin.multiplatform")
    pluginManager.apply("maven-publish")
    group = "borg.trikeshed"
    version = libVersion
    def kotlinExt = extensions.getByName("kotlin")
    configureCompiler(kotlinExt, true)
    jvmOnlyTarget(kotlinExt)
    standardSourceSets(kotlinExt, rootMode, coroutinesMain, false)
}

def plainJvm = { boolean applyApplication = false ->
    pluginManager.apply("org.jetbrains.kotlin.jvm")
    pluginManager.apply("java-library")
    pluginManager.apply("maven-publish")
    if (applyApplication) pluginManager.apply("application")
    group = "borg.trikeshed"
    version = libVersion
    def kotlinExt = extensions.getByName("kotlin")
    kotlinExt.jvmToolchain(25)
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompilationTask.class).configureEach {
        compilerOptions {
            apiVersion.set(org.jetbrains.kotlin.gradle.dsl.KotlinVersion.KOTLIN_2_4)
            languageVersion.set(org.jetbrains.kotlin.gradle.dsl.KotlinVersion.KOTLIN_2_4)
            freeCompilerArgs.addAll(
                "-opt-in=kotlin.RequiresOptIn",
                "-Xsuppress-version-warnings",
            )
        }
    }
    dependencies {
        api rootPeer()
        testImplementation "org.jetbrains.kotlin:kotlin-test:${kotlinVersion}"
        testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:${prop("versions.kotlinx-coroutines-test")}"
    }
}

