            implementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:${prop('versions.kotlinx-coroutines-test')}"
        }
        // Exclude conflicting JUnit 4/5 implementations from kotlin-test
        configurations {
            jvmTestCompileClasspath {
                resolutionStrategy {
                    exclude module: "kotlin-test-junit"
                    exclude module: "kotlin-test-junit5"
                }
            }
            jvmTestRuntimeClasspath {
                resolutionStrategy {
                    exclude module: "kotlin-test-junit"
