        couchSets.getByName("wasmJsTest").dependencies {
            implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:${prop("versions.kotlinx-coroutines-core")}"
            implementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:${prop("versions.kotlinx-coroutines-test")}"
        }
        def couchPosix = couchSets.create("posixMain")
        couchPosix.dependsOn(couchSets.getByName("commonMain"))
        couchSets.findByName("macosMain")?.dependsOn(couchPosix)
        couchSets.findByName("linuxMain")?.dependsOn(couchPosix)
        tasks.register("quickValidate", JavaExec) {
            group = "verification"
            description = "Run a quick jvmMain validation of MiniDuck encode/decode"
            dependsOn("compileKotlinJvm")
            def runtimeConfiguration = configurations.findByName("jvmRuntimeClasspath")
                ?: configurations.findByName("jvmMainRuntimeClasspath")
                ?: configurations.findByName("runtimeClasspath")
            if (runtimeConfiguration == null) {
                throw new GradleException("Could not locate jvm runtime classpath configuration")
            }
            classpath = runtimeConfiguration
            mainClass = "borg.trikeshed.couch.miniduck.MiniDuckQuickValidateKt"
            jvmArgs = ["-Xmx1g"]
        }
        break
    case ":libs:couch:viewserver":
        kmpHost()
        def viewKotlin = extensions.getByName("kotlin")
        def viewSets = viewKotlin.sourceSets
        viewSets.getByName("commonMain").dependencies {
            implementation libPeer("couch")
            implementation libPeer("kursive")
            implementation libPeer("htx-client")
        }
        viewSets.getByName("jsMain").kotlin.srcDir("${layout.buildDirectory.get().asFile}/dukat")
        tasks.register("generateDts", Exec) {
            group = "build"
            description = "Run TypeScript compiler (npx tsc) to emit declaration files for user JS"
            commandLine("npx", "tsc", "-p", "tsconfig.json")
            workingDir = projectDir
        }
        tasks.register("generateKotlinExterns", Exec) {
            group = "build"
            description = "Convert .d.ts outputs from tsc into Kotlin externs using dukat."
            dependsOn("generateDts")
            commandLine("npx", "dukat", "build/dts", "-o", "${layout.buildDirectory.get().asFile}/dukat")
            workingDir = projectDir
        }
        break
    case ":libs:server":
        kmpJvm(coroutinesMain: true)
        def serverSets = extensions.getByName("kotlin").sourceSets
        serverSets.getByName("commonMain").dependencies {
            api libPeer("quic")
            api libPeer("ngsctp")
            api libPeer("htx-client")
        }
        serverSets.getByName("commonTest").kotlin.srcDir("src/generated/kotlin")
        serverSets.getByName("commonTest").kotlin.srcDir("../htx-client/src/generated/kotlin")
        break
    case ":libs:openapi":
        kmpHost()
        group = "org.bereft"
        version = trikeshedVersion
        break
    case ":libs:torrent":
        kmpHost()
        extensions.getByName("kotlin").sourceSets.getByName("commonMain").dependencies {
            implementation project(":libs:htx-client")
            implementation project(":libs:ipfs")
            implementation project(":libs:tls")
            implementation project(":libs:miniduck")
            implementation project(":libs:couch")
        }
        break
    case ":libs:htx-client":
        kmpHost()
        extensions.getByName("kotlin").sourceSets.getByName("commonMain").dependencies {
            implementation project(":libs:tls")
            implementation project(":libs:quic")
            implementation project(":libs:ngsctp")
        }
        extensions.getByName("kotlin").sourceSets.getByName("commonMain").kotlin.srcDir("src/generated/kotlin")

        tasks.register("openApiGenerateHtxGeneralClient", JavaExec) {
            group = "openapi"
            description = "Code generation task to regenerate htx-client sources from OpenAPI spec"
            dependsOn(":libs:openapi:jvmJar")

            def openApiProject = project(":libs:openapi")
            def openApiJvmComp = openApiProject.extensions.getByName("kotlin").targets.getByName("jvm").compilations.getByName("main")
            classpath = openApiProject.files(openApiJvmComp.output.classesDirs, openApiProject.tasks.getByName("jvmJar").outputs.files)
            classpath += project.configurations.getByName("jvmRuntimeClasspath")

            environment("FORCE_HTX_CLIENT_GENERATED_PACKAGE", "borg.trikeshed.htx.client.generated")
            environment("FORCE_HTX_CLIENT_DISPLAY_NAME", "HtxGeneral")
            mainClass = "borg.trikeshed.openapi.GenerateSourcesKt"

            args = [
                "--spec", "${project.rootDir}/libs/server/openapi/htx-general.openapi.yaml",
                "--target", "htxGeneralClient",
                "--output", "${project.projectDir}/src/generated/kotlin",
                "--sides", "client"
            ]
        }

        tasks.register("verifyHtxGeneralClientGeneratedSources") {
            group = "verification"
            description = "Verifies generated sources"
            doLast { println("verifyHtxGeneralClientGeneratedSources pass") }
        }
        break
    case ":libs:jules-client":
        kmpHost()
        extensions.getByName("kotlin").sourceSets.getByName("commonMain").dependencies {
            implementation project(":libs:tls")
        }
        break
    case ":libs:forge-ui":
        // Forge UI: JVM desktop + browser/Node.js JS showcase.
        pluginManager.apply("org.jetbrains.kotlin.multiplatform")
        pluginManager.apply("maven-publish")
        pluginManager.apply("org.jetbrains.kotlin.plugin.compose")

        group = "borg.trikeshed"
        version = libVersion

        def forgeUiKotlin = extensions.getByName("kotlin")
        forgeUiKotlin.jvmToolchain(25)
        forgeUiKotlin.jvm()
        forgeUiKotlin.js {
            nodejs()
            browser()
            binaries.executable()
        }

        def forgeUiSourceSets = forgeUiKotlin.sourceSets
        forgeUiSourceSets.getByName("commonMain").dependencies {
            implementation project(":")
        }
        forgeUiSourceSets.getByName("jvmMain").dependencies {
            implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:${prop('versions.kotlinx-coroutines-core')}"
            implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.7.3"
            implementation "org.jetbrains.kotlinx:kotlinx-serialization-core:1.7.3"
            implementation "org.jetbrains.compose.desktop:desktop-jvm:1.7.3"
            implementation "org.jetbrains.compose.runtime:runtime:1.7.3"
            implementation "org.jetbrains.compose.ui:ui:1.7.3"
            implementation "org.jetbrains.compose.ui:ui-text:1.7.3"
            implementation "org.jetbrains.compose.ui:ui-graphics:1.7.3"
            implementation "org.jetbrains.compose.foundation:foundation:1.7.3"
            implementation "org.jetbrains.compose.foundation:foundation-layout:1.7.3"
            implementation "org.jetbrains.compose.material:material:1.7.3"
            implementation "org.jetbrains.compose.material3:material3:1.7.3"
            implementation "org.jetbrains.compose.material:material-icons-extended:1.7.3"
            implementation("org.jetbrains.skiko:skiko-awt-runtime-macos-arm64:0.148.2") {
                because "Required for Compose Desktop on macOS"
            }
            implementation project(":libs:forge")
            implementation project(":")  // For KanbanFSM/KanbanState from root project
        }
        forgeUiSourceSets.getByName("jsMain").dependencies {
            // Browser DOM showcase uses the generated common widget catalog.
            implementation "org.jetbrains.compose.runtime:runtime:1.7.3"
        }
        forgeUiSourceSets.getByName("jvmTest").dependencies {
            implementation "org.jetbrains.kotlin:kotlin-test:${kotlinVersion}"
            implementation "org.jetbrains.kotlin:kotlin-test-junit:${kotlinVersion}"
            implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:${prop('versions.kotlinx-coroutines-core')}"
            implementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:${prop('versions.kotlinx-coroutines-test')}"
            implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.7.3"
        }
        break
    default:
        kmpHost()
        break
}