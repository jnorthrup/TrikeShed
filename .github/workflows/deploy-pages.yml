name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 25 (GraalVM CE)
        uses: graalvm/setup-graalvm@v1
        with:
          version: '25.0.2'
          java-version: '25'
          components: 'js,wasm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.6.1'

      - name: Build WASM_JS_BROWSER target
        run: |
          export JAVA_HOME=/usr/lib/jvm/graalvm-ce-java25-25.0.2
          export PATH="$JAVA_HOME/bin:$PATH"
          ./gradlew wasmJsBrowserProductionWebpack --no-daemon --console=plain

      - name: Generate Forge Pages (copy to docs/)
        run: |
          ./gradlew generateForgePages --no-daemon --console=plain

      - name: Verify docs/ output
        run: |
          ls -la docs/
          grep -q 'TrikeShed.js' docs/index.html && echo "✅ TrikeShed.js referenced in index.html" || { echo "❌ TrikeShed.js NOT in index.html"; exit 1; }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4