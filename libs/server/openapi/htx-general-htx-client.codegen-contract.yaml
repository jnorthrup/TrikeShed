version: 1
name: htx-general-to-htx-client-openapi-codegen-contract
authoritative_input:
  owner_module: libs/server
  source: libs/server/openapi/htx-general.openapi.yaml
  authoritative: true
  source_count: 1
  rationale: Single checked-in OpenAPI document for the htx-general server surface currently exercised by htx-client.
  operations:
    - method: GET
      path: /health
      operationId: getHealth
      success_status: 200
      response_media_type: text/plain
      response_body: ok
generation:
  working_directory: .
  working_directory_context: repository root
  command: ./gradlew -p libs/htx-client openApiGenerateHtxGeneralClient
  task: openApiGenerateHtxGeneralClient
  generator: kotlin
  library: multiplatform
  generator_mode: kotlin + multiplatform
  destination_module: libs/htx-client
  destination_source_root: libs/htx-client/src/generated/kotlin
  destination_package_root: borg.trikeshed.htx.client.generated
  output_count: 6
  repository_policy:
    generated_outputs: checked-in
    verification_only: false
    verification_mode: non-mutating verification of checked-in generated sources
    commit_requirement: regeneration changes must be committed with the spec or consumer change they represent
    verification_command: ./gradlew -p libs/htx-client verifyHtxGeneralClientGeneratedSources
    editing_rule: regenerate with openApiGenerateHtxGeneralClient instead of editing src/generated/kotlin by hand
  outputs:
    - package: borg.trikeshed.htx.client.generated.api
      path: libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated/api
      mode: generated-api
      files:
        - HtxGeneralApi.kt
    - package: borg.trikeshed.htx.client.generated.infrastructure
      path: libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated/infrastructure
      mode: generated-support
      files:
        - GeneratedRequest.kt
    - package: borg.trikeshed.htx.client.generated.model
      path: libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated/model
      mode: generated-model
      files:
        - HealthStatus.kt
    - package: borg.trikeshed.htx.client.generated
      path: libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated
      mode: generated-support
      files:
        - Keys.kt
        - Elements.kt
        - SupervisorJobs.kt
validation:
  codegen_run:
    passes_when:
      generation_command: ./gradlew -p libs/htx-client openApiGenerateHtxGeneralClient
      task_discovery_command: ./gradlew -p libs/htx-client tasks --all
      verification_command: ./gradlew -p libs/htx-client verifyHtxGeneralClientGeneratedSources
      exit_code: 0
      client_test_command: ./gradlew -p libs/htx-client jvmTest --tests borg.trikeshed.htx.client.GeneratedHtxGeneralClientTest
      generated_files_confined_to: libs/htx-client/src/generated/kotlin
      generated_files:
        - libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated/api/HtxGeneralApi.kt
        - libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated/infrastructure/GeneratedRequest.kt
        - libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated/model/HealthStatus.kt
        - libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated/Keys.kt
        - libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated/Elements.kt
        - libs/htx-client/src/generated/kotlin/borg/trikeshed/htx/client/generated/SupervisorJobs.kt
    observable_criteria:
      - The task list for libs/htx-client includes openApiGenerateHtxGeneralClient.
      - The generation command exits with status 0.
      - ./gradlew -p libs/htx-client verifyHtxGeneralClientGeneratedSources confirms the checked-in generated sources are in sync.
      - Verification is non-mutating and does not rewrite checked-in generated files.
      - Generated files HtxGeneralApi.kt, GeneratedRequest.kt, and HealthStatus.kt are confined to libs/htx-client/src/generated/kotlin.
      - Generated outputs are not ignored by git and are committed for review rather than verified-only.
      - The generated package root is borg.trikeshed.htx.client.generated.
      - The generated API package exposes a GET /health operation bound to operationId getHealth.
      - ./gradlew -p libs/htx-client jvmTest --tests borg.trikeshed.htx.client.GeneratedHtxGeneralClientTest succeeds after generation.
  integration_check:
    passes_when:
      integration_test_command: ./gradlew -p libs/server jvmTest --tests borg.trikeshed.server.HtxGeneralClientServerCompatibilityTest.generatedClientRoundTripMatchesOpenApiContract
      route_drift_test_command: ./gradlew -p libs/server jvmTest --tests borg.trikeshed.server.HtxGeneralClientServerCompatibilityTest.adapterRejectsPathDriftWithConcreteFailureSignals
      server_contract_suite_command: ./gradlew -p libs/server jvmTest
      exit_code: 0
      client_adapter: borg.trikeshed.server.HtxGeneralServerAdapter
      request:
        method: GET
        path: /health
      expected_response:
        status: 200
        body: ok
      drift_signal:
        path: /healthz
        status: 404
        body: not found
    observable_criteria:
      - ./gradlew -p libs/server jvmTest --tests borg.trikeshed.server.HtxGeneralClientServerCompatibilityTest.generatedClientRoundTripMatchesOpenApiContract succeeds.
      - The generated client calls GET /health through borg.trikeshed.server.HtxGeneralServerAdapter against the server context.
      - The adapter observes transport status 200 before returning body ok to the generated client.
      - The generated client resolves HealthStatus(body = ok) and reports ok == true.
      - ./gradlew -p libs/server jvmTest --tests borg.trikeshed.server.HtxGeneralClientServerCompatibilityTest.adapterRejectsPathDriftWithConcreteFailureSignals succeeds.
      - GET /healthz returns status 404 with body not found, proving the integration check is route-sensitive.
      - The OpenAPI source still declares GET /health with 200 text/plain const ok.
acceptance_criteria:
  - criterion: A test or validation target exists that fails when generated htx-client artifacts drift from the authoritative htx-general OpenAPI contract.
    enforced_by:
      task: ./gradlew -p libs/htx-client verifyHtxGeneralClientGeneratedSources
      implementation: libs/htx-client/build.gradle.kts
      failure_signals:
        - Checked-in generated outputs differ from the documented policy.
        - Missing checked-in generated source <relativePath>.
        - Generated source <relativePath> is stale.
  - criterion: A reviewable integration check exists for the selected client/server flows between htx-client and htx-general server.
    enforced_by:
      tests:
        - ./gradlew -p libs/server jvmTest --tests borg.trikeshed.server.HtxGeneralClientServerCompatibilityTest.generatedClientRoundTripMatchesOpenApiContract
        - ./gradlew -p libs/server jvmTest --tests borg.trikeshed.server.HtxGeneralClientServerCompatibilityTest.adapterRejectsPathDriftWithConcreteFailureSignals
      implementation: libs/server/src/jvmTest/kotlin/borg/trikeshed/server/HtxGeneralClientServerCompatibilityTest.kt
      expected_observations:
        - GET /health -> 200 / ok
        - HealthStatus.ok == true
        - GET /healthz -> 404 / not found
  - criterion: Pass/fail output is concrete enough for CI gating, with no reliance on manual inspection.
    enforced_by:
      ci_commands:
        - ./gradlew -p libs/htx-client verifyHtxGeneralClientGeneratedSources
        - ./gradlew -p libs/htx-client jvmTest --tests borg.trikeshed.htx.client.GeneratedHtxGeneralClientTest
        - ./gradlew -p libs/server jvmTest --tests borg.trikeshed.server.HtxGeneralClientServerCompatibilityTest.generatedClientRoundTripMatchesOpenApiContract
        - ./gradlew -p libs/server jvmTest --tests borg.trikeshed.server.HtxGeneralClientServerCompatibilityTest.adapterRejectsPathDriftWithConcreteFailureSignals
        - ./gradlew -p libs/server jvmTest --tests borg.trikeshed.server.HtxGeneralOpenApiContractTest
      pass_fail_signal: exit code 0 plus direct assertion/check failures on drift or incompatibility; no manual inspection.
