openapi: 3.1.0
info:
  title: HTX General Server API
  version: 0.1.0-SNAPSHOT
  description: Authoritative OpenAPI contract for the minimal htx-general server surface currently exercised by htx-client.
servers:
  - url: http://127.0.0.1
    description: Local htx-general server endpoint
tags:
  - name: system
    description: Server health and readiness operations
x-trikeshed-context:
  client:
    - name: htx
      key: borg.trikeshed.htx.client.HtxKey
      element: borg.trikeshed.htx.client.HtxElement
      open: borg.trikeshed.htx.client.openHtxElement
  server:
    - name: htx
      key: borg.trikeshed.htx.client.HtxKey
      element: borg.trikeshed.htx.client.HtxElement
      open: borg.trikeshed.htx.client.openHtxElement
    - name: quic
      key: borg.trikeshed.quic.QuicKey
      element: borg.trikeshed.quic.QuicElement
      open: borg.trikeshed.quic.openQuicElement
    - name: sctp
      key: borg.trikeshed.sctp.SctpKey
      element: borg.trikeshed.sctp.SctpElement
      open: borg.trikeshed.sctp.openSctpElement
paths:
  /health:
    get:
      tags:
        - system
      operationId: getHealth
      summary: Health probe
      description: Returns the liveness response exposed by the htx-general server stub.
      x-trikeshed-supervisor: true
      responses:
        '200':
          description: Server is healthy.
          content:
            text/plain:
              schema:
                type: string
                const: ok
components:
  schemas: {}
