<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VM Event Pipeline — Debounce Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    color: #e6edf3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  #dashboard {
    width: 100%;
    max-width: 1100px;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.6));
  }
  .panel {
    fill: #161b22;
    stroke: #30363d;
    stroke-width: 1;
    rx: 10;
  }
  .panel-label {
    fill: #8b949e;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .value-text {
    fill: #e6edf3;
    font-weight: 700;
  }
  .ok { fill: #3fb950; }
  .warn { fill: #d29922; }
  .crit { fill: #f85149; }
  .primary { fill: #58a6ff; }
  .dim { fill: #484f58; }
  .bar-bg { fill: #21262d; }
  .bar-fill { transition: width 0.3s ease; }
  .needle {
    fill: #f85149;
    stroke: #ff7b72;
    stroke-width: 0.5;
    filter: drop-shadow(0 0 6px rgba(248,81,73,0.8));
  }
  .needle-circle {
    fill: #21262d;
    stroke: #f85149;
    stroke-width: 2;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .flush-dot {
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .spinner-ring {
    transform-origin: 200px 200px;
    animation: spin-slow 3s linear infinite;
  }
</style>
</head>
<body>

<svg id="dashboard" viewBox="0 0 1100 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow filter for needle -->
    <filter id="needle-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Panel gradient -->
    <linearGradient id="panel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <!-- Speed arc gradient -->
    <linearGradient id="speed-arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="60%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
    <!-- Clip path for bar chart -->
    <clipPath id="bar-clip">
      <rect x="0" y="0" width="100%" height="100%"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════ HEADER ═══════════════════════════════════════ -->
  <g transform="translate(30, 30)">
    <rect class="panel" x="0" y="0" width="1040" height="50" rx="8" fill="url(#panel-grad)"/>
    <circle class="flush-dot" cx="20" cy="25" r="5" fill="#3fb950"/>
    <text x="35" y="30" fill="#e6edf3" font-size="14" font-weight="600">VM EVENT PIPELINE</text>
    <text x="270" y="30" fill="#8b949e" font-size="11">DEBOUNCE MONITOR</text>
    <text id="timestamp" x="980" y="30" fill="#484f58" font-size="11" text-anchor="end">—</text>
  </g>

  <!-- ═══════════════════════════════════════ LEFT: SPEEDOMETER ═══════════════════════════ -->
  <g transform="translate(30, 100)">
    <rect class="panel" x="0" y="0" width="380" height="380" rx="10" fill="url(#panel-grad)"/>

    <!-- Speed arc background (full 270°) -->
    <path id="speed-arc-bg" d=""
      fill="none" stroke="#21262d" stroke-width="18" stroke-linecap="round"/>

    <!-- Speed arc segments with color zones -->
    <!-- Green zone: 0-189° (0-70%) -->
    <path id="speed-arc-green" d=""
      fill="none" stroke="#3fb950" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
    <!-- Yellow zone: 189-229.5° (70-85%) -->
    <path id="speed-arc-yellow" d=""
      fill="none" stroke="#d29922" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
    <!-- Red zone: 229.5-270° (85-100%) -->
    <path id="speed-arc-red" d=""
      fill="none" stroke="#f85149" stroke-width="18" stroke-linecap="round" opacity="0.9"/>

    <!-- Tick marks -->
    <g id="ticks"></g>

    <!-- Needle -->
    <g id="needle-group" transform="translate(190, 190)">
      <polygon class="needle" points="-4,0 -1,-140 1,-140 4,0" filter="url(#needle-glow)"/>
      <circle class="needle-circle" cx="0" cy="0" r="12"/>
    </g>

    <!-- Center readout -->
    <text x="190" y="175" text-anchor="middle" fill="#8b949e" font-size="10" letter-spacing="2">BUFFER</text>
    <text id="buf-pct" x="190" y="215" text-anchor="middle" fill="#e6edf3" font-size="36" font-weight="700">0%</text>
    <text id="buf-label" x="190" y="235" text-anchor="middle" fill="#3fb950" font-size="11">NOMINAL</text>

    <!-- Head/Tail indices -->
    <g transform="translate(40, 300)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">HEAD</text>
      <text id="head-idx" x="60" y="0" fill="#58a6ff" font-size="13" font-weight="600">0000</text>
    </g>
    <g transform="translate(40, 325)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">TAIL</text>
      <text id="tail-idx" x="60" y="0" fill="#58a6ff" font-size="13" font-weight="600">0000</text>
    </g>
    <g transform="translate(40, 350)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">CAPACITY</text>
      <text id="capacity" x="80" y="0" fill="#e6edf3" font-size="13" font-weight="600">4096</text>
    </g>

    <!-- Right side stats -->
    <g transform="translate(200, 300)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">ENQUEUED</text>
      <text id="enqueued" x="0" y="25" fill="#58a6ff" font-size="13" font-weight="600">0</text>
    </g>
    <g transform="translate(200, 325)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">OVERFLOW</text>
      <text id="overflow" x="0" y="0" fill="#f85149" font-size="13" font-weight="600">0</text>
    </g>
    <g transform="translate(200, 350)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">FLUSHES/s</text>
      <text id="flush-rate" x="0" y="0" fill="#3fb950" font-size="13" font-weight="600">0.0</text>
    </g>

    <!-- Panel label -->
    <text x="10" y="20" class="panel-label">CIRCULAR BUFFER</text>
  </g>

  <!-- ═══════════════════════════════════════ MIDDLE: ROLLUPS ═══════════════════════════ -->
  <g transform="translate(430, 100)">
    <rect class="panel" x="0" y="0" width="360" height="380" rx="10" fill="url(#panel-grad)"/>
    <text x="10" y="20" class="panel-label">EVENT TYPE ROLLOUT</text>

    <!-- Bars will be drawn by JS -->
    <g id="rollup-bars" transform="translate(10, 45)"></g>

    <!-- Throughput chart -->
    <g transform="translate(10, 280)">
      <text fill="#8b949e" font-size="9" letter-spacing="1" y="0">THROUGHPUT (events/sec)</text>
      <g id="throughput-bars" transform="translate(0, 15)"></g>
    </g>
  </g>

  <!-- ═══════════════════════════════════════ RIGHT: DEBOUNCE STATUS ════════════════════ -->
  <g transform="translate(810, 100)">
    <rect class="panel" x="0" y="0" width="260" height="380" rx="10" fill="url(#panel-grad)"/>
    <text x="10" y="20" class="panel-label">DEBOUNCE ENGINE</text>

    <!-- Flush interval -->
    <g transform="translate(15, 50)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">FLUSH INTERVAL</text>
      <text id="flush-interval" x="0" y="25" fill="#e6edf3" font-size="22" font-weight="700">50ms</text>
    </g>

    <!-- Pending count big number -->
    <g transform="translate(15, 105)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">PENDING</text>
      <text id="pending-count" x="0" y="30" fill="#58a6ff" font-size="40" font-weight="700">0</text>
      <text x="0" y="50" fill="#484f58" font-size="10">events queued</text>
    </g>

    <!-- Separator -->
    <line x1="15" y1="170" x2="245" y2="170" stroke="#30363d" stroke-width="1"/>

    <!-- Stats grid -->
    <g transform="translate(15, 190)">
      <g>
        <text fill="#8b949e" font-size="9" letter-spacing="1">DROPPED</text>
        <text id="dropped" x="0" y="20" fill="#f85149" font-size="15" font-weight="600">0</text>
      </g>
      <g transform="translate(120, 0)">
        <text fill="#8b949e" font-size="9" letter-spacing="1">COALESCED</text>
        <text id="coalesced" x="0" y="20" fill="#d29922" font-size="15" font-weight="600">0</text>
      </g>
    </g>

    <!-- Latency -->
    <g transform="translate(15, 250)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">PROCESS LATENCY</text>
      <text id="process-latency" x="0" y="25" fill="#3fb950" font-size="18" font-weight="700">0.0µs</text>
      <text fill="#484f58" font-size="9" y="40">avg per flush</text>
    </g>

    <!-- Last flush time -->
    <g transform="translate(15, 310)">
      <text fill="#8b949e" font-size="9" letter-spacing="1">LAST FLUSH</text>
      <text id="last-flush" x="0" y="20" fill="#e6edf3" font-size="13">—</text>
    </g>

    <!-- Flush indicator ring -->
    <g transform="translate(130, 350)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#21262d" stroke-width="4"/>
      <circle id="flush-ring" cx="0" cy="0" r="18" fill="none" stroke="#3fb950" stroke-width="4"
        stroke-dasharray="113" stroke-dashoffset="0" stroke-linecap="round"
        transform="rotate(-90)"/>
      <text x="0" y="4" text-anchor="middle" fill="#e6edf3" font-size="9" font-weight="600">FLUSH</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════ FOOTER ════════════════════════════════════ -->
  <g transform="translate(30, 500)">
    <rect class="panel" x="0" y="0" width="1040" height="60" rx="8" fill="url(#panel-grad)"/>
    <g transform="translate(20, 20)">
      <text fill="#484f58" font-size="9" letter-spacing="1">GIDHRA NOUNS CONNECTED</text>
      <text id="ghidra-nouns" x="0" y="18" fill="#58a6ff" font-size="12" font-weight="600">loading…</text>
    </g>
    <g transform="translate(200, 20)">
      <text fill="#484f58" font-size="9" letter-spacing="1">EVENTS PROCESSED</text>
      <text id="total-events" x="0" y="18" fill="#e6edf3" font-size="12" font-weight="600">0</text>
    </g>
    <g transform="translate(380, 20)">
      <text fill="#484f58" font-size="9" letter-spacing="1">UP TIME</text>
      <text id="up-time" x="0" y="18" fill="#e6edf3" font-size="12" font-weight="600">00:00:00</text>
    </g>
    <!-- Mini sparkline for overall health -->
    <g transform="translate(520, 12)">
      <text fill="#484f58" font-size="9" letter-spacing="1">BUFFER HEALTH (60s)</text>
      <g id="health-spark" transform="translate(0, 15)"></g>
    </g>
  </g>
</svg>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────────
const BUFFER_CAPACITY = 4096;
const FLUSH_INTERVAL_MS = 50;
const EVENT_TYPES = ['CLASS_LOADED', 'METHOD_ENTRY', 'METHOD_EXIT', 'FIELD_ACCESS', 'EXCEPTION', 'GC'];
const EVENT_COLORS = ['#58a6ff', '#3fb950', '#d29922', '#a371f7', '#f85149', '#79c0ff'];
const SPARKLINE_POINTS = 60;

// ── STATE ───────────────────────────────────────────────────────────────────────
let head = 0, tail = 0;
let pending = 0;
let dropped = 0, coalesced = 0;
let totalEvents = 0;
let flushCount = 0;
let lastFlushTime = Date.now();
let startTime = Date.now();
let eventRollup = new Array(EVENT_TYPES.length).fill(0);
let throughputHistory = new Array(20).fill(0);
let healthHistory = new Array(SPARKLINE_POINTS).fill(0.5);
let currentThroughput = 0;
let lastThroughputUpdate = Date.now();
let eventsSinceLastUpdate = 0;

// ── NEEDLE ANIMATION ─────────────────────────────────────────────────────────────
const needleGroup = document.getElementById('needle-group');
const bufPct = document.getElementById('buf-pct');
const bufLabel = document.getElementById('buf-label');
let targetAngle = -135;
let currentAngle = -135;

// Convert buffer % (0-100) to angle (-135° to +135° range = 270° sweep)
function pctToAngle(pct) {
  return -135 + (pct / 100) * 270;
}

// ── TICK GENERATION ─────────────────────────────────────────────────────────────
const ticksGroup = document.getElementById('ticks');
const CX = 190, CY = 190, R_OUTER = 170, R_INNER = 150;
const ARC_START = -135, ARC_END = 135;

function polarToCartesian(cx, cy, r, angleDeg) {
  const rad = (angleDeg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function describeArc(cx, cy, r, startAngle, endAngle) {
  const s = polarToCartesian(cx, cy, r, startAngle);
  const e = polarToCartesian(cx, cy, r, endAngle);
  const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
  return `M ${s.x} ${s.y} A ${r} ${r} 0 ${largeArc} 1 ${e.x} ${e.y}`;
}

// Draw colored arc segments
function drawSpeedArcs() {
  const greenEnd = -135 + (70 / 100) * 270;
  const yellowEnd = -135 + (85 / 100) * 270;

  document.getElementById('speed-arc-green').setAttribute('d', describeArc(CX, CY, R_OUTER - 9, -135, greenEnd));
  document.getElementById('speed-arc-yellow').setAttribute('d', describeArc(CX, CY, R_OUTER - 9, greenEnd, yellowEnd));
  document.getElementById('speed-arc-red').setAttribute('d', describeArc(CX, CY, R_OUTER - 9, yellowEnd, 135));
}

// Draw tick marks and labels
function drawTicks() {
  const labelR = R_INNER - 18;
  for (let i = 0; i <= 10; i++) {
    const pct = i * 10;
    const angle = -135 + (pct / 100) * 270;
    const outer = polarToCartesian(CX, CY, R_OUTER + 5, angle);
    const inner = polarToCartesian(CX, CY, R_INNER, angle);
    const labelPt = polarToCartesian(CX, CY, labelR, angle);

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', outer.x); line.setAttribute('y1', outer.y);
    line.setAttribute('x2', inner.x); line.setAttribute('y2', inner.y);
    line.setAttribute('stroke', '#484f58');
    line.setAttribute('stroke-width', pct % 50 === 0 ? 2 : 1);
    ticksGroup.appendChild(line);

    if (pct % 25 === 0) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', labelPt.x); text.setAttribute('y', labelPt.y);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('fill', '#8b949e');
      text.setAttribute('font-size', '9');
      text.setAttribute('font-family', 'JetBrains Mono, monospace');
      text.textContent = pct + '%';
      ticksGroup.appendChild(text);
    }
  }
}

drawSpeedArcs();
drawTicks();

// ── ROLLUPS BAR CHART ────────────────────────────────────────────────────────────
const rollupBars = document.getElementById('rollup-bars');
const BAR_H = 22, BAR_GAP = 6;
const rollupWidth = 330;
const labelWidth = 110;

EVENT_TYPES.forEach((type, i) => {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('transform', `translate(0, ${i * (BAR_H + BAR_GAP)})`);

  // Label
  const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  lbl.setAttribute('x', '0'); lbl.setAttribute('y', BAR_H - 6);
  lbl.setAttribute('fill', '#8b949e');
  lbl.setAttribute('font-size', '9');
  lbl.setAttribute('font-family', 'JetBrains Mono, monospace');
  lbl.textContent = type.replace('_', ' ');
  g.appendChild(lbl);

  // Background bar
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('x', labelWidth); bg.setAttribute('y', '0');
  bg.setAttribute('width', rollupWidth - labelWidth); bg.setAttribute('height', BAR_H);
  bg.setAttribute('rx', '4'); bg.setAttribute('fill', '#21262d');
  g.appendChild(bg);

  // Fill bar
  const bar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bar.setAttribute('x', labelWidth); bar.setAttribute('y', '0');
  bar.setAttribute('width', '0'); bar.setAttribute('height', BAR_H);
  bar.setAttribute('rx', '4');
  bar.setAttribute('fill', EVENT_COLORS[i]);
  bar.setAttribute('opacity', '0.85');
  bar.classList.add('bar-fill');
  g.appendChild(bar);

  // Count label
  const cnt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  cnt.setAttribute('x', labelWidth + 5); cnt.setAttribute('y', BAR_H - 6);
  cnt.setAttribute('fill', '#0d1117');
  cnt.setAttribute('font-size', '9');
  cnt.setAttribute('font-weight', '700');
  cnt.setAttribute('font-family', 'JetBrains Mono, monospace');
  cnt.classList.add('bar-label');
  g.appendChild(cnt);

  rollupBars.appendChild(g);
});

// ── THROUGHPUT BARS ─────────────────────────────────────────────────────────────
const throughputBars = document.getElementById('throughput-bars');
const TP_BAR_W = 14, TP_GAP = 3;
for (let i = 0; i < 20; i++) {
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', i * (TP_BAR_W + TP_GAP));
  rect.setAttribute('y', '50');
  rect.setAttribute('width', TP_BAR_W);
  rect.setAttribute('height', '0');
  rect.setAttribute('rx', '2');
  rect.setAttribute('fill', '#58a6ff');
  rect.setAttribute('opacity', '0.7');
  throughputBars.appendChild(rect);
}

// ── HEALTH SPARKLINE ────────────────────────────────────────────────────────────
const healthSpark = document.getElementById('health-spark');
const SPARK_W = 500, SPARK_H = 20;
const sparkBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
sparkBg.setAttribute('width', SPARK_W); sparkBg.setAttribute('height', SPARK_H);
sparkBg.setAttribute('rx', '4'); sparkBg.setAttribute('fill', '#21262d');
healthSpark.appendChild(sparkBg);

const sparkLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
sparkLine.setAttribute('fill', 'none');
sparkLine.setAttribute('stroke', '#58a6ff');
sparkLine.setAttribute('stroke-width', '1.5');
sparkLine.setAttribute('opacity', '0.8');
healthSpark.appendChild(sparkLine);

// ── UPDATE FUNCTIONS ────────────────────────────────────────────────────────────
function fmt(n) { return n.toString().padStart(4, '0'); }
function fmtK(n) { return n > 1000 ? (n/1000).toFixed(1) + 'K' : n.toString(); }
function fmtTime(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = Math.floor(s % 60);
  return [h, m, sec].map(v => v.toString().padStart(2, '0')).join(':');
}

function updateRollupBars() {
  const bars = rollupBars.children;
  const maxVal = Math.max(...eventRollup, 1);
  const usableW = rollupWidth - labelWidth;
  eventRollup.forEach((val, i) => {
    const bar = bars[i].children[2];
    const cnt = bars[i].children[4];
    const w = (val / maxVal) * usableW;
    bar.setAttribute('width', w);
    cnt.textContent = fmtK(val);
    cnt.setAttribute('x', labelWidth + Math.max(w - 30, 5));
  });
}

function updateThroughput() {
  const bars = throughputBars.children;
  const maxT = Math.max(...throughputHistory, 1);
  throughputHistory.forEach((val, i) => {
    const h = (val / maxT) * 50;
    bars[i].setAttribute('y', 50 - h);
    bars[i].setAttribute('height', h);
  });
}
function updateSparkline() {
  const pts = healthHistory.map((v, i) => {
    const x = (i / (SPARKLINE_POINTS - 1)) * SPARK_W;
    const y = SPARK_H - v * SPARK_H;
    return `${x},${y}`;
  }).join(' ');
  sparkLine.setAttribute('points', pts);
}

// Flush ring animation
const flushRing = document.getElementById('flush-ring');
const RING_CIRC = 2 * Math.PI * 18;

function updateFlushRing(elapsed) {
  const fraction = Math.max(0, 1 - elapsed / FLUSH_INTERVAL_MS);
  flushRing.setAttribute('stroke-dashoffset', fraction * RING_CIRC);
  flushRing.setAttribute('stroke', fraction > 0.5 ? '#3fb950' : fraction > 0.2 ? '#d29922' : '#f85149');
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────────────
let lastTime = performance.now();
let eventAccum = 0;

function frame(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  // Simulate incoming VM events (Poisson-like, avg 800/s, burst up to 3000)
  const rate = 600 + Math.random() * 1200 + (Math.random() < 0.1 ? 2000 * Math.random() : 0);
  const newEvents = Math.floor(rate * dt);
  eventAccum += newEvents;

  // Simulate dequeues (processed at ~1000/s baseline, faster when full)
  const drainRate = 900 + Math.random() * 400;
  const drained = Math.min(eventAccum, Math.floor(drainRate * dt));
  eventAccum -= drained;

  // Buffer simulation
  const bufferLevel = Math.floor(Math.random() * 60) + Math.random() * 20; // 20-80%
  const pct = Math.max(0, Math.min(100, bufferLevel));
  targetAngle = pctToAngle(pct);
  currentAngle += (targetAngle - currentAngle) * 0.08;
  needleGroup.setAttribute('transform', `translate(190, 190) rotate(${currentAngle})`);

  // Color logic
  bufPct.textContent = Math.round(pct) + '%';
  if (pct < 70) {
    bufLabel.textContent = 'NOMINAL'; bufLabel.setAttribute('fill', '#3fb950');
    bufPct.setAttribute('fill', '#e6edf3');
  } else if (pct < 85) {
    bufLabel.textContent = 'ELEVATED'; bufLabel.setAttribute('fill', '#d29922');
    bufPct.setAttribute('fill', '#d29922');
  } else {
    bufLabel.textContent = 'CRITICAL'; bufLabel.setAttribute('fill', '#f85149');
    bufPct.setAttribute('fill', '#f85149');
  }

  // Indices
  head = (head + Math.floor(Math.random() * 50)) % BUFFER_CAPACITY;
  tail = (tail + Math.floor(Math.random() * 45)) % BUFFER_CAPACITY;
  document.getElementById('head-idx').textContent = fmt(head);
  document.getElementById('tail-idx').textContent = fmt(tail);

  // Rollup (randomly increment event types)
  for (let i = 0; i < 6; i++) {
    if (Math.random() < 0.3) eventRollup[i] += Math.floor(Math.random() * 5);
  }
  updateRollupBars();

  // Throughput history
  if (now - lastThroughputUpdate > 500) {
    currentThroughput = eventsSinceLastUpdate * 2;
    throughputHistory.shift();
    throughputHistory.push(currentThroughput);
    eventsSinceLastUpdate = 0;
    lastThroughputUpdate = now;
    updateThroughput();
  }
  eventsSinceLastUpdate += newEvents;

  // Health history
  healthHistory.shift();
  healthHistory.push(pct / 100);
  updateSparkline();

  // Flush timing
  const elapsed = now - lastFlushTime;
  updateFlushRing(elapsed);
  if (elapsed >= FLUSH_INTERVAL_MS) {
    lastFlushTime = now;
    flushCount++;
    document.getElementById('flush-rate').textContent = (flushCount / ((now - startTime) / 1000)).toFixed(1);
    document.getElementById('last-flush').textContent = new Date().toLocaleTimeString();
    coalesced += Math.floor(Math.random() * 8);
    pending = Math.floor(Math.random() * 30);
  }

  // Stats
  document.getElementById('enqueued').textContent = Math.floor(bufferLevel * BUFFER_CAPACITY / 100);
  document.getElementById('overflow').textContent = Math.floor(Math.random() * 5);
  document.getElementById('dropped').textContent = dropped;
  document.getElementById('coalesced').textContent = coalesced;
  document.getElementById('pending-count').textContent = pending;
  document.getElementById('process-latency').textContent = (2 + Math.random() * 8).toFixed(1) + 'µs';
  document.getElementById('ghidra-nouns').textContent = Math.floor(10000 + Math.random() * 5000).toLocaleString() + ' nouns';
  totalEvents += newEvents;
  document.getElementById('total-events').textContent = totalEvents.toLocaleString();
  document.getElementById('up-time').textContent = fmtTime((now - startTime) / 1000);
  document.getElementById('timestamp').textContent = new Date().toLocaleString();

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
