openapi: 3.0.3
info:
  title: CouchDB 1.7.2 Compatible API
  description: A complete API compatibility layer for CouchDB 1.7.2 that uses an in-memory memvid store and blob storage for attachments
  version: 1.7.2
servers:
  - url: http://localhost:5984
    description: Default server for CouchDB-compatible API
paths:
  /:
    get:
      summary: Get server information
      responses:
        '200':
          description: Server information
          content:
            application/json:
              schema:
                type: object
                properties:
                  couchdb:
                    type: string
                    example: "Welcome"
                  version:
                    type: string
                    example: "1.7.2"
  /{db}:
    get:
      summary: Get database information
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database information
          content:
            application/json:
              schema:
                type: object
                properties:
                  db_name:
                    type: string
                  doc_count:
                    type: integer
                  update_seq:
                    type: integer
    put:
      summary: Create database
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Database created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
    delete:
      summary: Delete database
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Database deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /{db}/_all_docs:
    get:
      summary: Get all documents in database
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: startkey
          in: query
          schema:
            type: string
        - name: endkey
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_rows:
                    type: integer
                  offset:
                    type: integer
                  rows:
                    type: array
                    items:
                      type: object
  /{db}/_bulk_docs:
    post:
      summary: Bulk document operations
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                docs:
                  type: array
                  items:
                    type: object
      responses:
        '201':
          description: Bulk operations completed
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /{db}/{doc_id}:
    get:
      summary: Get document
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
        - name: rev
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Document data
          content:
            application/json:
              schema:
                type: object
    put:
      summary: Create or update document
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Document created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  rev:
                    type: string
    delete:
      summary: Delete document
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
        - name: rev
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  rev:
                    type: string
  /{db}/{doc_id}/{attachment}:
    get:
      summary: Get document attachment
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
        - name: attachment
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Attachment data
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    put:
      summary: Create or update attachment
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
        - name: attachment
          in: path
          required: true
          schema:
            type: string
        - name: rev
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Attachment created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  rev:
                    type: string
  /{db}/_design/{ddoc}:
    get:
      summary: Get design document
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
        - name: ddoc
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Design document data
          content:
            application/json:
              schema:
                type: object
    put:
      summary: Create or update design document
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
        - name: ddoc
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Design document created or updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  id:
                    type: string
                  rev:
                    type: string
  /{db}/_design/{ddoc}/_view/{view}:
    get:
      summary: Query a view
      parameters:
        - name: db
          in: path
          required: true
          schema:
            type: string
        - name: ddoc
          in: path
          required: true
          schema:
            type: string
        - name: view
          in: path
          required: true
          schema:
            type: string
        - name: startkey
          in: query
          schema:
            type: string
        - name: endkey
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: include_docs
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: View results
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_rows:
                    type: integer
                  offset:
                    type: integer
                  rows:
                    type: array
                    items:
                      type: object