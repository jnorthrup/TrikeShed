        - JwtAuth: []
      tags: [Portfolios]
      parameters:
        - $ref: '#/components/parameters/portfolioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                to_portfolio_id:
                  type: string
                currency:
                  type: string
                amount:
                  type: string
      responses:
        '200':
          description: Move funds result
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /portfolios/allocate:
    post:
      operationId: allocatePortfolio
      summary: Allocate portfolio
