<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge UI Widget Showcase</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111821;
      --panel-2: #161e28;
      --ink: #d3dbe6;
      --muted: #758395;
      --border: #1d2a38;
      --primary: #7aa2f7;
      --success: #9ece6a;
      --warning: #e0af68;
      --danger: #f7768e;
      --accent: #bb9af7;
      --cyan: #7dcfff;
      --teal: #73daca;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); }
    body { padding: 24px; }
    button { font: inherit; }
    .forge-showcase {
      min-height: calc(100vh - 48px);
      display: grid;
      gap: 18px;
      grid-template-rows: auto 1fr;
    }
    .showcase-header,
    .preview-panel,
    .inspector-panel .inspector-card {
      background: rgba(17, 24, 33, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.22);
    }
    .showcase-header {
      padding: 20px 22px;
      display: grid;
      gap: 16px;
      grid-template-columns: 1.4fr 1fr;
      align-items: center;
    }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 11px;
      color: var(--muted);
      margin: 0 0 8px 0;
    }
    h1, h2, p { margin: 0; }
    .lede { margin-top: 10px; color: var(--muted); line-height: 1.55; }
    .page-switcher { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 10px; }
    .page-button,
    .widget-card,
    .cta,
    .badge,
    .layout-pill,
    .template-pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15, 20, 27, 0.82);
      color: var(--ink);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.24);
    }
    .page-button {
      padding: 10px 14px;
      cursor: pointer;
    }
    .page-button.active {
      border-color: var(--primary);
      background: rgba(122, 162, 247, 0.16);
    }
    .showcase-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      min-height: 0;
    }
    .preview-panel {
      padding: 20px;
      min-height: 0;
      display: grid;
      gap: 16px;
      align-content: start;
    }
    .preview-header {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }
    .layout-pill,
    .template-pill {
      padding: 8px 12px;
      font-size: 12px;
    }
    .layout-pill { border-color: rgba(122, 162, 247, 0.5); color: var(--primary); }
    .template-pill { border-color: rgba(115, 218, 202, 0.4); color: var(--teal); }
    .widget-grid {
      display: grid;
      gap: 14px;
      min-width: 0;
    }
    .widget-grid-hero { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .widget-grid-split { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .widget-grid-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .widget-grid-stack { grid-template-columns: 1fr; }
    .widget-card {
      position: relative;
      overflow: hidden;
      padding: 18px;
      cursor: pointer;
      text-align: left;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(17, 24, 33, 0.96), rgba(17, 24, 33, 0.82));
      min-height: 180px;
      display: grid;
      gap: 10px;
      align-content: start;
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .widget-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, color-mix(in srgb, var(--accent) 16%, transparent), transparent 38%, rgba(255, 255, 255, 0.05));
      pointer-events: none;
    }
    .widget-card > * { position: relative; z-index: 1; }
    .widget-card.active {
      border-color: var(--accent);
      box-shadow: 0 22px 42px rgba(0, 0, 0, 0.34), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }
    .widget-kicker { text-transform: uppercase; letter-spacing: 0.16em; font-size: 10px; color: var(--muted); }
    .widget-title { font-size: 18px; font-weight: 700; }
    .widget-value { color: var(--accent); font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; }
    .widget-body { color: var(--muted); line-height: 1.55; font-size: 14px; }
    .badge-row, .cta-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge, .cta { padding: 7px 10px; font-size: 11px; }
    .badge { color: var(--muted); }
    .cta { color: var(--ink); border-color: rgba(122, 162, 247, 0.35); }
    .inspector-panel { display: grid; gap: 16px; align-content: start; }
    .inspector-card { padding: 18px; }
    .inspector-list { margin-top: 14px; display: grid; gap: 10px; }
    .inspector-list > div {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .inspector-list dt { color: var(--muted); text-transform: uppercase; font-size: 11px; letter-spacing: 0.14em; }
    .inspector-list dd { margin: 0; color: var(--ink); }
    .notes p { color: var(--muted); line-height: 1.55; margin-top: 10px; }
    .doc-layout {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      min-height: 560px;
    }
    .doc-outline,
    .doc-reading {
      display: grid;
      gap: 12px;
      min-width: 0;
      align-content: start;
    }
    .doc-reading .inspector-card {
      box-shadow: 0 22px 46px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .doc-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .doc-link {
      color: var(--ink);
      padding: 8px 12px;
      border-radius: 14px;
      background: rgba(122, 162, 247, 0.10);
      border: 1px solid rgba(122, 162, 247, 0.16);
      margin-top: 8px;
    }
    .doc-outline .widget-card {
      min-height: 150px;
    }
    .doc-outline .widget-card.active {
      transform: translateY(-1px) scale(1.01);
    }
    .doc-outline .widget-card .widget-body {
      font-size: 13px;
    }
    .doc-reading .notes {
      background: linear-gradient(180deg, rgba(17, 24, 33, 0.96), rgba(17, 24, 33, 0.84));
    }
    .doc-reading .notes p {
      margin-top: 8px;
    }
    .radar-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .radar-toolbar .radar-status {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-left: auto;
    }
    .radar-stage {
      position: relative;
      min-height: 560px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(122, 162, 247, 0.18);
      background: radial-gradient(circle at 50% 40%, rgba(122, 162, 247, 0.12), rgba(10, 12, 18, 0.96) 60%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03), 0 18px 42px rgba(0, 0, 0, 0.32);
    }
    .radar-links {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .radar-node {
      position: absolute;
      display: grid;
      gap: 6px;
      align-content: start;
      text-align: left;
      padding: 14px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(19, 26, 37, 0.98), rgba(12, 15, 22, 0.86));
      color: var(--ink);
      box-shadow: 0 24px 44px rgba(0, 0, 0, 0.36);
      overflow: hidden;
    }
    .radar-node::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, color-mix(in srgb, var(--accent) 24%, transparent), transparent 35%, rgba(255, 255, 255, 0.03));
      pointer-events: none;
    }
    .radar-node.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 48%, transparent), 0 30px 60px rgba(0, 0, 0, 0.44);
      transform: translateY(-2px) scale(1.03);
    }
    .radar-node > * { position: relative; z-index: 1; }
    .node-kicker {
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 10px;
      color: var(--muted);
    }
    .node-title { font-size: 17px; font-weight: 700; }
    .node-value { color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; font-size: 12px; }
    .node-body { color: var(--muted); font-size: 13px; line-height: 1.45; }
    .radar-node .badge-row { margin-top: 2px; }
    @media (max-width: 1100px) {
      .showcase-header,
      .showcase-layout { grid-template-columns: 1fr; }
      .page-switcher { justify-content: flex-start; }
    }
    @media (max-width: 720px) {
      body { padding: 12px; }
      .widget-grid-hero,
      .widget-grid-split,
      .widget-grid-grid { grid-template-columns: 1fr; }
      .doc-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
</body>
</html>
