openapi: 3.1.0
info:
  title: Kraken Custody REST API
  version: current
  description: "Conservative OpenAPI 3.1 spec built from Kraken API Center Custody REST endpoint pages. This captures documented endpoint surfaces, summaries, and response descriptions from the live docs."
paths:
  /0/private/DepositAddresses:
    post:
      operationId: depositAddresses
      summary: Get deposit addresses
      description: "Retrieve (or generate a new) deposit addresses for a particular asset and funding method. Use the Get Deposit Methods API to identify the appropriate deposit method."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /0/private/DepositMethods:
    post:
      operationId: depositMethods
      summary: Get deposit methods
      description: "Retrieve the available deposit funding methods for depositing a specific asset. The deposit method is required to retrieve deposit addresses using the Get Deposit Addresses API ."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
