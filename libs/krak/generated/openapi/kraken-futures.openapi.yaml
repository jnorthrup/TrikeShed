openapi: 3.1.0
info:
  title: Kraken Futures REST API
  version: current
  description: "Conservative OpenAPI 3.1 spec built from Kraken API Center Futures REST endpoint pages. This captures documented endpoint surfaces, summaries, and response descriptions from the live docs."
paths:
  /derivatives/api/v3/api-keys/v3/check:
    get:
      operationId: checkV3ApiKey
      summary: Check v3 API key
      description: Verify API key access and return the authenticated key's details.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/{tick_type}/{symbol}/{resolution}:
    get:
      operationId: candles
      summary: Market Candles
      description: "Candles for specified tick type, market, and resolution. List of available tick types can be fetched from the tick types endpoint. List of available markets can be fetched from the markets endpoint. List of available resolutions can be fetched from the resolutions endpoint."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: tick_type
          in: path
          required: true
          schema:
            type: string
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: resolution
          in: path
          required: true
          schema:
            type: string
  /derivatives/api/v3/analytics/liquidity-pool:
    get:
      operationId: liquidityPoolStats
      summary: Get liquidity pool statistic
      description: Get liquidity pool statistic including usd value
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/analytics/{symbol}/{analytics_type}:
    get:
      operationId: marketAnalytics
      summary: Market Analytics
      description: Analytics data divided into time buckets
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: analytics_type
          in: path
          required: true
          schema:
            type: string
  /derivatives/api/v3/{tick_type}/{symbol}:
    get:
      operationId: resolutions
      summary: Resolutions
      description: "Candle resolutions available for specified tick type and market. List of available tick types can be fetched from the tick types endpoint. List of available markets can be fetched from the markets endpoint."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: tick_type
          in: path
          required: true
          schema:
            type: string
        - name: symbol
          in: path
          required: true
          schema:
            type: string
  /derivatives/api/v3/{tick_type}:
    get:
      operationId: symbols
      summary: Markets
      description: "Markets available for specified tick type. List of available tick types can be fetched from the tick types endpoint."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: tick_type
          in: path
          required: true
          schema:
            type: string
  /derivatives/api/v3/:
    get:
      operationId: tickTypes
      summary: Tick Types
      description: Returns all available tick types to use with the markets endpoint.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/account-log:
    get:
      operationId: accountLog
      summary: Get account log
      description: "Lists account log entries, paged by timestamp or by ID. To request entries by time range, use the since and before parameters. To request entries by ID range, use the from and to parameters. Any combination of since , before , from and to can be used to restrict the requested range of entries."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '429':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/accountlogcsv:
    get:
      operationId: accountLogCsv
      summary: Account log (CSV)
      description: Lists recent account log entries in CSV format.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '429':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/executions:
    get:
      operationId: getExecutionEvents
      summary: Get execution events
      description: Lists executions/trades for authenticated account.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/orders:
    get:
      operationId: getOrderEvents
      summary: Get order events
      description: Lists order events for authenticated account.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/positions:
    get:
      operationId: getPositionEvents
      summary: Get position update events
      description: Lists position events for authenticated account.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/market/{tradeable}/executions:
    get:
      operationId: getPublicExecutionEvents
      summary: Get public execution events
      description: Lists trades for a market.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: tradeable
          in: path
          required: true
          schema:
            type: string
  /derivatives/api/v3/market/{tradeable}/orders:
    get:
      operationId: getPublicOrderEvents
      summary: Get public order events
      description: Lists order events for a market.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: tradeable
          in: path
          required: true
          schema:
            type: string
  /derivatives/api/v3/market/{tradeable}/price:
    get:
      operationId: getPublicPriceEvents
      summary: Get public mark price events
      description: Lists price events for a market.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: tradeable
          in: path
          required: true
          schema:
            type: string
  /derivatives/api/v3/triggers:
    get:
      operationId: getTriggerEvents
      summary: Get trigger events
      description: Lists trigger events for authenticated account.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/rfqs/open-rfqs/accept-offer/{rfqUid}:
    post:
      operationId: acceptRfqOffer
      summary: Accept an offer on an open RFQ
      description: "Accept an offer on a specific open RFQ created by the authenticated account. Exactly one of bidAccepted or askAccepted must be provided. Note: This is currently available exclusively in the Kraken Futures DEMO environment."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: rfqUid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/assignmentprogram/add:
    post:
      operationId: addAssignmentProgram
      summary: Add assignment preference
      description: This endpoint adds an assignment program preference
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/cancelallorders:
    post:
      operationId: cancelAllOrders
      summary: Cancel all orders
      description: "This endpoint allows cancelling orders which are associated with a future's contract or a margin account. If no arguments are specified all open orders will be cancelled."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/cancelallordersafter:
    post:
      operationId: cancelAllOrdersAfter
      summary: Dead man's switch
      description: "This endpoint provides a Dead Man's Switch mechanism to protect the user from network malfunctions. The user can send a request with a timeout in seconds which will trigger a countdown timer that will cancel all user orders when timeout expires. The user has to keep sending request to push back the timeout expiration or they can deactivate the mechanism by specifying a timeout of zero (0). The recommended mechanism usage is making a call every 15 to 20 seconds and provide a timeout of 60 seconds. This allows the user to keep the orders in place on a brief network failure, while keeping them safe in case of a network breakdown."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/cancelorder:
    post:
      operationId: cancelOrder
      summary: Cancel order
      description: This endpoint allows cancelling an open order for a Futures contract.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/rfqs/cancel-offer/{rfqUid}:
    delete:
      operationId: cancelRfqOffer
      summary: Cancel open offer on open RFQ
      description: "Cancel the current open offer on the specified open RFQ. Note: This is currently available exclusively in the Kraken Futures DEMO environment."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: rfqUid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/rfqs/open-rfqs/{rfqUid}:
    delete:
      operationId: cancelUserRfq
      summary: Cancel an open RFQ
      description: "Cancel a specific open RFQ created by the authenticated account. Note: This is currently available exclusively in the Kraken Futures DEMO environment."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: rfqUid
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/rfqs/open-rfqs:
    post:
      operationId: createUserRfq
      summary: Create a new RFQ
      description: "Create a new RFQ for the authenticated account. Note: This is currently available exclusively in the Kraken Futures DEMO environment."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
    get:
      operationId: getOpenRfqsForAccount
      summary: List open RFQs for account
      description: "Retrieve all currently open RFQs created by the authenticated account. Note: This is currently available exclusively in the Kraken Futures DEMO environment."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/assignmentprogram/delete:
    post:
      operationId: deleteAssignmentProgram
      summary: Deletes assignment preference
      description: This endpoint deletes an assignment program preference
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/editorder:
    post:
      operationId: editOrderSpring
      summary: Edit order
      description: "This endpoint allows editing an existing order for a currently listed Futures contract. When editing an order, if the trailingStopMaxDeviation and trailingStopDeviationUnit parameters are sent unchanged, the system will recalculate a new stop price upon successful order modification."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/accounts:
    get:
      operationId: getAccounts
      summary: Get wallets
      description: "This endpoint returns key information relating to all your accounts which may either be cash accounts or margin accounts. This includes digital asset balances, instrument balances, margin requirements, margin trigger estimates and auxiliary information such as available funds, PnL of open positions and portfolio value."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/assignmentprogram/current:
    get:
      operationId: getAssignmentProgramCurrent
      summary: List assignment programs
      description: This endpoint returns information on currently active assignment programs
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/assignmentprogram/history:
    get:
      operationId: getAssignmentProgramHistory
      summary: List assignment preferences history
      description: "This endpoint returns information on assignment program preferences change history"
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/feeschedules:
    get:
      operationId: getFeeSchedulesV3
      summary: Get fee schedules
      description: This endpoint lists all fee schedules.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/fills:
    get:
      operationId: getFills
      summary: Get your fills
      description: "This endpoint returns information on your filled orders for all futures contracts."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/history:
    get:
      operationId: getHistory
      summary: Get trade history
      description: "This endpoint returns the most recent 100 trades prior to the specified lastTime value up to past 7 days or recent trading engine restart (whichever is sooner). If no lastTime specified, it will return 100 most recent trades."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/instruments:
    get:
      operationId: getInstruments
      summary: Get instruments
      description: Returns specifications for all currently listed markets and indices.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/leveragepreferences:
    get:
      operationId: getLeverageSetting
      summary: Get leverage settings
      description: Returns list of configured leverage preferences.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      operationId: setLeverageSetting
      summary: Set leverage settings
      description: "Sets a contract's margin mode, either \"isolated\" or \"cross\" margin. When specifying a max leverage, the contract's margin mode will be isolated. Calling this endpoint can result in the following error codes: 87: Contract does not exist 88: Contract not a multi-collateral futures contract 41: Would cause liquidation"
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/notifications:
    get:
      operationId: getNotifications
      summary: Get notifications
      description: This endpoint provides the platform's notifications.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/openorders:
    get:
      operationId: getOpenOrders
      summary: Get open orders
      description: This endpoint returns information on all open orders for all Futures contracts.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/openpositions:
    get:
      operationId: getOpenPositions
      summary: Get open positions
      description: "This endpoint returns the size and average entry price of all open positions in Futures contracts. This includes Futures contracts that have matured but have not yet been settled."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/rfqs/{rfqUid}:
    get:
      operationId: getOpenRfq
      summary: Retrieve a single open RFQ
      description: "Retrieve a specific open RFQ by its unique identifier Note: This is currently available exclusively in the Kraken Futures DEMO environment."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: rfqUid
          in: path
          required: true
          schema:
            type: string
  /derivatives/api/v3/rfqs/open-offers:
    get:
      operationId: getOpenRfqOffers
      summary: List open offers on open RFQs
      description: "Retrieve all open offers for the account on currently open RFQs Note: This is currently available exclusively in the Kraken Futures DEMO environment."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/rfqs:
    get:
      operationId: getOpenRfqs
      summary: List all open RFQs
      description: "Retrieve all currently open RFQs Note: This is currently available exclusively in the Kraken Futures DEMO environment."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/orders/status:
    post:
      operationId: getOrderStatus
      summary: Get Specific Orders' Status
      description: "Returns information on specified orders which are open or were filled/cancelled in the last 5 seconds."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/orderbook:
    get:
      operationId: getOrderbook
      summary: Get orderbook
      description: "This endpoint returns the entire non-cumulative order book of currently listed Futures contracts."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/pnlpreferences:
    get:
      operationId: getPnlCurrencyPreference
      summary: Get PNL currency preferences
      description: "The PNL currency preference is used to determine which currency to pay out when realizing PNL gains."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      operationId: setPnlCurrencyPreference
      summary: Set PNL currency preference
      description: "The PNL currency preference is used to determine which currency to pay out when realizing PNL gains. Calling this API can result in the following error codes: 87: Contract does not exist 88: Contract not a multi-collateral futures contract 89: Currency does not exist 90: Currency is not enabled for multi-collateral futures 41: Would cause liquidation"
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/portfolio-margining/parameters:
    get:
      operationId: getPortfolioMarginingParameters
      summary: Get portfolio margin parameters
      description: "Retrieve current portfolio margin calculation parameters. Also includes user specific limits related to options trading. Note: This is currently available exclusively in the Kraken Futures DEMO environment."
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /derivatives/api/v3/self-trade-strategy:
    get:
      operationId: getSelfTradeStrategy
      summary: Get self trade strategy
      description: Returns account-wide self-trade matching strategy.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    put:
      operationId: setSelfTradeStrategy
      summary: Update self trade strategy
      description: Updates account-wide self-trade matching behavior to given strategy.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
  /derivatives/api/v3/subaccount/{subaccountUid}/trading-enabled:
    get:
      operationId: getSubaccountTradingCapability
      summary: Check subaccount trading status
      description: Returns trading capability info for given subaccount.
      responses:
        '200':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '404':
          description: See Kraken docs.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
      parameters:
        - name: subaccountUid
          in: path
          required: true
          schema:
            type: string
    put:
