      description: "Create a new headless subaccount in the Payward system. A headless subaccount is a lightweight account that only requires an external ID mapping, without any user profile data (email, name, phone, etc.). This is useful for partners who manage user data entirely on their side. Note: The availability of this endpoint depends on your licensing agreement. Only partners with the relevant licenses in their operating jurisdiction can choose not to share KYC data with Payward. If you need to create a user with full profile data for KYC verification, use the Create User endpoint instead."
