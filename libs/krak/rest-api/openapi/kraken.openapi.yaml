openapi: 3.1.0
info:
  title: Kraken Spot REST API
  version: current
  description: Conservative OpenAPI 3.1 spec built from Kraken API Center Spot REST endpoint pages. This captures documented
    endpoint surfaces, summaries, and response descriptions from the live docs, not the guide-page hierarchy.
servers:
- url: https://api.kraken.com
  description: Kraken API host
tags:
- name: Market Data
  description: Public market data endpoints.
- name: Account Data
  description: account, balance, history, and reporting endpoints.
- name: Trading
  description: Order lifecycle and trading endpoints.
- name: Funding
  description: Deposit, withdrawal, and transfer endpoints.
- name: Subaccounts
  description: Subaccount management and allocation endpoints.
- name: Strategies
  description: Allocation and strategy management endpoints.
- name: Earn
  description: Earn strategy endpoints.
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: API-Key
    apiSignAuth:
      type: apiKey
      in: header
      name: API-Sign
  schemas:
    GenericObject:
      type: object
      additionalProperties: true
    GenericArray:
      type: array
      items: {}
paths:
  /0/private/AccountTransfer:
    post:
      tags:
      - Subaccounts
      operationId: accountTransfer
      summary: Account Transfer
      description: 'Transfer funds to and from master and subaccounts. Note: AccountTransfer must be called using an API key
        from the master account. API Key Permissions Required: Funds permissions - Withdraw'
      responses:
        '200':
          description: Funds transferred between accounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/account-transfer
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/AddExport:
    post:
      tags:
      - Account Data
      operationId: addExport
      summary: Request Export Report
      description: 'Request export of trades or ledgers. API Key Permissions Required: Data - Export data'
      responses:
        '200':
          description: Export request made
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/add-export
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/AddOrder:
    post:
      tags:
      - Trading
      operationId: addOrder
      summary: Add Order
      description: 'Place a new order. Note: See the AssetPairs endpoint for details on the available trading pairs, their
        price and quantity precisions, order minimums, available leverage, etc. API Key Permissions Required: Orders and trades
        - Create & modify orders'
      responses:
        '200':
          description: Order added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/add-order
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/AddOrderBatch:
    post:
      tags:
      - Trading
      operationId: addOrderBatch
      summary: Add Order Batch
      description: 'Sends a collection of orders (minimum of 2 and maximum 15): Validation is performed on the whole batch
        prior to submission to the engine. If an order fails validation, the whole batch will be rejected. On submission to
        the engine, if an order fails pre-match checks (i.e. funding), then the individual order will be rejected and remainder
        of the batch will be processed. All orders in batch are limited to a single pair. Note: See the AssetPairs endpoint
        for details on the available trading pairs, their price and quantity precisions, order minimums, available leverage,
        etc. API Key Permissions Required: Orders and trades - Create & modify orders and Orders and trades - Cancel & close
        orders'
      responses:
        '200':
          description: The order of returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/add-order-batch
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/Earn/Allocate:
    post:
      tags:
      - Earn
      operationId: allocateStrategy
      summary: Allocate Earn Funds
      description: 'Allocate funds to the Strategy. Requires the Earn Funds API key permission. The amount must always be
        defined. This method is asynchronous. A couple of preflight checks are performed synchronously on behalf of the method
        before it is dispatched further. The client is required to poll the result using the /0/private/Earn/AllocateStatus
        endpoint. There can be only one (de)allocation request in progress for given user and strategy at any time. While
        the operation is in progress: pending attribute in /Earn/Allocations response for the strategy indicates that funds
        are being allocated, pending attribute in /Earn/AllocateStatus response will be true. Following specific errors within
        Earnings class can be returned by this method: Minimum allocation: EEarnings:Below min:(De)allocation operation amount
        less than minimum Allocation in progress: EEarnings:Busy:Another (de)allocation for the same strategy is in progress
        Service temporarily unavailable: EEarnings:Busy . Try again in a few minutes. User tier verification: EEarnings:Permission
        denied:The user''s tier is not high enough Strategy not found: EGeneral:Invalid arguments:Invalid strategy ID'
      responses:
        '200':
          description: Earn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/allocate-strategy
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/AmendOrder:
    post:
      tags:
      - Trading
      operationId: amendOrder
      summary: Amend Order
      description: 'The amend request enables clients to modify the order parameters in-place without the need to cancel the
        existing order and create a new one. The order identifiers assigned by Kraken and/or client will stay the same. Queue
        priority in the order book will be maintained where possible. If an amend request will reduce the order quantity below
        the existing filled quantity, the remaining quantity will be cancelled. For more detail, see amend transaction guide
        . API Key Permissions Required: Orders and trades - Create & modify orders or Orders and trades - Cancel & close orders'
      responses:
        '200':
          description: A successful amend request will return the unique Kraken amend identifier.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/amend-order
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/CancelAll:
    post:
      tags:
      - Trading
      operationId: cancelAllOrders
      summary: Cancel All Orders
      description: 'Cancel all open orders API Key Permissions Required: Orders and trades - Create & modify orders or Orders
        and trades - Cancel & close orders'
      responses:
        '200':
          description: Open orders cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/cancel-all-orders
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/CancelAllOrdersAfter:
    post:
      tags:
      - Trading
      operationId: cancelAllOrdersAfter
      summary: Cancel All Orders After X
      description: 'CancelAllOrdersAfter provides a "Dead Man''s Switch" mechanism to protect the client from network malfunction,
        extreme latency or unexpected matching engine downtime. The client can send a request with a timeout (in seconds),
        that will start a countdown timer which will cancel all client orders when the timer expires. The client has to keep
        sending new requests to push back the trigger time, or deactivate the mechanism by specifying a timeout of 0. If the
        timer expires, all orders are cancelled and then the timer remains disabled until the client provides a new (non-zero)
        timeout. The recommended use is to make a call every 15 to 30 seconds, providing a timeout of 60 seconds. This allows
        the client to keep the orders in place in case of a brief disconnection or transient delay, while keeping them safe
        in case of a network breakdown. It is also recommended to disable the timer ahead of regularly scheduled trading engine
        maintenance (if the timer is enabled, all orders will be cancelled when the trading engine comes back from downtime
        - planned or otherwise). API Key Permissions Required: Orders and trades - Create & modify orders or Orders and trades
        - Cancel & close orders'
      responses:
        '200':
          description: Dead man's switch timer reset or disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/cancel-all-orders-after
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/CancelOrder:
    post:
      tags:
      - Trading
      operationId: cancelOrder
      summary: Cancel Order
      description: 'Cancel a particular open order (or set of open orders) by txid , userref or cl_ord_id API Key Permissions
        Required: Orders and trades - Create & modify orders or Orders and trades - Cancel & close orders'
      responses:
        '200':
          description: Open order cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/cancel-order
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/CancelOrderBatch:
    post:
      tags:
      - Trading
      operationId: cancelOrderBatch
      summary: Cancel Order Batch
      description: 'Cancel multiple open orders by txid , userref or cl_ord_id (maximum 50 total unique IDs/references) API
        Key Permissions Required: Orders and trades - Create & modify orders or Orders and trades - Cancel & close orders'
      responses:
        '200':
          description: Open order cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/cancel-order-batch
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/WithdrawCancel:
    post:
      tags:
      - Funding
      operationId: cancelWithdrawal
      summary: Request Withdrawal Cancellation
      description: 'Cancel a recently requested withdrawal, if it has not already been successfully processed. API Key Permissions
        Required: Funds permissions - Withdraw , unless withdrawal is a WalletTransfer , then no permissions are required.'
      responses:
        '200':
          description: Withdrawal cancellation requested.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/cancel-withdrawal
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/CreateSubaccount:
    post:
      tags:
      - Subaccounts
      operationId: createSubaccount
      summary: Create Subaccount
      description: 'Create a trading subaccount. Note: CreateSubaccount must be called using an API key from the master account.
        API Key Permissions Required: Funds permissions - Withdraw'
      responses:
        '200':
          description: Subaccount created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/create-subaccount
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/Earn/Deallocate:
    post:
      tags:
      - Earn
      operationId: deallocateStrategy
      summary: Deallocate Earn Funds
      description: 'Deallocate funds from a strategy. Requires the Earn Funds API key permission. The amount must always be
        defined. This method is asynchronous. A couple of preflight checks are performed synchronously on behalf of the method
        before it is dispatched further. If the method returns HTTP 202 code, the client is required to poll the result using
        the /Earn/DeallocateStatus endpoint. There can be only one (de)allocation request in progress for given user and strategy.
        While the operation is in progress: pending attribute in Allocations response for the strategy will hold the amount
        that is being deallocated (negative amount) pending attribute in DeallocateStatus response will be true. Following
        specific errors within Earnings class can be returned by this method: Minimum allocation: EEarnings:Below min:(De)allocation
        operation amount less than minimum allowed Allocation in progress: EEarnings:Busy:Another (de)allocation for the same
        strategy is in progress Strategy not found: EGeneral:Invalid arguments:Invalid strategy ID'
      responses:
        '200':
          description: Allocate Earn Funds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/deallocate-strategy
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/EditOrder:
    post:
      tags:
      - Trading
      operationId: editOrder
      summary: Edit Order
      description: 'Sends a request to edit the order parameters of a live order. When an order has been successfully modified,
        the original order will be cancelled and a new order will be created with the adjusted parameters a new txid will
        be returned in the response. note The new AmendOrder endpoint resolves the caveats listed below and has additional
        performance gains. There are a number of caveats for EditOrder : triggered stop loss or profit take profit orders
        are not supported. orders with conditional close terms attached are not supported. orders where the executed volume
        is greater than the newly supplied volume will be rejected. cl_ord_id is not supported. existing executions will are
        associated with the original order and not copied to the amended order. queue position will not be maintained. API
        Key Permissions Required: Orders and trades - Create & modify orders and Orders and trades - Cancel & close orders'
      responses:
        '200':
          description: Order edited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/edit-order
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/ExportStatus:
    post:
      tags:
      - Account Data
      operationId: exportStatus
      summary: Get Export Report Status
      description: 'Get status of requested data exports. API Key Permissions Required: Data - Export data'
      responses:
        '200':
          description: Export status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/export-status
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/Balance:
    post:
      tags:
      - Account Data
      operationId: getAccountBalance
      summary: Get Account Balance
      description: 'Retrieve all cash balances, net of pending withdrawals. Note on Staking/Earn assets: We have begun to
        migrate assets from our legacy Staking system over to a new Earn system. As such, the following assets may appear
        in your balances and ledger. Please see our Support article for more details. Note that these assets are "read-only",
        to interact with your balances in them please use the base asset (e.g. USDT to transact with your USDT and USDT.F
        balances). Symbol Extensions : .B : balances in new yield-bearing products, similar to .S (staked) and .M (opt-in
        rewards) balances .F : balances earning automatically in Kraken Rewards .T : tokenized assets. API Key Permissions
        Required: Funds permissions - Query'
      responses:
        '200':
          description: Account balances retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-account-balance
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/Earn/AllocateStatus:
    post:
      tags:
      - Earn
      operationId: getAllocateStrategyStatus
      summary: Get Allocation Status
      description: 'Get the status of the last allocation request. Requires either the Earn Funds or Query Funds API key permission.
        (De)allocation operations are asynchronous and this endpoint allows client to retrieve the status of the last dispatched
        operation. There can be only one (de)allocation request in progress for given user and strategy. The pending attribute
        in the response indicates if the previously dispatched operation is still in progress (true) or has successfully completed
        (false). If the dispatched request failed with an error, then HTTP error is returned to the client as if it belonged
        to the original request. Following specific errors within Earnings class can be returned by this method: Insufficient
        funds: EEarnings:Insufficient funds:Insufficient funds to complete the (de)allocation request User cap exceeded: EEarnings:Above
        max:The allocation exceeds user limit for the strategy Total cap exceeded: EEarnings:Above max:The allocation exceeds
        the total strategy limit Minimum allocation: EEarnings:Below min:(De)allocation operation amount less than minimum'
      responses:
        '200':
          description: Deallocate Earn Funds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-allocate-strategy-status
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/GetApiKeyInfo:
    post:
      tags:
      - Account Data
      operationId: getApiKeyInfo
      summary: Get API Key Info
      description: 'Retrieve information about the API key that is used to make the request, including its name, permissions,
        restrictions, and usage timestamps. API Key Permissions Required: None'
      responses:
        '200':
          description: API key information retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-api-key-info
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/public/Assets:
    get:
      tags:
      - Market Data
      operationId: getAssetInfo
      summary: Get Asset Info
      description: Get information about the assets that are available for deposit, withdrawal, trading and earn.
      responses:
        '200':
          description: Asset info retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-asset-info
  /0/private/ClosedOrders:
    post:
      tags:
      - Account Data
      operationId: getClosedOrders
      summary: Get Closed Orders
      description: 'Retrieve information about orders that have been closed (filled or cancelled). 50 results are returned
        at a time, the most recent by default. Note: If an order''s tx ID is given for start or end time, the order''s opening
        time ( opentm ) is used API Key Permissions Required: Orders and trades - Query closed orders & trades'
      responses:
        '200':
          description: Closed orders info retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-closed-orders
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/CreditLines:
    post:
      tags:
      - Account Data
      operationId: getCreditLines
      summary: Get Credit Lines
      description: 'Retrieve all credit line details for VIPs with this functionality. API Key Permissions Required: Funds
        permissions - Query'
      responses:
        '200':
          description: Credit line details retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-credit-lines
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/Earn/DeallocateStatus:
    post:
      tags:
      - Earn
      operationId: getDeallocateStrategyStatus
      summary: Get Deallocation Status
      description: 'Get the status of the last deallocation request. Requires either the Earn Funds or Query Funds API key
        permission. (De)allocation operations are asynchronous and this endpoint allows client to retrieve the status of the
        last dispatched operation. There can be only one (de)allocation request in progress for given user and strategy. The
        pending attribute in the response indicates if the previously dispatched operation is still in progress (true) or
        has successfully completed (false). If the dispatched request failed with an error, then HTTP error is returned to
        the client as if it belonged to the original request. Following specific errors within Earnings class can be returned
        by this method: Insufficient funds: EEarnings:Insufficient funds:Insufficient funds to complete the (de)allocation
        request Minimum allocation: EEarnings:Below min:(De)allocation operation amount less than minimum'
      responses:
        '200':
          description: Get Allocation Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-deallocate-strategy-status
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/DepositAddresses:
    post:
      tags:
      - Funding
      operationId: getDepositAddresses
      summary: Get Deposit Addresses
      description: 'Retrieve (or generate a new) deposit addresses for a particular asset and method. API Key Permissions
        Required: Funds permissions - Query'
      responses:
        '200':
          description: Deposit addresses retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-deposit-addresses
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/DepositMethods:
    post:
      tags:
      - Funding
      operationId: getDepositMethods
      summary: Get Deposit Methods
      description: 'Retrieve methods available for depositing a particular asset. API Key Permissions Required: Funds permissions
        - Query and Funds permissions - Deposit'
      responses:
        '200':
          description: Deposit methods retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-deposit-methods
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/BalanceEx:
    post:
      tags:
      - Account Data
      operationId: getExtendedBalance
      summary: Get Extended Balance
      description: 'Retrieve all extended account balances, including credits and held amounts. Balance available for trading
        is calculated as: available balance = balance + credit - credit_used - hold_trade Note on Staking/Earn assets: We
        have begun to migrate assets from our legacy Staking system over to a new Earn system. As such, the following assets
        may appear in your balances and ledger. Please see our Support article for more details. Note that these assets are
        "read-only", to interact with your balances in them please use the base asset (e.g. USDT to transact with your USDT
        and USDT.F balances). Symbol Extensions : .B : balances in new yield-bearing products, similar to .S (staked) and
        .M (opt-in rewards) balances .F : balances earning automatically in Kraken Rewards .T : tokenized assets. API Key
        Permissions Required: Funds permissions - Query'
      responses:
        '200':
          description: Extended account balances retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/get-extended-balance
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/public/GroupedBook:
    get:
      tags:
      - Market Data
      operationId: getGroupedOrderBook
      summary: Get Grouped Order Book
      description: The GroupedBook endpoint aggregates the volume in the order book over a specified tick range. It provides
