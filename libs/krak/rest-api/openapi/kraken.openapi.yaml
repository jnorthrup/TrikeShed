  /0/private/Earn/Allocations:
    post:
      tags:
      - Earn
      operationId: listAllocations
      summary: List Earn Allocations
      description: 'List all allocations for the user. Requires the Query Funds API key permission. By default all allocations
        are returned, even for strategies that have been used in the past and have zero balance now. That is so that the user
        can see how much was earned with given strategy in the past. hide_zero_allocations parameter can be used to remove
        zero balance entries from the output. Paging hasn''t been implemented for this method as we don''t expect the result
        for a particular user to be overwhelmingly large. All amounts in the output can be denominated in a currency of user''s
        choice (the converted_asset parameter). Information about when the next reward will be paid to the client is also
        provided in the output. Allocated funds can be in up to 4 states: bonding allocated exit_queue (ETH only) unbonding
        Any funds in total not in bonding / unbonding are simply allocated and earning rewards. Depending on the strategy
        funds in the other 3 states can also be earning rewards. Consult the output of /Earn/Strategies to know whether bonding
        / unbonding earn rewards. ETH in exit_queue still earns rewards. Note that for ETH , when the funds are in the exit_queue
        state, the expires time given is the time when the funds will have finished unbonding, not when they go from exit
        queue to unbonding. (Un)bonding time estimate can be inaccurate right after having (de)allocated the funds. Wait 1-2
        minutes after (de)allocating to get an accurate result.'
      responses:
        '200':
          description: List Earn Strategies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/list-allocations
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
  /0/private/Earn/Strategies:
    post:
      tags:
      - Earn
      operationId: listStrategies
      summary: List Earn Strategies
      description: 'List earn strategies along with their parameters. Requires a valid API key but not specific permission
        is required. Returns only strategies that are available to the user based on geographic region. When the user does
        not meet the tier restriction, can_allocate will be false and allocation_restriction_info indicates Tier as the restriction
        reason. Earn products generally require Intermediate tier. Get your account verified to access earn. A note about
        lock_type : instant : can be deallocated without an unbonding period. This is called flexible in the UI. bonded :
        has an unbonding period. Deallocation will not happen until this period has passed. flex : "Kraken rewards". This
        is earning on your spot balances where eligible. It''s turned on account wide from the UI and you cannot manually
        allocate to these strategies. Paging isn''t yet implemented, so the endpoint always returns all data in the first
        page.'
      responses:
        '200':
          description: Get Deallocation Status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
      x-kraken-source: https://docs.kraken.com/api/docs/rest-api/list-strategies
      security:
      - apiKeyAuth: []
        apiSignAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
