<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrikeShed Blockly — Mating Surface Canvas</title>
    <script src="https://unpkg.com/blockly@11.2.1/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly@11.2.1/msg/en.js"></script>
    <style>
        /* ── Design tokens ── */
        :root {
            --glass-bg: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --glass-blur: 24px;
            --glass-sat: 180%;
            --depth-shadow: 0 8px 32px rgba(0,0,0,0.37);
            --edge-light: inset 0 0.5px 0 rgba(255,255,255,0.07);
            --ambient: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(137,180,250,0.06), transparent 60%),
                       radial-gradient(ellipse 60% 50% at 80% 100%, rgba(203,166,247,0.05), transparent 60%),
                       radial-gradient(ellipse 40% 40% at 50% 50%, rgba(166,227,161,0.03), transparent 70%);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            color: #cdd6f4;
        }

        /* ── Animated aurora background ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -2;
            background: #0a0a0f;
        }
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background:
                radial-gradient(circle 600px at var(--mx, 30%) var(--my, 20%), rgba(137,180,250,0.08), transparent),
                radial-gradient(circle 500px at 70% 80%, rgba(203,166,247,0.06), transparent),
                radial-gradient(circle 400px at 90% 10%, rgba(148,226,213,0.04), transparent),
                radial-gradient(circle 450px at 10% 90%, rgba(245,194,231,0.03), transparent),
                var(--ambient);
            animation: aurora 20s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes aurora {
            0%   { filter: hue-rotate(0deg) brightness(1); transform: scale(1); }
            50%  { filter: hue-rotate(15deg) brightness(1.05); transform: scale(1.02); }
            100% { filter: hue-rotate(-10deg) brightness(0.95); transform: scale(1.01); }
        }

        /* ── Subtle noise texture overlay ── */
        #noise {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' /%3E%3C/svg%3E");
        }

        /* ── Header: frosted glass bar ── */
        #header {
            position: relative; z-index: 10;
            padding: 10px 20px;
            background: rgba(20,20,30,0.55);
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--depth-shadow), var(--edge-light);
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
        }
        #header h1 {
            font-size: 14px; font-weight: 600; margin: 0;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #89b4fa, #cba6f7 50%, #f5c2e7);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .badge {
            font-size: 10px; font-weight: 500;
            padding: 3px 10px; border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--edge-light);
            color: #a6adc8;
            letter-spacing: 0.02em;
        }
        #stats {
            font-size: 11px; color: #6c7086; margin-left: auto;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
        }

        /* ── Blockly canvas container ── */
        #blocklyDiv {
            position: absolute; top: 48px; bottom: 0; left: 0; right: 0;
        }

        /* ── Translucent toolbox panel ── */
        .blocklyToolboxDiv {
            background: rgba(15,15,25,0.65) !important;
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
            border-right: 1px solid var(--glass-border) !important;
            box-shadow: 4px 0 24px rgba(0,0,0,0.3), var(--edge-light);
        }

        /* Toolbox category rows */
        .blocklyTreeRow {
            color: #bac2de !important;
            height: 34px !important;
            line-height: 34px !important;
            margin: 2px 6px !important;
            border-radius: 8px;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }
        .blocklyTreeRow:hover {
            background: rgba(255,255,255,0.06) !important;
            box-shadow: var(--edge-light);
        }
        .blocklyTreeSelected {
            background: rgba(137,180,250,0.12) !important;
            box-shadow: inset 2px 0 0 #89b4fa, var(--edge-light);
        }
        .blocklyTreeLabel {
            font-size: 12px !important;
            font-weight: 400 !important;
            letter-spacing: 0.01em;
        }

        /* ── Translucent flyout ── */
        .blocklyFlyoutBackground {
            fill: rgba(15,15,25,0.75) !important;
            fill-opacity: 1 !important;
        }
        .blocklyFlyout {
            backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
            -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-sat));
        }
        .blocklyFlyoutButton {
            fill: rgba(255,255,255,0.05) !important;
        }

        /* ── Block rendering: translucent glass blocks ── */
        .blocklyMainBackground {
            stroke: rgba(255,255,255,0.06) !important;
            stroke-width: 1 !important;
        }

        /* Glass fill on all block paths */
        .blocklyBlockCanvas g[clip-path] > path:first-child {
            /* The zelos/thrasos renderer paints the main block shape first */
        }

        /* Selected block glow */
        .blocklySelected > .blocklyPath {
            stroke-width: 2px !important;
            filter: drop-shadow(0 0 6px rgba(137,180,250,0.5));
        }

        /* Connection highlight when dragging near */
        .blocklyReplaceable .blocklyPath {
            filter: drop-shadow(0 0 4px rgba(166,227,161,0.4));
        }

        /* Field text */
        .blocklyHtmlInput, .blocklyText {
            font-family: 'SF Mono', 'JetBrains Mono', monospace !important;
        }

        /* Grid dots — subtle */
        .blocklyBlockCanvas, .blocklyBubbleCanvas, .blocklyCanvas {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1); border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Zoom controls */
        .blocklyZoom > image, .blocklyZoomimage {
            opacity: 0.7;
        }
        .blocklyZoom > image:hover { opacity: 1; }
    </style>
</head>
<body>
<div id="noise"></div>
<div id="header">
    <h1>TrikeShed</h1>
    <span class="badge">mating surfaces</span>
    <span class="badge">type topology</span>
    <span id="stats"></span>
</div>
<div id="blocklyDiv"></div>

<script>
window.onerror = function(msg, url, line, col, error) {
    document.title = 'ERROR: ' + msg;
    var d = document.getElementById('blocklyDiv');
    if (d) d.innerHTML = '<div style="padding:20px;color:#f38ba8;font-family:monospace;font-size:12px">' +
        'JS Error: ' + msg + '<br>at line ' + line + ':' + col + '<br><pre>' +
        (error ? error.stack : 'no stack') + '</pre></div>';
};
</script>
<script>
fetch('model_v2.json')
    .then(r => r.json())
    .then(data => {
      try { initBlockly(data); }
      catch(e) {
        document.getElementById('blocklyDiv').innerHTML =
          '<div style="padding:20px;color:#f38ba8;font-family:monospace">Init error: ' +
          e.message + '<br><pre>' + e.stack + '</pre></div>';
        console.error('INIT ERROR:', e);
      }
    })
    .catch(err => {
        document.getElementById('blocklyDiv').innerHTML =
            '<div style="padding:20px;color:#f38ba8">Failed to load model_v2.json: ' + err.message +
            '<br>Run: python3 -m http.server 8090 from blockly/</div>';
    });

function initBlockly(data) {
        const model = data.model;

        // ── REGISTER BLOCKS ──
        Blockly.defineBlocksWithJsonArray(model);

        // ── BUILD MATING SURFACE TREE (ffblockly parity) ──
        const toolbox = document.createElement('xml');
        toolbox.setAttribute('id', 'toolbox');

        const root = document.createElement('category');
        root.setAttribute('name', 'trikeshed');
        root.setAttribute('colour', '#89b4fa');
        toolbox.appendChild(root);

        const used = {};

        model.forEach(function(k) {
            let prefix, isChain = false;

            if (k.previousStatement || k.nextStatement) {
                prefix = `${k.previousStatement || '∅'} → ${k.nextStatement || '∅'}`;
                isChain = true;
            } else if (k.output) {
                prefix = `◆ ${k.output}`;
            } else {
                prefix = 'untyped';
            }

            if (!used[prefix]) {
                const cat = document.createElement('category');
                cat.setAttribute('name', prefix);
                cat.setAttribute('colour', `hsl(${k.colour || 200}, 55%, 55%)`);
                root.appendChild(cat);
                used[prefix] = cat;
            }

            const blockEl = document.createElement('block');
            blockEl.setAttribute('type', k.type);
            used[prefix].appendChild(blockEl);
        });

        // ── CUSTOM DARK GLASS THEME ──
        // Override the block colours to use translucent glass-style fills
        const glassTheme = Blockly.Theme.defineTheme('trikeshedglass', {
            base: Blockly.Themes.Zelos,
            blockStyles: {
                // Each colour family gets glass-like styling
                // Blockly uses these for category-coloured blocks
            },
            componentStyles: {
                workspaceBackgroundColour: 'transparent',
                toolboxBackgroundColour: 'rgba(15,15,25,0.65)',
                toolboxForegroundColour: '#cdd6f4',
                flyoutBackgroundColour: 'rgba(15,15,25,0.75)',
                flyoutForegroundColour: '#cdd6f4',
                flyoutOpacity: 0.9,
                scrollbarColour: 'rgba(255,255,255,0.15)',
                insertionMarkerColour: '#a6e3a1',
                insertionMarkerOpacity: 0.5,
                markerColour: '#89b4fa',
                cursorColour: '#f5c2e7',
                gridColour: 'rgba(255,255,255,0.04)',
                selectedGlowColour: '#89b4fa',
                selectedGlowOpacity: 0.4,
                replacementGlowColour: '#a6e3a1',
                replacementGlowOpacity: 0.3,
            },
            categoryStyles: {},
        });

        // ── INJECT WORKSPACE ──
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: toolbox,
            theme: glassTheme,
            grid: {
                spacing: 28,
                length: 2,
                colour: 'rgba(255,255,255,0.035)',
                snap: true,
            },
            zoom: {
                controls: true,
                wheel: true,
                startScale: 0.85,
                maxScale: 2.5,
                minScale: 0.25,
                scaleSpeed: 1.15,
                pinch: true,
            },
            trashcan: true,
            move: { scrollbars: true, drag: true, wheel: true },
            renderer: 'zelos',
            plugins: {},
        });

        // ── POST-INJECT: make blocks translucent ──
        // Override block SVG fill opacity after render
        function applyGlassEffect(ws) {
            const svg = ws.getCanvas();
            // Target the main block path elements (first path in each block group)
            const blockPaths = svg.querySelectorAll('g.blocklyDraggable > path:first-child:not(.blocklyDisabledPath)');
            blockPaths.forEach(path => {
                const fill = path.getAttribute('fill');
                if (fill && !path.dataset.glassApplied) {
                    // Convert the hex fill to a translucent version
                    if (fill.startsWith('#')) {
                        const r = parseInt(fill.slice(1,3), 16);
                        const g = parseInt(fill.slice(3,5), 16);
                        const b = parseInt(fill.slice(5,7), 16);
                        // Glass: 82% opacity fill + gradient overlay
                        path.setAttribute('fill-opacity', '0.82');
                        // Add inner glow (top edge highlight)
                        path.setAttribute('stroke', `rgba(255,255,255,0.12)`);
                        path.setAttribute('stroke-width', '1');
                        path.setAttribute('stroke-linejoin', 'round');
                        // Drop shadow for depth
                        path.style.filter = 'drop-shadow(0 2px 6px rgba(0,0,0,0.25))';
                        path.dataset.glassApplied = '1';
                    }
                }
            });
        }

        // ── CONNECTOR LINE META-APPLICATION ──
        // Draws glowing bezier curves between mated value-output blocks
        // and accent lines along statement chains
        const SURFACE_COLORS = {
            'Signal':'#89b4fa','Toggle':'#cba6f7','Slider':'#f9e2af','Knob':'#f9e2af',
            'Dial':'#f9e2af','IdiotLight':'#f38ba8','MomentaryButton':'#f38ba8',
            'SignalComponent':'#b4befe',
            'Cursor':'#a6e3a1','Series':'#a6e3a1','RowVec':'#a6e3a1',
            'ReductionResult':'#a6e3a1',
            'ConfixDoc':'#94e2d5','ConfixIndex':'#94e2d5','ScanToken':'#89dceb','TreeCursor':'#89dceb',
            'ForgeFile':'#fab387','ForgePrompt':'#fab387','ForgeWorkflow':'#fab387',
            'StepResult':'#f9e2af','ExecutionResult':'#fab388',
            'KanbanBoard':'#cba6f7','KanbanCard':'#f5c2e7','CascadeGraph':'#cba6f7',
            'Join':'#94e2d5','Twin':'#94e2d5',
        };

        function getSurfaceColor(check) {
            if (!check) return 'rgba(255,255,255,0.2)';
            const types = Array.isArray(check) ? check : [check];
            for (const t of types) { if (SURFACE_COLORS[t]) return SURFACE_COLORS[t]; }
            return 'rgba(255,255,255,0.15)';
        }

        function drawConnectors(ws) {
            const svg = ws.getCanvas();
            const old = svg.querySelector('#ts-connectors');
            if (old) old.remove();

            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const overlay = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            overlay.setAttribute('id', 'ts-connectors');
            overlay.setAttribute('pointer-events', 'none');

            ws.getAllBlocks(false).forEach(block => {
                // Value connections (child output → parent input)
                block.inputList.forEach(input => {
                    if (input.connection?.targetConnection) {
                        const child = input.connection.targetBlock();
                        if (!child) return;

                        const parentXY = block.getRelativeToSurfaceXY();
                        const childXY = child.getRelativeToSurfaceXY();
                        const inputIdx = block.inputList.indexOf(input);

                        // Approximate socket/plug pixel positions
                        const y1 = parentXY.y + 8 + inputIdx * 24;
                        const y2 = childXY.y + child.getHeightWidth().height / 2;
                        const x1 = parentXY.x - 6;
                        const x2 = childXY.x + child.getHeightWidth().width;

                        const check = input.connection.check_;
                        const color = getSurfaceColor(check);

                        // Gradient def for this connector
                        const gradId = `grad-${block.id}-${input.name}`;
                        const grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
                        grad.setAttribute('id', gradId);
                        grad.setAttribute('x1', '0%'); grad.setAttribute('y1', '0%');
                        grad.setAttribute('x2', '100%'); grad.setAttribute('y2', '0%');
                        const s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                        s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', color); s1.setAttribute('stop-opacity', '0.7');
                        const s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                        s2.setAttribute('offset', '100%'); s2.setAttribute('stop-color', color); s2.setAttribute('stop-opacity', '0.2');
                        grad.appendChild(s1); grad.appendChild(s2);
                        defs.appendChild(grad);

                        // Bezier curve path
                        const cx1 = x1 - 25, cx2 = x2 + 25;
                        const d = `M ${x1} ${y1} C ${cx1} ${y1}, ${cx2} ${y2}, ${x2} ${y2}`;
                        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        path.setAttribute('d', d);
                        path.setAttribute('fill', 'none');
                        path.setAttribute('stroke', `url(#${gradId})`);
                        path.setAttribute('stroke-width', '2.5');
                        path.setAttribute('stroke-linecap', 'round');
                        path.setAttribute('stroke-dasharray', '5 3');
                        path.setAttribute('opacity', '0.65');
                        path.style.filter = `drop-shadow(0 0 3px ${color}66)`;
                        overlay.appendChild(path);

                        // Type label badge at midpoint
                        const midX = (x1 + x2) / 2;
                        const midY = (y1 + y2) / 2 - 6;
                        if (check?.length) {
                            const labelBg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                            const labelText = Array.isArray(check) ? check[0] : check;
                            const w = labelText.length * 6 + 10;
                            labelBg.setAttribute('x', midX - w/2);
                            labelBg.setAttribute('y', midY - 7);
                            labelBg.setAttribute('width', w);
                            labelBg.setAttribute('height', 14);
                            labelBg.setAttribute('rx', 7);
                            labelBg.setAttribute('fill', 'rgba(15,15,25,0.7)');
                            labelBg.setAttribute('stroke', color);
                            labelBg.setAttribute('stroke-width', '0.5');
                            labelBg.setAttribute('opacity', '0.85');
                            overlay.appendChild(labelBg);

                            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                            text.setAttribute('x', midX);
                            text.setAttribute('y', midY + 3);
                            text.setAttribute('text-anchor', 'middle');
                            text.setAttribute('font-size', '9');
                            text.setAttribute('font-family', "'SF Mono','JetBrains Mono',monospace");
                            text.setAttribute('fill', color);
                            text.textContent = labelText;
                            overlay.appendChild(text);
                        }
                    }
                });

                // Statement chains: vertical accent glow
                if (block.nextConnection?.targetConnection) {
                    const child = block.nextConnection.targetBlock();
                    if (!child) return;

                    const pXY = block.getRelativeToSurfaceXY();
                    const cXY = child.getRelativeToSurfaceXY();
                    const check = block.nextConnection.check_;
                    const color = getSurfaceColor(check);

                    const x = pXY.x + 3;
                    const y1 = pXY.y + block.getHeightWidth().height - 2;
                    const y2 = cXY.y + 3;

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', x); line.setAttribute('y1', y1);
                    line.setAttribute('x2', x); line.setAttribute('y2', y2);
                    line.setAttribute('stroke', color);
                    line.setAttribute('stroke-width', '3');
                    line.setAttribute('opacity', '0.35');
                    line.setAttribute('stroke-linecap', 'round');
                    line.style.filter = `drop-shadow(0 0 2px ${color})`;
                    overlay.appendChild(line);
                }
            });

            overlay.insertBefore(defs, overlay.firstChild);
            svg.appendChild(overlay);
        }

        // ── SEED: showcase every connection geometry ──
        const seed = {
            "blocks": {
                "languageVersion": 0,
                "blocks": [
                    { "type":"ts_signal_map", "x":40, "y":30,
                      "inputs":{"SRC":{"block":{"type":"ts_toggle_val","fields":{"NAME":"pwr"}}}},
                      "fields":{"XFORM":"{ it }"}},
                    { "type":"ts_signal_combine", "x":40, "y":130,
                      "inputs":{
                        "SRC1":{"block":{"type":"ts_slider_val","fields":{"NAME":"vol","MIN":0,"MAX":100}}},
                        "SRC2":{"block":{"type":"ts_knob_val","fields":{"NAME":"tone"}}}
                      },
                      "fields":{"COMBINER":"{ a, b -> a + b }"}},
                    { "type":"ts_lcnc_grid", "x":40, "y":260, "fields":{"ROWS":100},
                      "inputs":{"SRC":{"block":{"type":"ts_confix_doc_val","fields":{"BYTES":"{\\\"data\\\":1}"}}}},
                      "next":{"block":{"type":"ts_lcnc_project",
                        "inputs":{"SRC":{"block":{"type":"ts_cursor_val"}}},
                        "fields":{"COLS":"[0,2]"}}}},
                    { "type":"ts_forge_file", "x":450, "y":30,
                      "fields":{"PATH":"data.json","MIME":"application/json"},
                      "next":{"block":{"type":"ts_forge_prompt",
                        "fields":{"NAME":"analyze","TEMPLATE":"Analyze: {{input}}"},
                        "next":{"block":{"type":"ts_forge_workflow","fields":{"NAME":"pipeline"},
                          "next":{"block":{"type":"ts_forge_llm","fields":{"MODEL":"gpt-4"},
                            "inputs":{"PROMPT":{"block":{"type":"ts_forge_prompt_val","fields":{"NAME":"summarize"}}}},
                            "next":{"block":{"type":"ts_forge_execution","fields":{"STATUS":"PENDING"}}}}}}}}}},
                    { "type":"ts_kanban_board", "x":950, "y":30, "fields":{"NAME":"sprint-1"},
                      "next":{"block":{"type":"ts_kanban_column","fields":{"NAME":"Todo","ORDER":0,"WIP":3},
                        "next":{"block":{"type":"ts_kanban_card","fields":{"TITLE":"build blocks","PRIORITY":"HIGH","ASSIGNEE":""}}}}}},
                    { "type":"ts_kanban_dep", "x":950, "y":200,
                      "inputs":{"TARGET":{"block":{"type":"ts_kanban_card_val","fields":{"TITLE":"task-2"}}}}},
                    { "type":"ts_confix_scan0", "x":450, "y":260,
                      "inputs":{"SRC":{"block":{"type":"ts_confix_doc_val","fields":{"BYTES":"{\\\"k\\\":1}"}}}}},
                    { "type":"ts_join", "x":40, "y":420,
                      "inputs":{
                        "A":{"block":{"type":"ts_cursor_val"}},
                        "B":{"block":{"type":"ts_rowvec"}}
                      }}
                ]
            }
        };
        Blockly.serialization.workspaces.load(seed, workspace);

        // ── RENDER LOOP: glass + connectors ──
        function refresh() {
            applyGlassEffect(workspace);
            drawConnectors(workspace);
        }
        workspace.addChangeListener((event) => {
            if ([Blockly.Events.FINISHED_LOADING, Blockly.Events.MOVE,
                 Blockly.Events.CREATE, Blockly.Events.DELETE,
                 Blockly.Events.CHANGE].includes(event.type)) {
                requestAnimationFrame(() => refresh());
            }
        });
        setTimeout(refresh, 100);
        setTimeout(refresh, 500);

        // ── MOUSE-TRACKED AURORA ──
        document.addEventListener('mousemove', (e) => {
            document.body.style.setProperty('--mx', (e.clientX / window.innerWidth * 100) + '%');
            document.body.style.setProperty('--my', (e.clientY / window.innerHeight * 100) + '%');
        });

        // ── STATS ──
        const statEl = document.getElementById('stats');
        function updateStats() {
            const blocks = workspace.getAllBlocks(false);
            const valConn = blocks.reduce((n, b) =>
                n + b.inputList.filter(i => i.connection?.targetConnection).length, 0);
            const stmtConn = blocks.reduce((n, b) =>
                n + (b.nextConnection?.targetConnection ? 1 : 0), 0);
            statEl.textContent = `${blocks.length} blocks · ${valConn} value surfaces · ${stmtConn} chains`;
        }
        workspace.addChangeListener(() => setTimeout(updateStats, 50));
        setTimeout(updateStats, 200);
} // end initBlockly
</script>
</body>
</html>
