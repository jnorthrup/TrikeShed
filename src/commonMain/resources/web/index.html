<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/forge-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/forge-icon-maskable.svg" />
  <title>Forge</title>
  <style>
{{STYLES}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="workspace-switcher">
          <div class="workspace-icon">F</div>
          <div class="workspace-name">Forge workspace</div>
        </div>
        <div class="sidebar-actions">
          <button class="sidebar-item" id="btn-search" title="Search">
            <span class="sidebar-item-icon">⌕</span><span>Search</span>
          </button>
          <button class="sidebar-item" id="btn-home" title="Home">
            <span class="sidebar-item-icon">⌂</span><span>Home</span>
          </button>
          <button class="sidebar-item" id="btn-board" title="Board">
            <span class="sidebar-item-icon">▦</span><span>Board</span>
          </button>
          <button class="sidebar-item" id="btn-graph" title="Graph">
            <span class="sidebar-item-icon">◉</span><span>Graph</span>
          </button>
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Private</div>
        <div id="page-tree" class="page-tree"></div>
        <button class="sidebar-item sidebar-add" id="btn-new-page">
          <span class="sidebar-item-icon">+</span><span>Add a page</span>
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-label">Ingest</div>
        <div class="drop-zone" id="drop-zone" role="button" tabindex="0" aria-label="Drop files or click to upload">
          <span class="drop-zone-icon">⬇</span>
          <span class="drop-zone-text">Drag resumes, job postings, PDFs, DOCX<br>or click to select files</span>
          <input type="file" id="file-input" multiple accept=".pdf,.docx,.txt,.md,.html,.json" hidden />
        </div>
        <div class="ingest-queue" id="ingest-queue" hidden>
          <div class="ingest-queue-header">Processing</div>
          <div class="ingest-items" id="ingest-items"></div>
        </div>
      </div>
      <div class="sidebar-bottom">
        <div class="sidebar-seed-note" id="seed-note"></div>
      </div>
    </aside>

    <main class="main" id="main">
      <div class="main-topbar" id="main-topbar">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="topbar-actions">
          <button class="topbar-btn" id="btn-view-doc">Document</button>
          <button class="topbar-btn" id="btn-view-board">Board</button>
          <button class="topbar-btn" id="btn-share">Share</button>
        </div>
      </div>
      <div class="doc-scroll" id="doc-scroll">
        <div class="doc-page" id="doc-page">
          <div class="doc-cover-spacer"></div>
          <div class="doc-title-row">
            <div class="doc-icon" id="doc-icon">▤</div>
            <h1 class="doc-title" id="doc-title" contenteditable="true" spellcheck="false" data-placeholder="Untitled"></h1>
          </div>
          <div class="doc-blocks" id="doc-blocks"></div>
          <div class="doc-hint" id="doc-hint">Type <span class="doc-hint-key">/</span> for commands</div>
        </div>
      </div>
      <div class="board-scroll" id="board-scroll" hidden>
        <div class="board-canvas" id="board-canvas"></div>
      </div>
    </main>
  </div>

  <div class="slash-menu" id="slash-menu" hidden></div>

  <script id="forge-seed" type="application/json">{{SEED}}</script>
  <script>
{{SCRIPT}}
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(registration => {
            console.log('ServiceWorker registered:', registration.scope);
          })
          .catch(err => {
            console.log('ServiceWorker registration failed:', err);
          });
      });
      window.addEventListener('online', () => {
        if (navigator.serviceWorker.controller) {
          navigator.serviceWorker.ready.then(reg => {
            if (reg.sync) reg.sync.register('sync-blackboard');
          });
        }
      });
    }
  </script>
</body>
</html>
